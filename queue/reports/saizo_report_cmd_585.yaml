findings:
  - file: scripts/inbox_watcher.sh
    line: 99
    severity: high
    category: bug
    description: "special message (`clear_command` / `model_switch`) を `get_unread_info()` 内で先に `read: true` へ更新しており、その後の `process_unread()` → `send_cli_command()` が失敗するとメッセージが消失する。再試行もできず、/clear や /model 指示が黙って落ちる。該当ロジックは line 99-130 で既読化、line 369-385 で後から実行。"
    fix_suggestion: "special message は `send_cli_command` 成功後に既読化する。少なくとも `pending_special` のまま保持し、送信成功時のみ `read:true` に遷移させる。"
  - file: scripts/ntfy_listener.sh
    line: 164
    severity: high
    category: bug
    description: "`queue/ntfy_inbox.yaml` へ `cat >>` の heredoc で本文を直書きしており、本文に引用符・改行・コロンが入ると YAML 構造が壊れる。`projects/infra/lessons.yaml` の L169 で禁止されたパターンが未解消のまま残っている。"
    fix_suggestion: "`scripts/inbox_write.sh` と同様に flock + `yaml.safe_load` + tmp rename の原子更新へ置き換える。本文は必ず YAML dumper にエスケープさせる。"
  - file: scripts/archive_completed.sh
    line: 289
    severity: medium
    category: bug
    description: "sweep mode (`CMD_ID` なし) では `archive_cmds` を先に実行した後で `archive_reports` が `queue/shogun_to_karo.yaml` だけを見て親cmd状態を判定する。main の順序は line 465-467、report側の keep 条件は line 289-335。先に cmd を queue から退避すると `cmd_status=\"\"` になり、同一実行で完了報告が keep 側へ残留する。"
    fix_suggestion: "sweep mode でも `queue/archive/cmds/*.yaml` を参照するか、`archive_reports` を `archive_cmds` より前に実行する。"
  - file: projects/infra.yaml
    line: 18
    severity: medium
    category: inconsistency
    description: "`projects/infra.yaml` は `claude.agents=[karo,hayate,kagemaru,hanzo,saizo,kotaro,tobisaru]` / `codex.agents=[sasuke,kirimaru]` と記載しているが、`config/settings.yaml:13-20` と `AGENTS.md:272` の現行編成は Codex4=`sasuke,kirimaru,hayate,saizo`、Opus4=`kagemaru,hanzo,kotaro,tobisaru`。復帰時の知識源が誤っており、CLI判定や運用説明を誤誘導する。"
    fix_suggestion: "`projects/infra.yaml` の agent 対応表を現行編成へ更新し、必要なら build 生成物も再同期する。"
  - file: instructions/generated/codex-karo.md
    line: 241
    severity: medium
    category: inconsistency
    description: "現行は tier廃止・Codex4/Opus4 編成なのに、家老向け生成指示書は依然 `genin/jonin` で配備判断し、`kagemaru` を genin、`saizo` を jonin 扱いしている。`instructions/roles/karo_role.md:120-139` も同内容で、`AGENTS.md:272` と矛盾する。/clear 復帰した家老が古い配備判断へ戻るリスクがある。"
    fix_suggestion: "roles 原本を現行編成へ直し、`build_instructions.sh` を再実行して generated 一式を更新する。tier語彙も削除する。"
