result:
  summary: "api/db/frontend層を精査した結果、複数PF/FoFの共通期間整列を実行しているのは frontend Compare chart 側だった。API は portfolio_id 単位の単系列取得、DB は月次系列と開始/終了メタ保存のみで、api/db層での共通期間算出は確認できなかった。"
  details: |
    発見:
    1. frontend/app/compare/page.tsx:L61,L115-L175
       Compare page は periodMode の初期値を `intersection` に設定し、
       選択PFごとに `api.getPerformance(id, 0)` を並列実行して単体系列を集める。
       ベンチマークも別APIで独立取得しており、この段階では共通期間算出はしていない。

    2. frontend/components/comparison-chart.tsx:L129-L206
       実際の共通期間算出はここで実施。
       - `intersection`: 各PFの date 集合の積集合を `displayDatesRaw` にする (L130-L132)
       - `union`: 全 date の和集合を使う (L133-L136)
       - union時は各PFの開始日/終了日を critical date として追加 (L141-L150)
       - 正規化基準値は intersection では共通先頭日、union では各PFの先頭日 (L154-L160)
       - union時の欠損日は `findNearestByDate()` で最近傍補完する (L162-L169)
       - benchmark も displayDates 範囲へ slice 後、完全一致優先+最近傍で整列する (L175-L206)

    3. frontend/lib/chart-utils.ts:L55-L60,L92-L132
       共通期間ロジックを支える補助関数。
       - `sliceBenchmarkToPortfolioPeriod()` は benchmark を表示範囲へ切る
       - `findNearestByDate()` は union mode の最近傍日付選択を担当

    4. backend/app/api/performance.py:L29-L130
       `/api/performance/{portfolio_id}` は `MonthlyReturn.portfolio_id == portfolio_id` で
       単一PFの月次累積系列だけを返す。複数PFの merge/intersection はしていない。

    5. backend/app/api/monthly_returns.py:L26-L112
       `/api/monthly-returns/{portfolio_id}` も単一PF向け。
       `MonthlyReturnsCalculator.calculate(portfolio_id, actual_months, ...)` の結果を返すだけで、
       複数PF/FoFを揃える API 応答処理はない。

    6. backend/app/api/metrics.py:L74-L103,L147-L201
       metrics API は `PortfolioMetrics` に `start_date/end_date/period_months` を
       PFごとに保存・再利用するが、summary 取得時も portfolio ごとに loop しているだけで、
       共通期間を算出していない。

    7. backend/app/db/models.py:L127-L153,L378-L401
       DB層は `monthly_returns` に PF単位の月次系列を、`portfolio_metrics` に
       PF単位の `data_start_date/data_end_date/months_count` を保持するのみ。
       `backend/app/db/` 配下に common/intersect/align/dropna/reindex/merge 由来の
       共通期間算出ロジックは見当たらなかった。

    補足:
    - タスク記載の `frontend/src/` は実在せず、実装本体は `frontend/app/`, `frontend/components/`, `frontend/lib/`, `frontend/hooks/` に存在した。
