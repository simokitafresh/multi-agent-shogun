result:
  summary: "Next.js 14.2.3 の App Router export 遷移は `fetchServerResponse()` が `/{route}/index.txt?_rsc=...` を取得して成立する。現行版は `text/plain*` を flight response として許容するため、『Render が text/plain を返すから失敗』は現行コード上は成立しない。"
  details: |
    1. 担当仮説の判定
    - H1: Content-Type = INCONCLUSIVE
      根拠: `fetchServerResponse()` は確かに `content-type` を検査し、flight でない or 非200 なら MPA fallback へ落とす（`fetch-server-response.js:74-93`）。ただし現行 Next 14.2.3 は export 本番に限り `text/plain*` を許容する（`fetch-server-response.js:77-82`）。したがって「Render が text/plain を返すから失敗」は DENIED だが、「実際は text/html/404/壊れた body/buildId mismatch で失敗している」可能性は残るため、仮説全体としては INCONCLUSIVE。
    - H2: バージョン固有 = DENIED
      根拠: 使用中は `next@14.2.3`（`frontend/package.json:19`）。この版の client router 自身が export 本番専用に `.txt` 取得と `text/plain` 許容を実装しており（`fetch-server-response.js:56-82`）、少なくとも現行コード上は「14.2.3 が export SPA を想定していない」は成立しない。
    - H5: Static Export非対応 = DENIED
      根拠: 設定は `output: 'export'`（`frontend/next.config.mjs:2-4`）で、実ビルド成果物にも route ごとの `index.txt` が存在する。`Link` クリックは `router.push()` を dispatch し（`link.js:67-96`, `app-router.js:167-177`）、`navigateReducer()` は prefetch cache 経由で `fetchServerResponse()` を呼ぶ（`navigate-reducer.js:105-125`, `prefetch-cache-utils.js:136-154`）。Static export を前提にした client-side navigation 経路が実装済みである。

    2. 新たに発見した事実
    - 通常 navigation の flight request は `Accept` を送らない。要求されるのは `RSC: 1`, `Next-Router-State-Tree`, 任意で `Next-Router-Prefetch`, `Next-Url`、および query `_rsc` である（`app-router-headers.js:51-69`, `fetch-server-response.js:31-70`）。
    - `Accept: text/x-component` を送るのは server action POST だけで、navigation request とは別実装である（`server-action-reducer.js:32-45`）。
    - SPA遷移が MPA fallback へ落ちる主なチェックポイントは以下:
      a. `fetchServerResponse()` で `!isFlightResponse || !res.ok`
      b. `createFromFetch()` が throw
      c. `currentBuildId !== buildId`
      d. `navigateReducer()` で `typeof flightData === 'string'`
      e. `isNavigatingToNewRootLayout()` が true
    - `frontend/public/sw.js` は `_rsc` / `.txt` を明示 bypass していないが、現在のコードでは script/style/image と `signals.json` しか cache put しない（`sw.js:81-143`）。よって SW 主犯説は現コードだけでは CONFIRMED できない。

    3. 推奨アクション
    - 第1優先: 本番ブラウザで `/<route>/index.txt?_rsc=...` の status, content-type, response body 先頭, response URL, buildId mismatch 有無を採取する。現行コード上、ここが最短の真因切り分け点である。
    - 第2優先: `content-type: text/plain` が観測された場合、それ自体は 14.2.3 では許容されるため、Content-Type rewrite を主因扱いしない。代わりに body が HTML 化していないか、404/redirect になっていないか、buildId がずれていないかを確認する。
    - 第3優先: SW 仮説を追うなら `_rsc` 付き request と `.txt` pathname を明示 bypass する実験は有効だが、現段階では補助仮説扱いが妥当。
