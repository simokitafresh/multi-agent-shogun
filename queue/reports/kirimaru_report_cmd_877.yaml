result:
  summary: "既存CDP実装は `scripts/cdp/cdp_helper.py` 1本に集約され、HTTP取得もWebSocket送信も `powershell.exe` 経由で毎回新規接続している。`scripts/cdp/` 配下の現物は helper と README の2本のみで、repo 内に利用側は存在しないため、`cdp_server.py` / `cdp_cli.sh` は別ファイル追加で安全に共存できる。ただし `websocket-client` は未導入で、親cmdが要求する『既存GUIブラウザ(9222想定)』と現helperの `9223` 自動起動設計には差分がある。"
  details: |
    ■ AC1: cdp_helper.py の接続方式・コマンド体系・PowerShell依存箇所

    1. 現行接続方式
       - `cdp_get()` は `powershell.exe -NoProfile -Command "(Invoke-WebRequest ...).Content"` で `http://localhost:9223/json*` を叩く。`scripts/cdp/cdp_helper.py:24-71`
       - `cdp_send()` は PowerShell 内で `System.Net.WebSockets.ClientWebSocket` を毎回 new/connect/send/receive/close しており、永続セッション保持はない。`scripts/cdp/cdp_helper.py:78-125`
       - `launch_browser()` も `Start-Process` を PowerShell 経由で実行し、`--remote-debugging-port={port}` と `--remote-debugging-address=0.0.0.0` を付けて起動する。`scripts/cdp/cdp_helper.py:224-263`

    2. 現行コマンド体系
       - 低レベル: `cdp_get(path)` / `cdp_send(ws_url, method, params)`
       - 中レベル: `js_eval()` = `Runtime.evaluate`、`navigate()` = `Page.navigate`
       - 補助: `get_tab()` (`/json` の page tab 走査)、`wait_for_element()` (`document.querySelector` poll)、`screenshot()` (`Page.captureScreenshot`)、`get_page_metrics()` (`Performance.getMetrics`)
       - つまり新 daemon/CLI が最初に互換吸収すべき操作は `navigate / eval / screenshot / tab lookup / simple wait` の5系統。

    3. PowerShell依存箇所
       - `ps_run()` 自体が `powershell.exe` 固定。`scripts/cdp/cdp_helper.py:24-49`
       - CDP HTTP取得が `Invoke-WebRequest` 依存。`scripts/cdp/cdp_helper.py:56-71`
       - CDP WebSocket送信が `.NET ClientWebSocket` 依存。`scripts/cdp/cdp_helper.py:102-123`
       - ブラウザ起動が `Start-Process` 依存。`scripts/cdp/cdp_helper.py:250-255`
       - README も前提を「WSL2 + powershell.exe 利用可能」「外部依存なし」と定義している。`scripts/cdp/README.md:5-10,82-103`

    4. websocket-client 使用状況
       - 現repoでは未使用。`scripts/cdp/cdp_helper.py` は PowerShell/.NET 経由で WebSocket を処理する。
       - `requirements.txt` は `PyYAML==6.0.3` のみで、`websocket-client` は未宣言。`requirements.txt:1`

    ■ AC2: scripts/cdp/ ディレクトリ全体の整理

    1. 現物一覧
       - `scripts/cdp/cdp_helper.py`: WSL2→PowerShell→CDP helper 本体
       - `scripts/cdp/README.md`: helper の import / usage / architecture 説明
       - repo 内の `scripts/cdp/` 利用箇所は README の記述のみで、実コードからの import 参照は未検出

    2. 構造上の所見
       - 現状は「ライブラリ層のみ」で、常駐 daemon, CLI ラッパー, テスト, 依存宣言が存在しない。
       - したがって `cdp_server.py` / `cdp_cli.sh` を追加しても既存利用者を壊しにくい。AC4の「既存 helper 非改変」と相性が良い。

    3. 新規 `cdp_server.py` / `cdp_cli.sh` との共存設計
       - `cdp_helper.py` は legacy transport として残置し、新規 server/cli は別系統にする。
       - `scripts/cdp/README.md` に legacy helper と daemon mode の2経路を併記する。
       - `requirements.txt` か同等の依存導線に `websocket-client` を追加し、daemon専用依存であることを明記する。
       - 新 CLI は helper API を直接差し替えず、`bash scripts/cdp/cdp_cli.sh navigate ...` の独立入口にする。

    ■ AC3: 実装直結のリスク/後方互換

    1. AC4の影響範囲
       - `scripts/cdp/cdp_helper.py` は現行機能の唯一実装なので非改変維持が安全。
       - 実コード参照が無いぶん後方互換の主戦場は README / 依存導線 / 新規テストになる。

    2. 参照欠落
       - task 指定の `memory/cdp-browser-automation.md` は repo 内に存在しなかった。代替知識源として `docs/research/gstack-analysis.md` と `context/auto-ops.md` / `docs/research/cmd_816_cdp-measurement-architecture.md` を参照した。

    3. 重要な差分
       - 親cmd本文は「既存GUIブラウザ(Chrome port 9222)直接制御」を掲げるが、この repo の helper は `9223` 前提で自動起動型。
       - `context/auto-ops.md` でも現行知識は `9223` 系のみ。daemon 実装前に、既存 GUI セッション接続を既定にするか、`9223` legacy を既定にするかの方針確認が必要。
