lesson_candidate:
  found: true
  title: try/exceptフォールバックパターンでmock DB互換性とN+1最適化を両立
  detail: |
    N+1最適化でbulk preloadを導入する際、既存テストがmock DBを使用していると
    bulk preloadの内部クエリ(load_business_days等)がMock上で失敗する。
    try/except + bulk_loaded flagパターンで:
    - 本番DB: bulk preload成功 → 最適化パス
    - テストmock DB: bulk preload例外 → 元のper-iterationパス
    テスト変更ゼロで互換性維持。ただしtry/exceptは実運用エラーを隠蔽するリスクがあるため、
    本番ログ監視と組み合わせるべき。
  project: dm-signal
