  details: 'AC1: 全5ステップ対比表


    Step 1: ウェイト計算方法

    GS: calculate_multi_asset_return() L254-268 -- sum(returns)/len(holdings) = 均等ウェイト(1/N)平均。毎月独立計算(open[i+1]/open[i]-1
