    本番: expand_portfolio_to_tickers() L929-1028 -> Dict[ticker, 1/N] (Signal.holding_signal由来)。calculate_weighted_return()
    L795-811 -> Sigma w_i x (P_end/P_start - 1)。

    差異: なし。数学的に等価。両方とも月初にウェイトを1/Nにリセット(暗黙的月次RB)。


    Step 2: リバランス月判定

    GS: REBALANCE_MONTHS dict L290-297。判定: start_date.month in rebalance_months_set
    L1591。

    本番: rebalance.py REBALANCE_MONTHS L13-20 (同一定義)。is_rebalance_month(trigger, month)
    L23-42。

    差異: なし。定義・判定ロジック完全一致。


    Step 3: リターン計算(価格タイプ・解像度)

    GS: Open-to-Openのみ計算。month_start_opens = open_prices.resample(''MS'').first()
    L807。return = open[i+1]/open[i]-1 (L1651-1656)。

    本番(_generate_monthly_returns): Close-to-Close + Open-to-Open両方計算。calc_start_date
    = get_next_business_day(月初, biz)。price_ratio = P(end)/P(start)。

    差異: 機能的に等価。GS=Open-to-Openのみ、本番=両方算出。Open-to-Open値は同一ロジック。


    Step 4: 月次リターン合成方法

    GS: calculate_yearly_returns() L1673-1691 -> Pi(1+r_month)-1 = 複利合成。

    本番: calculate_trade_period_return() L207-292 -> compounded_return *= 1+month_return
    -> Pi(1+R)-1。

    差異: なし。両方とも複利合成。


    Step 5: 非リバランス月の扱い

    GS: L1590-1631。非RB月はcurrent_holdings不更新。毎月独立にopen[i+1]/open[i]-1を均等平均 -> 暗黙的月次RB。

    本番: 毎月expand_portfolio -> 新price_ratioで Sigma w_i x (ratio-1) -> 暗黙的月次RB。

    差異: なし。recalculate_fast.pyの日次累積はセグメント方式だがMonthlyReturnには影響なし。


    ---

    AC2: 乖離ステップ全件(6件) + インパクト推定


    D1: 丸め処理の差異 [極小] -- 本番round(,10) vs GS丸めなし。10^-10以下。

