    D3: DTB3/Cash計算の微差 [小] -- GS=DataFrame直接 vs 本番=business-day reindex+ffill。Cash月のみ1-5bp。

    D4: valid_start_date近似 [小-中] -- GS=int(lookback*1.5)+10 vs 本番=実Signal有無。初期月のRB包含/除外差。

    D5: Fix C月末リマップ [条件付き] -- 非Pipeline pathのみ。年3-4回シグナル帰属ズレ。Pipeline path影響なし。

    D6: Signal生成パス差異 [条件付きで大] -- pipeline_config未設定PFでMomentumCache path(GS独自) vs
    本番Pipeline。シグナル乖離。


    ---

    AC3: GS側修正方針


    M1: [D2] データソース統一(優先度高) -- gs_data_loader経由PostgreSQL直読の全パス拡大。工数小。

    M2: [D6] pipeline_config必須化(優先度高) -- 未設定PF検出ゲート追加。MomentumCache path非推奨化。工数中。

    M3: [D3] DTB3計算統一(優先度低) -- business-day reindex+ffill導入。L852-892。工数小。

    M4: [D1] 丸め統一(優先度最低) -- round(ret,10)追加。L268。工数極小。

    構造的修正は不要(コアアルゴリズム等価のため)。'
