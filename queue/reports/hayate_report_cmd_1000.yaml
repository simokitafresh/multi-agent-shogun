  details: |
    調査結論:
    1. インタフェース準拠: PASS
       - `PBarSelectionBlock` は `SelectionBlock` を継承し、`execute(self, context: PipelineContext) -> None` を実装している
         (`backend/app/services/pipeline/blocks/p_bar_selection.py:24-38`,
          `backend/app/services/pipeline/base.py:87-107,193-206`)。
       - `BlockType.P_BAR_SELECTION` が enum と block registry に登録され、`PipelineEngine` から他ブロック同様に解決・実行される
         (`backend/app/schemas/pipeline.py:18-39`,
          `backend/app/jobs/shared.py:264-288`,
          `backend/app/services/pipeline/engine.py:90-115`)。
       - 出力も既存 selection block と同じく `context.current_tickers` を更新し、`context.intermediate_results[self.block_id]` に詳細を保存する形で整合している
         (`backend/app/services/pipeline/blocks/p_bar_selection.py:79-85`;
          比較対象 `backend/app/services/pipeline/blocks/momentum_filter.py:27-37,131-145`)。

    2. p̄計算時の共通期間考慮: FAIL
       - `PBarSelectionBlock` 自体は `context.current_tickers` と `n_splits` で `PAverageResult` を読むだけで、`target_date`・価格系列・月次系列の共通期間算出ロジックを一切持たない
         (`backend/app/services/pipeline/blocks/p_bar_selection.py:42-77`)。
       - p̄の生成元 `run_p_average_batch()` は、active PFごとに `MonthlyReturn.monthly_return_open` を `year_month` 順に全件読み込み、そのPF単体の全履歴で `calc_p_average()` を実行して永続化している
         (`backend/app/jobs/p_average_batch.py:18-38,79-109`,
          `backend/app/services/p_average.py:39-72`)。
       - このため、比較対象PFごとに開始月・サンプル長が異なっても、その差を揃えずに p̄ を比較する構造である。`projects/dm-signal.yaml` の「共通期間を先に確定」の裁定とは未整合。
       - 最適化経路でも同じで、`recalculate_fast.py` は `date-invariant` な `_pbar_cache` を全PF分まとめて作り、当日の候補集合へそのまま適用している
         (`backend/app/jobs/recalculate_fast.py:1052-1064,1298-1307`)。

    3. 他ブロックとのデータ受け渡し: PASS（一部注意点あり）
       - 入力は `context.current_tickers` を「構成PF ID集合」として受け取り、`db_session` で `PAverageResult` を照会するだけで、`momentum_data` や `price_data` には依存しない
         (`backend/app/services/pipeline/blocks/p_bar_selection.py:39-52`)。
       - 出力は `selected` を `context.current_tickers` へ戻し、engine 側はそれを通常の block result として後続 terminal に渡すため、パイプライン接続自体は整合している
         (`backend/app/services/pipeline/engine.py:107-137`)。
       - ただし `PAverageResult` が一部PFで欠損している場合、ブロックは「存在する行だけ」で ranking し、欠損PFを警告なく事実上脱落させる。`rows == []` または `all None` だけが警告対象で、部分欠損は未検知
         (`backend/app/services/pipeline/blocks/p_bar_selection.py:54-77`)。

    4. テスト状況
       - 既存テストは `n_splits` 切替、同点 cutoff、all-null 時の空集合のみを確認している
         (`backend/tests/test_p_bar_selection_block.py:50-104`)。
       - 未カバー: 共通期間揃え、部分欠損 row、`top_n <= 0` の異常値、`recalculate_fast.py` の vectorized 経路との一致。
