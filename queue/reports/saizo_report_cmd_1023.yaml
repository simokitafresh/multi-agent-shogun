how_it_works: |
  - 各familyの monthly_returns wide CSV を読み、cmd_1020 engine と同じ 8群×28fold / purge1M / embargo1M を生成する。
  - 各Triple-E metricで foldごとに train/test score を全候補へ再計算し、global champion用 logit PBO と candidate別PBOを同時集計する。
  - candidate別PBOは「そのfoldで IS top-half に入った候補が OOS median-or-worse に落ちた割合」として集計した。
  - 3指標すべてで threshold 未満なら `passes_pbo_005/010/020` を立て、0.05 通過行だけを survivors CSV に書き出す。
  - DM7P は Phase3 を実行せず全96行を Phase4 candidates CSV に出力し、validation 用だけ 3metric engine 計算を走らせる。
