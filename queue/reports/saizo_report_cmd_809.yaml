summary: '現行 CDP 計測は「人間の体感」をそのまま測っておらず、二重の乖離がある。

  1) 実行 wall-clock は過大: Render warm-up、viewer 再認証、固定 sleep、逐次 timeout のため1ページでも分単位になりうる。

  2) 報告 median_ms は過小: wait_selector がほぼ全ページで `h1` のみで、実データ/ローディング完了前に PASS しうる。

  結論として現行は UX 計測ではなく「運用準備込みの自動化処理時間」と「薄い page shell 到達時間」が混在している。'
