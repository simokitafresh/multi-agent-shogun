result:
  summary: "最優先で直すべきは `median_ms` の計測条件ではなく、『実行時間を膨らませる準備工程』と『ready判定の弱さ』の分離である。現行は wall-clock には厳しすぎ、reported metric には緩すぎる。"
  details: |
    主要所見:
    1. 人間が「表示された」と感じるのは、少なくとも loading spinner が消え、
       portfolio依存データが描画された時点である。
       しかし auto-ops はほぼ全ページで `h1` を待つだけなので、page shell 先行表示を拾ってしまう。

    2. 一方で 1ページ計測の実行 wall-clock は、
       page ready そのものではなく warm-up / re-auth / fixed sleep / additive timeout に支配される。
       そのため「ブラウザでは数秒、CDPでは何分」が起こりうる。

    3. したがって改善方針は二層に分けるべき。
       - 運用前処理: service wake-up, auth, session準備
       - UX計測: route到達後、Loading消失 + 実データDOM出現まで

    4. この分離をしない限り、script 実行時間を短くしても指標は信用できず、
       指標を厳密化しても実行時間だけがさらに悪化する。
