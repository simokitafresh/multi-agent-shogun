  details: '■ AC1: 根本原因特定


    【本番コードパス】 recalculate_fast.py Phase 3.7 → price_by_symbol には株式ティッカーのみ(^VIX/DTB3含まない)。PipelineEngine
    → AbsoluteMomentumBlock → ^VIXがprice_data_cacheにない→load_ticker_prices()でDB直接照会。^VIXの日付インデックス=^VIX固有の公開日(祝日含む)。


    【GSコードパス(修正前)】 grid_search_metrics_v2.py → load_prices() → close_pricesに^VIX含む。stock_trading_maskで祝日除外→^VIXも株式取引日インデックスにリサンプル(ffill)。price_data_cacheに^VIXを含めキャッシュ→PipelineEngineがstock-trading-day
    indexの^VIXを使用。


    【差異メカニズム】 pct_change(126)は行ベースで126行前を参照。日付インデックスが異なると参照先日付が異なる。2026-02月末(signal_date=2026-01-30):
    126行前=GS→2025-07-31(price=16.72,mom=+0.043), 本番→2025-08-04(price=17.52,mom=-0.005)。モメンタム符号反転→holding_signal不一致。


    ■ AC2: 修正実装


    【修正1】grid_search_metrics_v2.py L1363-1378: ^VIXとDTB3をprice_data_cacheから除外。PipelineEngineがDB直接照会で本番同一日付インデックスを使用。

    【修正2】verify_gs_parity_pi009.py L231-238: 同一の除外ロジック適用。

    【検証】L0-M_XLU: 186/186 PASS(全月holding_signal完全一致)。


    ■ AC3: 全65 standard PFパリティ検証


    AC2(holding_signal): PASS=64, FAIL=1

    AC3(monthly_return_open): PASS=64, FAIL=1

    唯一のFAIL: シン青龍-鉄壁 2024-11 prod=TQQQ gs=XLU


    【シン青龍-鉄壁FAIL分析】DM2ファミリー(abs=LQD)で^VIX無関係。DTB3 cache除外によりGS側のDTB3パスが変更(experiments.db
    daily_prices→DB直接照会=economic_indicators=本番同一パス)。cmd_1240時は旧コードのDTB3補償エラーで偶然PASS。正しいコードパスで既存不一致が露出。退行ではなく既存問題。別cmdで調査要。'
