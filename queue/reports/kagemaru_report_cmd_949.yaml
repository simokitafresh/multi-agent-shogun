lesson_candidate:
  found: true
  title: "Chrome 145 on Windows: デフォルトプロファイルパス(User Data)のスペースがCDP起動を阻害する"
  detail: |
    Chrome 145でデフォルトプロファイル(C:\...\User Data)を使用する場合:
    (1) --user-data-dir省略でheaded Chrome起動→DebugServerが起動しない(port LISTEN なし)
    (2) --user-data-dirで明示指定→PowerShell ArgumentListがスペースを正しく渡せない
    修正方法: ジャンクションリンク(ChromeProfile → User Data)でスペースのないパスを作成し、
    --user-data-dir=C:\...\ChromeProfile を指定する。headless modeなら--user-data-dir省略でも動作する。
    cdp_helper.pyのlaunch_browser()はtempプロファイルを使うためこの問題に遭遇しないが、
    殿のログイン済みセッション(cookie)を使いたい場合はジャンクション方式が必須。
  project: auto-ops
