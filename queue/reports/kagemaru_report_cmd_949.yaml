result:
  summary: |
    AC1部分達成: CDP接続修復完了（port 9222 LISTEN、/json/version応答確認）。
    ただしnote.comセッション期限切れでログインページにリダイレクト。
    AC2未着手（AC1のnote.comログイン部分が未達のため）。
  details: |
    ■ CDP接続不能の根本原因（特定済み）

    Chrome 145 on Windows: デフォルトプロファイルパス
    `C:\Users\simok\AppData\Local\Google\Chrome\User Data` の
    "User Data"にスペースが含まれることが諸問題の根源。

    1. Chrome起動時に`--user-data-dir`を省略した場合:
       - Chromeはデフォルトパスを自動検出して使用
       - しかし`--remote-debugging-port=9222`を指定しても
         DevToolsデバッグサーバーが起動しない（port 9222 LISTENせず）
       - DevToolsActivePortファイルも未生成
       - chrome_debug.logにDevTools関連のエラーなし
       - Chrome自体は正常動作（子プロセス群あり、Webページ表示可能）
       - 拡張機能無効化(`--disable-extensions`)でも同じ
       - クラッシュリカバリ状態修復(exit_type=Normal)でも同じ
       - Chromeポリシー(HKLM/HKCU)制限なし

    2. `--user-data-dir`を明示的に指定した場合:
       - PowerShellの-ArgumentListがスペース含みパスを正しく渡せない
       - `--user-data-dir=C:\...\User Data` → Chromeが
         `--user-data-dir=C:\...\User`（スペース前まで）と解釈
       - 結果として`C:\...\User`という別ディレクトリに新規プロファイル作成
       - cookie復号不能（DPAPI暗号化キーのパスコンテキスト不一致）

    ■ 検証した組み合わせ（8パターン）

    | # | モード  | プロファイル | debug port | 結果 |
    |---|---------|-------------|------------|------|
    | 1 | headed  | default(暗黙) | 9222 | ✗ LISTEN せず |
    | 2 | headed  | temp(新規)    | 9223 | ✓ LISTEN + 応答 |
    | 3 | headless| default(暗黙) | 9222 | ✓ LISTEN + 応答 |
    | 4 | headed  | default(明示) | 9222 | ✓* LISTEN + 応答 |
    | 5 | headed  | 8.3短縮名    | 9222 | ✓ LISTEN + 応答 |
    | 6 | headed  | junction     | 9222 | ✓ LISTEN + 応答 |
    | 7 | headless| default(暗黙) | - | cookie全0件（DPAPI問題） |
    | 8 | headed  | 8.3短縮名    | - | cookie極少（パス不一致） |

    ✓*: パス4はスペース問題で実際は`User`ディレクトリの別プロファイル

    ■ 修復手順（成功）

    1. ジャンクションリンク作成:
       `C:\Users\simok\AppData\Local\Google\Chrome\ChromeProfile`
       → `C:\Users\simok\AppData\Local\Google\Chrome\User Data`

    2. Chrome起動コマンド:
       ```
       Start-Process chrome.exe -ArgumentList
         '--remote-debugging-port=9222',
         '--remote-allow-origins=*',
         '--user-data-dir=C:\Users\simok\AppData\Local\Google\Chrome\ChromeProfile',
         '--profile-directory=Default',
         '--no-first-run'
       ```

    3. 検証結果:
       - port 9222 LISTEN確認
       - curl http://127.0.0.1:9222/json/version → Chrome/145.0.7632.160 応答
       - WSL2からの接続確認済み
       - cookie 8件ロード済み（note.com 7件、_note_session_v5あり）

    ■ note.comセッション状態

    - _note_session_v5 cookie存在（有効期限: 2026-06-14頃、未到達）
    - しかしnote.comサーバー側でセッション失効
    - https://note.com/sitesettings/stats → login?redirectPath=... にリダイレクト
    - 原因推定: 長期間のChrome強制終了/再起動の繰り返しでサーバー側セッション無効化
    - note.comログインページにはGoogle reCAPTCHAあり（霧丸報告で確認済み）
    - CDP自動ログインは不可能

    ■ 副作用

    - `C:\Users\simok\AppData\Local\Google\Chrome\User` ディレクトリが
      テスト中に誤って作成された（パス解析失敗の産物）。不要。削除推奨。
    - `C:\Users\simok\AppData\Local\Temp\cdp-chrome-test-9223` — テスト用tempプロファイル。不要。
    - ジャンクションリンク `ChromeProfile` は恒久利用可能

