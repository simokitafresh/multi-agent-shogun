lesson_candidate:
  found: true
  title: "Payload cache と validator cache を分離する場合、invalidator は両層同時破棄が必須"
  detail: "response payload(IDB) と ETag validator(IDB/Map) を別管理している構成で片方だけ clear すると、`If-None-Match` が残ったまま payload が消え、304 応答後に復元不能になる。generic clear は payload store・validator store・validator memory の3層を同時に落とすべき。manifest のような軽量索引も実体確認なしに SSOT 扱いしてはならない。"
  project: dm-signal
