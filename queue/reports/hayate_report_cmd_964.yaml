result:
  summary: "FE キャッシュ整合性 3 件を修正した。generic cache clear が payload/ETag の両層を破棄し、Compare は shared execution timing context へ統一され、manifest 偽陽性も防止された。"
  details: |
    実施内容:
    - `frontend/lib/api-cache.ts`
      - response cache 用 IDB に加え、ETag 用 IDB (`dm-signal-etag-store` / `etags`) を generic clear 対象へ追加
      - `registerClearHandler()` を追加し、上位クライアントが clear 時の副作用を登録可能にした
      - persisted key 一覧を IndexedDB から非同期 hydrate し、`has()` が localStorage manifest 単独で true を返さないよう修正
      - payload 欠損・expiry cleanup 時に manifest/persistent key 集合も同期更新
    - `frontend/lib/api-client.ts`
      - `apiCache` clear 時に in-memory `etagStore` / `etagDbChecked` も消す clear handler を登録
    - `frontend/app/compare/page.tsx`
      - compare 専用の `executionTiming` state を削除
      - `useExecutionTiming()` の `timing` / `setTiming` を利用する構成へ変更
      - legacy localStorage key `executionTiming` の direct read/write を削除
    - テスト追加/更新
      - manifest 残存 + IDB payload 欠損時に `has()` が false になるケースを追加
      - `apiCache.clear()` が in-memory / persisted 両方の ETag を消すケースを追加
      - 既存 ETag test 1 件を新しい clear semantics に合わせて更新

    変更意図:
    - payload cache と validator cache を別層で持つ構成では、invalidator は両層を同時に落とさないと `304 but no cached data` を誘発する
    - sync `has()` が async IDB の中身を見ずに manifest のみで true を返すと、永続 payload 消失時に偽陽性になる
    - compare page の execution timing は既に全体 Context が存在するため、page-local state + legacy key を残す理由がなかった
