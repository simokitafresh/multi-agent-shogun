ac_results:
  - id: AC1
    status: pass
    evidence: |
      Web検索で一次情報4件を確認した。
      1) Next.js docs / Static Exports:
         https://nextjs.org/docs/app/building-your-application/deploying/static-exports
         → App Router + `output: 'export'` でも client-side navigation は前提機能であり、静的route payloadによりSPA-like遷移が可能とされる。
      2) Next.js docs / Link:
         https://nextjs.org/docs/app/api-reference/components/link
         → `<Link>` は自動prefetchを行う。prefetch経路が症状に絡みうる。
      3) GitHub Discussion #57565:
         https://github.com/vercel/next.js/discussions/57565
         → 検索結果snippetで「`<Link>` click後にURLが変わらず、calls are happening anymore」と一致度の高い症状が報告され、`prefetch={false}` で改善した事例がある。
      4) GitHub Issue #59986:
         https://github.com/vercel/next.js/issues/59986
         → `output: 'export'` 環境でrouting/route metadataまわりの rough edge が残る報告。static export自体に未成熟領域がある補強材料。

      上記より、DM-Signal症状は「Static Exportだからclient-side routing不可」ではなく、
      App Routerのprefetch/RSC/router状態まわりの既知粗さに近い。
      最初の実装カナリアは `frontend/components/page-navigation.tsx:18-26` の HomeButton Link に
      `prefetch={false}` を加える案が最も筋が良い。
  - id: AC2
    status: pass
    evidence: |
      x_research.py を実行し、Context Pack を保存した。
      - 実行コマンド:
        `python3 scripts/x_research.py --topic "Next.js App Router Link static export SPA navigation not working" --locale global --audience engineer`
      - 保存先:
        `data/x-research/20260312_183635Z_nextjs-app-router-link-static-export-spa.md`

      Context Pack主要発見:
      - X上の議論クラスターは
        (a) App Router移行時の `next/router` 誤用
        (b) static host の rewrite/404 問題
        (c) static export 互換性への不信
        の3群に分かれる。
      - ただし DM-Signal の現症状は 404 ではなく
        「prefetch/RSC fetchは走るがURLが変わらない」であるため、
        X情報のうち rewrite/404 論点の適合度は低い。
      - DM向けに採るべき示唆は
        「App Router + static export は host/version-sensitive で、運用上まだ粗い」
        までであり、今回の直接根因候補としては GitHub Discussion #57565 の
        prefetch/router状態論点の方が適合度が高い。
result:
  summary: |
    外部一次情報上、`output: 'export'` 自体は client-side navigation の否定材料にならない。
    症状一致度が最も高いのは「Linkクリックで通信は走るがURLが変わらない」系の
    App Router/prefetch 論点であり、DM-Signal の最小blast-radius修正は
    HomeButton限定で `prefetch={false}` を試す canary でござる。
  details: |
    ローカル実装照合:
    - `frontend/next.config.mjs:2-4`
      - `output: 'export'`
      - `trailingSlash: true`
    - `frontend/components/page-navigation.tsx:18-26`
      - HomeButton は `<Link href={targetUrl}>`
      - `prefetch` 指定なし（既定動作）
      - href 自体は `buildUrlWithPortfolio("/dashboard/", portfolioId)` で正しい
    - `frontend/public/sw.js:39-42`
      - `.txt` / `_rsc` は SW bypass 済み
    - `frontend/public/sw.js:74-83`
      - HTML navigation / API も SW で握っていない

    外部情報からの推定:
    - 公式docsが static export + client navigation を明示している以上、
      「platform不可能説」は棄却寄り。
    - `prefetch/RSC fetch は走るが URL 変化なし` という観測は、
      GitHub Discussion #57565 の「通信は発生するのに router が進まない」系と近い。
    - `sw.js` は route flight を既に bypass しているため、今回の第一容疑ではない。
    - rewrite/404 論点は X 上で多いが、DM の症状とは一致しないため優先度は下げるべき。

    修正方針（偵察結論）:
    1. 第1候補: `page-navigation.tsx` の HomeButton Link に `prefetch={false}` を付与し、/summary→/dashboard の canary を取る。
    2. これで改善した場合のみ、shared nav 他導線へ横展開を検討する。
    3. 改善しない場合は `prefetch` 以外の router state 問題へ絞り、preview/live で再現条件を採取する。
    4. `sw.js` 変更は第一手にしない。既に bypass 条件が入っているため、変更コストの割に当たりが薄い。
