    3. Strict dashboard-specific = 約60.4KB raw
    - `9262-...js`: 33.4KB
      - `MtdChart` 系（`date-fns` を含む）+ dashboard向け補助UI
    - `app/dashboard/page-41bd...js`: 27.0KB
      - route本体, data-loading effect群, `MtdDailyTable`, dynamic import wrapper, deterioration表示

    ## AC4: dynamic import 候補
    既存:
    - `TotalReturnChart` は dynamic import 済み
      - lazy chunk: `8449...js` 12.1KB raw
    - `SignalPieChart` は dynamic import 済み
      - lazy chunks: `6693...js` 332.9KB raw + `344...js` 2.4KB raw
      - chunk fingerprint上、実質 `recharts` ペイロード

    追加候補:
    1. `MtdChart`
       - import箇所: `frontend/app/dashboard/page.tsx:22`, render: `:482-492`
       - 実装ファイル: `frontend/components/mtd-chart.tsx:3-11`
       - 根拠: below-the-fold で、`date-fns` + `next-themes` + custom chart helpers を初期JSへ残している
       - 推定削減: 25-35KB raw
    2. `MtdDailyTable`
       - import箇所: `frontend/app/dashboard/page.tsx:23`, render: `:494-500`
       - 実装ファイル: `frontend/components/mtd-daily-table.tsx:38-126`
       - 根拠: MTD chart よりさらに後段。単体では軽いが、MTD セクションごと遅延対象にしやすい
       - 推定削減: 3-6KB raw（単独）/ `MtdChart` と抱き合わせで section 遅延化しやすい
    3. `MobileMenu` footer (`AuthStatus`, `ThemeToggle`) の on-open lazy化
       - import箇所: `frontend/app/dashboard/page.tsx:16`, render: `:370-372`
       - 実装ファイル: `frontend/components/mobile-menu.tsx:3-6,193-203`
       - 根拠: mobile-only + interaction-only の UI を初期shellで抱えている
       - 推定削減: 8-15KB raw

    ## AC5: optimizePackageImports 候補
    1. `lucide-react`
       - import分布:
         - `components/portfolio-nav-selector.tsx:4`
         - `components/help-link.tsx:5`
         - `components/ui/message-banner.tsx:2`
         - `components/auth-status.tsx:4`
         - ほか shared layout 側にも散在
       - chunk観測:
         - `5009...js` 29.5KB raw がほぼ icon runtime
       - 推定削減: 8-15KB raw
       - 工数: 低（`next.config.mjs`）
    2. `date-fns`
       - import:
         - `components/mtd-chart.tsx:4`
       - chunk観測:
         - `9262...js` に `date-fns` fingerprint
       - 推定削減: 2-4KB raw
       - 工数: 低

    非推奨/補足:
    - `recharts` は optimizePackageImports の主対象というより、
      `SignalPieChart` 自体を custom SVG へ置き換える方が効く。
      ただしこれは initial JS ではなく post-hydration lazy payload を削る施策。

    ## AC6: ROI rank
    1. MTD section (`MtdChart` 主体) を dynamic import 化
       - 推定削減: 25-35KB raw
       - 工数: 中
       - 理由: `/dashboard` 固有 60.4KB のうち大きい方を直接削れる
    2. `next.config.mjs` に `optimizePackageImports: ['lucide-react', 'date-fns']`
       - 推定削減: 10-19KB raw
       - 工数: 低
       - 理由: shared shell に効くため `/dashboard` 以外にも波及
    3. `MobileMenu` / `AuthStatus` / `ThemeToggle` を interaction時 lazy化
       - 推定削減: 8-15KB raw
       - 工数: 中
       - 理由: mobile-only / menu-open時のみ必要
    4. `SignalPieChart` の `recharts` を custom SVG に置換
       - 推定削減: 335.3KB raw (lazy payload)
       - 工数: 高
       - 理由: First Load JS ではなく hydration後ダウンロードの重さに効く

