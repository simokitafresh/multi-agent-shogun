    ## AC2/AC3: `/dashboard` chunk breakdown
    `/dashboard` initial JS total: 486.9KB raw

    1. Shared by all app routes (`/layout`由来) = 約378.9KB raw
    - `fd9d1056-...js`: 168.8KB
      - React/Next client runtime本体
    - `7023-...js`: 120.9KB
      - Next client runtime / framework層
    - `app/layout-da3b...js`: 28.0KB
      - ThemeProvider / SignalsProvider / ViewerPermissionsProvider / Sidebar / GlobalErrorBanner
    - `5009-...js`: 29.5KB
