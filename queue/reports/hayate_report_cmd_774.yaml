result:
  summary: |
    `/dashboard` のFirst Load JS偵察を完了。
    buildは2回実行した。1回目は `PageNotFoundError: /_document` で page-data 収集中に失敗。
    2回目は compile/typecheck/static pages 生成まで成功したが、最終 export cleanup で
    `ENOTEMPTY: ... out/_next/static/media` により失敗した。
    ただし2回目は fresh `.next/app-build-manifest.json` / `react-loadable-manifest.json` を生成しており、
    これを基に `/dashboard` の初期JS構成を確定できた。
    現在の manifest-based raw initial JS では `/dashboard` が 486.9KB で全route中2位（最重は `/admin` 503.9KB）。
    厳密な dashboard 固有 chunk は 60.4KB（`9262` 33.4KB + `app/dashboard/page` 27.0KB）で、
    重さの大半は layout/context/api/icon を含む共有 client shell にある。
    既存 dynamic import により `TotalReturnChart` は 12.1KB、`SignalPieChart` は 335.3KB raw
    (`recharts` 332.9KB + wrapper 2.4KB) の lazy load へ退避済み。
    追加の初期削減候補としては `MtdChart` / `MtdDailyTable` の遅延化と
    `optimizePackageImports` の `lucide-react` / `date-fns` 適用が最有力。
  details: |
    ## Build / measurement notes
    - Preflight: `node v20.20.0`, `npm 10.8.2`, `node_modules` present
    - build attempt #1:
      - `npm run build`
      - fail: `PageNotFoundError: Cannot find module for page: /_document`
    - build attempt #2:
      - `npm run build`
      - success through `✓ Generating static pages (23/23)`
      - fail at final export cleanup:
        `ENOTEMPTY: directory not empty, rmdir '/mnt/c/Python_app/DM-signal/frontend/out/_next/static/media'`
    - Because the route table was not printed, the size list below is derived from the fresh
      `.next/app-build-manifest.json` emitted during attempt #2.

    ## AC1: 全ページ First Load JS 一覧（manifest-based raw JS, layout込み）
