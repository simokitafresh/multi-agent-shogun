result:
  summary: |
    FE の viewer 認証は二重保持である。真正な session は backend が発行する `viewer_session` HttpOnly cookie、FE 側補助状態は `localStorage['dm_viewer_token']`。PF切替では dashboard 本体の `performance(3y)`, `mtd`, `performance(all)` と、1.5 秒遅延の background prefetch 群が連続発火する。これら public API 呼び出しにも viewer active なら Bearer token が自動付与されるため、どれか 1 本でも 401 になると `api-client` が viewer token を即時消去し、全 UI を再認証モーダルへ倒す構造である。
  details: |
    ■ 1. viewer token の保存場所

    - backend `/api/auth/verify-viewer` は成功時に `viewer_session` cookie を設定し、同時に `{token, expires, tier_name}` を JSON 返却する (`backend/app/api/auth.py:21-73`)。
    - FE は `viewerAuth.saveToken()` で `localStorage['dm_viewer_token']` に token/expires/tier を保存する (`frontend/lib/viewer-auth.ts:1-14`)。
    - `viewerAuth.getToken()` / `isAuthenticated()` は localStorage のみを見る。cookie は JS から読まない (`frontend/lib/viewer-auth.ts:23-73`)。
    - IndexedDB は `api-cache` 用であり auth state 保存には使っていない。

    ■ 2. auth header 付与ロジック

    - `api-client.requestOnceInternal()` は `requiresAuth` 引数に関係なく、active admin/viewer があれば auth を自動付与する (`frontend/lib/api-client.ts:500-558`)。
    - viewer active 判定は `viewerAuth.isAuthenticated()` なので localStorage 基準 (`frontend/lib/api-client.ts:518-533`)。
    - viewer active の場合:
      1. fetch 自体は常に `credentials: 'include'` なので cookie は送られる。
      2. 加えて `viewerAuth.getToken()` が取れれば `Authorization: Bearer <token>` も付く。
    - backend `require_viewer()` は `viewer_session` cookie を先に見て、なければ Bearer header を見る (`backend/app/auth.py:242-261`)。

    ■ 3. PF切替時の API シーケンス

    初回ロード:
    - `SignalsProvider.loadSignals()` が `/api/signals` を叩く (`frontend/contexts/signals-context.tsx:93-135`, `frontend/lib/api-client.ts:906-907`)。
    - 成功後、選択 PF を決めて `prefetchTier1(selectedId)` を起動し、`/api/mtd`, `/api/performance?years=3`, `/api/performance?years=0` の 3 本を背景取得する (`frontend/contexts/signals-context.tsx:125-129`, `frontend/hooks/usePrefetch.ts:57-74`)。

    dashboard で PF を切り替えた時:
    - `selectPortfolio(id)` が `selectedId`・URL `?portfolio=`・localStorage を更新 (`frontend/contexts/signals-context.tsx:140-149`)。
    - 同時に `prefetchTier1Extra(id)` を 1.5 秒後に予約 (`frontend/contexts/signals-context.tsx:150-153`)。
    - dashboard effect が即時発火し、`getPerformance(id, 3)` を取得後、同 effect 内で `getPerformance(id, 0)` を続けて取得 (`frontend/app/dashboard/page.tsx:181-245`)。
    - 別 effect で `getMtd(id)` が並行実行 (`frontend/app/dashboard/page.tsx:247-279`)。
    - deterioration 一覧は mount 時 1 回だけ (`frontend/app/dashboard/page.tsx:281-310`)。
    - 1.5 秒後の delayed prefetch は `history`, `metrics`, `performance(20)`, `monthly-returns`, `annual-returns`, `drawdowns`, `rolling-returns`, `monthly-trade` をまとめて叩く (`frontend/hooks/usePrefetch.ts:82-113`)。

    ■ 4. 401 時の FE 挙動

    - 401 を返した request の authMode が `viewer` なら、`handleUnauthorizedResponse()` が `viewerAuth.clearToken()` を実行し、`viewer-auth-required` event を送る (`frontend/lib/api-client.ts:266-286,556-559`)。
    - これは endpoint 単位ではなく global side effect である。よって PF切替中の `performance` 1 本の 401 でも、他の page/API 含む viewer state 全体が落ちる。
    - `ViewerPermissionsProvider` は event 受信で再評価し、token 不在なら `role=null` へ戻す (`frontend/contexts/viewer-permissions-context.tsx:40-88`)。
    - `ViewerAuthModal` は event を受けてモーダルを開くが、成功後は再読込のみで自動再試行はない (`frontend/components/viewer-auth-modal.tsx:41-89`)。
    - `SignalsContext` 側に 401 専用の部分復旧はなく、`/api/signals` 以外の単発 401 を UI 局所障害として隔離しない (`frontend/contexts/signals-context.tsx:225-253`)。

    ■ 5. 直近 commit と本件の関係

    - `b488c0c` は「全 PF 83 API prefetch」をやめ、初回は selected PF 3 本だけに縮退した。PF切替時の delayed extra prefetch は残っているため、切替直後の fan-out は減ったが 401 連鎖構造自体は不変。
    - `3e515ca` は backend を `--workers 2` 化したが、その後 `a88b8da` で workers=1 に戻された。
    - さらに `ceeef51` と `3906843` で viewer/admin token store は DB 化され、当時の multi-worker 401 主因は現 HEAD では解消済み。
    - したがって現時点で PF切替 unauthorized が残るなら、主因候補は「cookie は server 側 truth、FE 判定は localStorage truth」という二重管理と、「viewer mode の request が 1 本 401 しただけで session 全体を落とす」点である。

    ■ 6. 再現しうる条件

    - `dm_viewer_token` が欠落/期限切れ/破損しているが cookie 側とは状態がずれる場合。
    - PF切替中の `performance` / `mtd` / delayed prefetch 群のいずれかが一時的 401 を返す場合。
    - in-flight request の一部成功・一部401が混在し、最初の 401 が global clear を起こす race。
