result:
  summary: "López de Prado の過適合・多重検定系講義/論文を基に、辞書エントリ `pitfalls/overfitting-causes-solutions.md` と `validation/multiple-testing-correction.md` を新規作成し、index と既存 method 相互参照も更新した。結論は、DM-Signal の大規模 GS では raw best Sharpe や Bonferroni 単独では不十分であり、family 定義 → cluster-first → BH/BY/Holm の使い分け → DSR/PBO/CPCV 併用が実務的である、である。"
  details: |
    ■ 実施内容

    1. 過適合エントリ新規作成
       - `docs/research/knowledge-base/pitfalls/overfitting-causes-solutions.md`
       - train-set overfitting / test-set overfitting の区別、主原因、PBO による検出、DM-Signal GS への埋め込み方、files_to_modify / affected_files / related_tests / edge_cases を記載。

    2. 多重検定補正エントリ新規作成
       - `docs/research/knowledge-base/validation/multiple-testing-correction.md`
       - FWER / FDR の定義、Bonferroni / Holm / BH / BY(BHY) の数式、DM-Signal における family 定義、exploratory と release gate での補正使い分け、実装例、4要件を記載。

    3. 索引と既存辞書の相互参照更新
       - `docs/research/knowledge-base/index.md` に V03 / PI02 を追加
       - `methods/oos-r-squared.md` と `methods/structural-break-tests.md` から新規エントリへリンクを追加

    ■ 一次情報の扱い

    - `https://www.quantresearch.org/Lectures.htm` から対象3講義の題名と要旨を確認
      - Overfitting: Causes and Solutions (2020)
      - A Practical Solution to the Multiple-Testing Crisis in Financial Research (2018)
      - Illegitimate Science (2015)
    - SSRN 本文は Cloudflare により直接取得不能だったため、指示どおり title + abstract/lecture summary から要点を抽出
    - 取得できた補助一次資料として以下を使用
      - L.N. Cohn 配布の `A Practical Solution...` PDF
      - Bailey et al. `The probability of backtest overfitting`
      - statsmodels 公式 docs (`fdrcorrection`)
      - Witzany の BH/BY 依存性整理

    ■ 新規知見の要点

    1. 多重検定の単位は raw candidate count ではなく、先に family を定義すべき
    2. 近接パラメータ群を独立 trial と数えると false discovery を過小評価するため、cluster-first が必要
    3. exploratory shortlist は BH、release gate は BY/Holm が安全
    4. Bonferroni は数本の high-cost decision には使えるが、154,350 パターン級 GS では過保守になりやすい
    5. holdout を持っていても再利用すれば test-set overfitting は防げない

    ■ 追加した実装直結ポイント

    - `grid_search_metrics_v2.py` に adjusted p-value 計算集約
    - `run_077_*` に family_id / cluster_id / trial manifest 出力
    - `grid-search-analysis-rule.md` の Bonferroni 中心説明を BH/BY/Holm + DSR/PBO へ改稿

