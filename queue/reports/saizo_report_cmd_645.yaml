result:
  summary: "H3(拡張機能)は INCONCLUSIVE、H6(buildId不一致)は現時点の live snapshot では DENIED。Next.js 14.2.3 export の実装と本番応答を突き合わせ、SPA判別法・click→router.push→fetchServerResponse の切り分け手順・拡張機能/BuildId検証手順を整理した。"
  details: |
    1. 担当仮説の検証結果

    - H3: ブラウザ拡張機能
      判定: INCONCLUSIVE
      根拠:
      - シークレットモード成功だけでは「拡張機能が原因」と断定できない。シークレットは extension 無効化だけでなく、通常プロファイルの Service Worker / cache / site data 差分も同時に外れるため、原因が混線する。
      - repo / live から extension 固有のエラーは採取できていない。
      - ただし `_rsc` fetch を妨害しうる拡張は存在しうる。特に広告ブロッカー、プライバシー保護、request modifier、CORS/security 系、script blocker、AV browser protection 系は要注意。

    - H6: buildId不一致
      判定: DENIED（2026-03-08 14:52-14:53 JST の live snapshot）
      根拠:
      - Next.js 14.2.3 の `fetchServerResponse()` は export モードで `/{route}/index.txt?_rsc=...` を fetch し、`currentBuildId !== buildId` の場合 `doMpaNavigation()` に落とす実装だった。
      - live の `https://dm-signal-frontend.onrender.com/dashboard/` から抽出した current buildId は `uTZQP6f3uLdmfkfkyFcLZ`。
      - live の `https://dm-signal-frontend.onrender.com/summary/index.txt` 先頭も `0:["uTZQP6f3uLdmfkfkyFcLZ"...]` で一致した。
      - よって steady-state の live 応答では buildId mismatch は再現していない。
      - ただし deploy 直後の stale HTML / stale SW / stale chunk が混在する瞬間的な mismatch 可能性までは否定しきれない。常時原因としては現時点で弱い。

    2. 新たに発見した事実

    - shared nav 3 箇所は現在すべて `window.location.href` 経由に戻っており、今の production rollback 状態では shared nav 自体は `next/link` / `router.push()` を通っていない。
      - `frontend/components/ui/dropdown-menu.tsx`
      - `frontend/components/sidebar.tsx`
      - `frontend/components/page-navigation.tsx`
    - live の `summary/index.txt` は現在 `Content-Type: text/x-component` を返している。ゆえに `cmd_643` 系の配信 header 修正は live には入っている。
    - 一方で live `sw.js` は依然として `index.txt` / `_rsc` を明示 bypass していない。`/_next/static/*` は Cache First で、route flight request は「その他の fetch」と同列に落ちるため、browser-side 要因として SW は引き続き残る。
    - `frontend/app/faq/page.tsx` の `router.push()` は repo に現存し、shared nav 以外に App Router の成功経路はある。

    3. SPA遷移かフルページ遷移かの判別手順（殿が実行可能）

    手順A: Network tabだけで判別
    1. Chrome で対象ページ（例: Dashboard）を開く
    2. `F12` → `Network`
    3. `Preserve log` を ON
    4. `Disable cache` を ON
    5. Filter 欄を `index.txt` にする
    6. Summary など別ページへ遷移させる
    7. 判定:
       - SPA成功: `/{route}/index.txt?_rsc=...` の `fetch` が出る。`document` タイプの `/summary/` が出ない。
       - フルページ遷移: `/summary/` が `document` として出る。JS/CSS の再読込が連鎖する。
       - click前で失敗: 何も出ない、または URL が変わらない。

    手順B: Console でも確認
    1. 遷移前ページの Console で以下を実行
       `sessionStorage.setItem('spaProbeFrom', location.pathname)`
    2. 遷移後ページの Console で以下を実行
       `({ currentPath: location.pathname, originalDocumentUrl: performance.getEntriesByType('navigation')[0]?.name, from: sessionStorage.getItem('spaProbeFrom') })`
    3. 判定:
       - SPA成功: `currentPath` は遷移先だが `originalDocumentUrl` は遷移前ページのまま
       - フルページ遷移: `originalDocumentUrl` も遷移先 URL に変わる

    4. `next/link` click -> `router.push` -> `fetchServerResponse` 全チェーンのデバッグ手順

    4-1. どこで止まっているかの見分け方
    - 段1: click ハンドラ不発
      症状: Console log も Network も何も出ない
      疑う点: overlay 被り、button disabled、DOM unmount、preventDefault、pointer event

    - 段2: `router.push()` までは到達、pathname 更新なし
      症状: click log は出るが URL/pathname が変わらない。`index.txt?_rsc=` も飛ばない
      疑う点: `href` 組み立て不正、trailing slash 不整合、router に渡した URL ミス

    - 段3: `fetchServerResponse()` で `_rsc` fetch 実行、だが SPA化せず MPA fallback
      症状: `index.txt?_rsc=` は 200 で飛ぶが、その直後に `/summary/` の `document` リクエストへ落ちる
      疑う点: buildId mismatch、flight response 不正、Service Worker 干渉、拡張機能干渉

    - 段4: `_rsc` fetch 自体が block/cancel/error
      症状: Network に `blocked`, `failed`, `canceled`、または status 異常
      疑う点: 拡張機能、Service Worker、CDN/cache、Content-Type不正

    4-2. 一時ログの挿入箇所
    - Link/Button の click ハンドラ直前
      目的: ユーザー操作が届いているか確認
      例:
      `console.log('[nav click]', href, location.pathname)`

    - `router.push(targetUrl)` の直前
      目的: 組み立てたURLが正しいか確認
      例:
      `console.log('[router.push]', targetUrl)`

    - `usePathname()` を読む client component の `useEffect`
      目的: Router state が実際に切り替わったか確認
      例:
      `useEffect(() => { console.log('[pathname changed]', pathname); }, [pathname])`

    - Browser Console で fetch monkey patch
      目的: `_rsc` request の status / content-type / final URL を見る
      例:
      `window.__origFetch = window.fetch; window.fetch = async (...args) => { const input = args[0]; const url = typeof input === 'string' ? input : input.url; const isRsc = url.includes('_rsc=') || url.endsWith('.txt'); if (isRsc) console.log('[rsc req]', url); const res = await window.__origFetch(...args); if (isRsc) console.log('[rsc res]', res.status, res.headers.get('content-type'), res.url); return res; };`

    4-3. Network tab で見るべき項目
    - `/{route}/index.txt?_rsc=...`
      - Status = 200 が基本
      - Content-Type = `text/x-component` が理想
      - Response 先頭 = `0:["<buildId>" ...]`
    - 直後に `/summary/` などの `document` が出るか
      - 出るなら SPA failure -> MPA fallback
    - `/_next/static/chunks/*`
      - 新規 chunk 読込は許容
      - 404 や古い chunk 名なら stale build を疑う

    5. H3 検証手順（拡張機能）

    1. 通常モードで `chrome://extensions/` を開く
    2. すべての拡張を一時 OFF
    3. 対象サイトのタブを閉じる
    4. 新規タブで開き直す
    5. `Application` → `Service Workers` で `Bypass for network` を ON、または `Unregister` を実行
    6. Hard Reload（リロード長押し → Empty Cache and Hard Reload）
    7. 再度 shared nav / test Link を試す
    8. これで改善したら、拡張を 1 個ずつ戻して再試験し犯人を特定する

    H3 confirmed 条件:
    - extensions 全OFFでは成功
    - 特定 extension を戻すと再発
    - Network 上 `_rsc` fetch の block/cancel/fail がその extension 有効時だけ起きる

    6. H6 検証手順（buildId不一致）

    1. 現在ページの Console で current buildId を取る
       `Array.from(document.scripts).map((s) => s.textContent?.match(/buildId\\\\\":\\\\\"([A-Za-z0-9]+)/)?.[1]).find(Boolean)`
    2. Network で target `index.txt?_rsc=` を開く
    3. Response 先頭の `0:["<buildId>"` を見る
    4. 判定:
       - 一致: H6 DENIED
       - 不一致: H6 CONFIRMED
    5. 追加で `/ _next/static/chunks/...` に 404 が出るなら stale build/chunk 不整合の可能性が高い

    7. 推奨アクション

    - 直近の切り分け優先順:
      1. `next/link` で shared nav を再実装する前に、最小の test button/page で `router.push('/summary/')` 単体実験を行う
      2. 上記実験中は `Application > Service Workers > Bypass for network` を ON にして SW を外した状態で first check
      3. 同条件で通常モード extensions 全OFF も比較し、H3 を先に潰す
      4. もし `_rsc` 200 の直後に document navigation が出るなら buildId 比較を実施する

    - 現時点の技術判断:
      - H3 は切る価値があるが、まだ証拠不足
      - H6 は steady-state 原因としては弱い
      - browser-side では SW が最も未解消の交絡要因として残っている
