    4. パイプライン全体で共通期間を統一する仕組み
    - `PipelineEngine` は `price_data_cache` / `momentum_cache` を `PipelineContext` に代入して block を順次実行するだけで、系列整列処理は持たない (`backend/app/services/pipeline/engine.py:90-115,221-245`)
    - block registry (`backend/app/jobs/shared.py:240-289`) も block class の対応表のみで、期間統一ロジックはない
    - FoF 実行側 `recalculate_fof.py` も `global_component_cache` を `price_data_cache` に詰めて `momentum_cache` を空にするだけ (`backend/app/jobs/recalculate_fof.py:429-475`)
    - 標準PF側 `recalculate_fast.py` の pipeline momentum precompute も ticker 単位で composite momentum series を作るだけ (`backend/app/jobs/recalculate_fast.py:980-1016`)

    結論:
    - 対象コード範囲では、共通期間を「全PFが揃う最古月〜最新月」として先に確定する処理は未実装。
    - 実装実態は「各 ticker / 各 PF を個別時系列として持ち、必要日の値を個別取得する」方式。
