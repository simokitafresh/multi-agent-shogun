result:
  summary: "ticker_monthly_returns の production 欠落は復旧し、monthly-returns API は precomputed path に戻った。加えて 0行再発を health/admin から即検知できる監視を追加した。ただし backend 全体 test suite は本cmd変更外の既存 failures により全PASSではない。"
  details: |
    実施内容:
    1. production DB の現状確認
       - `prices=86894`, `ticker_monthly_returns=0`, `monthly_returns=16448` を直接確認。
       - cmd_805 の観測どおり、ticker precompute 欠落が継続していた。

    2. 再生成
       - `sync_tickers()` を本番DB向けに実行。
       - 結果: `{'layer': 'L1_ticker', 'success': True, 'elapsed_sec': 32.21, 'stats': {'monthly_records': 4159, 'daily_records': 86894, 'run_id': '20260312_151330'}}`
       - 再確認で `ticker_monthly_returns=4159`, `ticker_daily_returns=86894`。

    3. 監視実装
       - `backend/app/services/ticker_precompute_health.py` を追加。
       - `backend/app/main.py` の `/healthz/deep` に `ticker_precompute` check を追加。
       - `backend/app/api/db_admin.py` の `/admin/db-status` に `ticker_monthly_returns`, `ticker_daily_returns`, `ticker_monthly_returns_ready`, `ticker_precompute_status`, `ticker_precompute_warning` を追加。
       - これにより `prices` があるのに `ticker_monthly_returns=0` の状態を degraded として即把握できる。

    4. precomputed path 検証
       - `MonthlyReturnsCalculator._calculate_ticker_returns_from_prices` を fail-fast 差し替えし、`calculate()` 成功で fallback 未使用を確認。
       - local uvicorn 実測でも `/api/monthly-returns` が cmd_805 baseline より大幅短縮した。

    5. テスト
       - 追加 unit test `backend/tests/test_ticker_precompute_health.py` は 3 passed。
       - 既存 `backend/tests/test_sync_layers.py` は 19 passed。
       - backend 全体 suite は本cmd外の既存 failure/error が残存。

