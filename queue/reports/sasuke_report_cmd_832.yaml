result:
  summary: "現行 stable code の shared nav は依然 `window.location.href` で、source 上の実遷移箇所は sidebar / dropdown-menu / HomeButton の3箇所でござる。Render Static Site + `output:'export'` 自体は SPA 遷移を妨げず、現行 `sw.js` にも `.txt/_rsc` bypass が残っているため、再導入の主論点は platform ではなく『shared nav をどの順で戻すか』『dropdown の cmd_642 再発をどう防ぐか』『preview/live で cache survival を最後に確認するか』に絞られる。"
  details: |
    実施内容:
    1. `projects/dm-signal.yaml` / `projects/dm-signal/lessons.yaml` / `context/dm-signal.md` を読んでPJ知識と既知教訓を再確認。
    2. 現行 shared nav 実装 (`sidebar.tsx`, `page-navigation.tsx`, `dropdown-menu.tsx`, `usePortfolioParam.ts`, `layout.tsx`, `sw.js`, `signals-context.tsx`) を行番号付きで確認。
    3. SPA遷移の経緯を `docs/future-01/005.md` と archive reports から追跡し、cmd_631→654 の根因を再整理。
    4. 関連 unit test `spa-navigation.test.tsx` を確認し、前提チェック後に局所実行した。

    現行コード所見:
    - shared nav 3箇所は全て `window.location.href`
      - `frontend/components/sidebar.tsx:195`
      - `frontend/components/ui/dropdown-menu.tsx:55`
      - `frontend/components/page-navigation.tsx:16`
    - `frontend/hooks/usePortfolioParam.ts:64-78` に `normalizeNavPath()` / `buildNavHref()` が既に存在するが、現行 shared nav はこの helper を使っていない
    - `frontend/app/layout.tsx:56-69` の root layout に `SignalsProvider`, `ViewerPermissionsProvider`, `Sidebar` が乗っているため、Link化が成功すれば page 遷移で provider を落とさずに済む
    - `frontend/public/sw.js:39-42` には現在も `.txt/_rsc` bypass が残っている

    過去失敗の構造:
    - `router.push()` 失敗 (cmd_631) と `Link` 失敗 (cmd_637/641) は「Static Export だから無理」ではなく、DM-Signal runtime 条件が shared nav の SPA だけを壊した事例
    - Layer 2 は cmd_642 で特定済み: portal 内 Link を click 同期で消すと navigation が cancel される
    - Layer 3(Content-Type) は歴史的には論点だったが、2026-03-08 live 観測では `text/x-component` が返っており、少なくとも現在の live host では一次阻害要因ではない
    - local static export では shared nav 3導線とも no full reload 実績があり、platform 条件は満たしている

    再導入の判断:
    - 最小 blast radius でやるなら `router.push()` の再挑戦より `Link + buildNavHref()` 再導入が妥当
    - ただし dropdown だけは cmd_642 の close timing 修正を必須条件とし、sidebar と同列には扱わない
    - preview/live で `document` request 0件、provider再マウントなし、`portfolio` クエリ維持、cache survival の4点が揃うまで全量置換は避けるべし

    失敗時 rollback 手順:
    - Phase1/2で失敗: 対象ファイルのみ `window.location.href` 実装へ戻す
    - Phase3(dropdown)で失敗: dropdown だけ revert して sidebar/HomeButton は保持可能
    - SWを触る場合のみ `CACHE_NAME` を更新して stale worker を切り替える
