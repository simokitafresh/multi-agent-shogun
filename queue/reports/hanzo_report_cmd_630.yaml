task_id: subtask_630_scout_a
parent_cmd: cmd_630
agent: hanzo
type: recon
status: done
completed_at: '2026-03-07T02:30:00'
summary: 'Claude Code Agent Teams(experimental)の公式ドキュメントを精査し、

  我が軍への取り込み可能性を2軸で分析した。

  結論: 現時点での全面移行は非推奨。Codex忍者排除・experimental不安定性・

  我が軍カスタムインフラの優位性が移行を阻む。部分採用も限定的。

  '
findings:
  axis1_chain_replacement:
    title: '調査軸1: 鎖の下層代替（家老→忍者間のインフラ置換）'
    A_architecture:
      title: Agent Teamsの基本アーキテクチャ
      lead_teammate_relation: 'Lead(1セッション)がチーム作成・Teammate生成・作業調整を担当。

        TeammateはそれぞれがClaude Codeの独立インスタンス。

        我が軍の「家老=Lead、忍者=Teammate」に構造的に対応する。

        '
      shared_task_list: 'チーム共有のタスクリスト。3状態: pending → in_progress → completed。

        タスク間の依存関係(dependencies)をサポート。

        完了依存の自動解除あり。flock排他でタスク取得の競合防止。

        保存先: ~/.claude/tasks/{team-name}/

        我が軍のqueue/tasks/*.yaml + deploy_task.shに相当。

        '
      teammate_communication: 'Mailboxシステムで直接通信。message(1対1)とbroadcast(全員)。

        メッセージは自動配信（Leadのポーリング不要）。

        idle通知もLeadに自動送信。

        我が軍のinbox_write.sh + inbox_watcher.shに相当。

        '
      independent_ctx: '各Teammateが独立コンテキストウィンドウ。

        spawn時にLeadの会話履歴は引き継がない。

        プロジェクトコンテキスト(CLAUDE.md/MCP/Skills)は通常通りロード。

        我が軍のtmuxペイン分離に相当。

        '
      claude_md_inheritance: 'Teammateはworking directoryのCLAUDE.mdを通常通り読み込む。

        Leadの会話コンテキストは継承しない。spawn promptのみ受領。

        '
      mcp_skills_inheritance: 'MCP: プロジェクト設定のMCPサーバーを継承。

        Skills: 継承しない。subagent定義のskillsフィールドで明示指定が必要。

        '
    B_enablement:
      title: 有効化方法と設定
      env_var: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
      settings_json: "{\n  \"env\": {\n    \"CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS\"\
        : \"1\"\n  }\n}\n"
      current_version: Claude Code 2.1.70 — 利用可能（experimentalフラグ必須）
      display_modes:
      - 'in-process: メインターミナル内。Shift+Downでcycle。追加設定不要'
      - 'split-panes: tmuxまたはiTerm2。各Teammateが独立ペイン'
      - 'auto(default): tmuxセッション内ならsplit、それ以外はin-process'
      teammate_mode_override: --teammate-mode in-process (CLIフラグ)
    C_coexistence:
      title: 我が軍インフラとの共存可能性
      inbox_replacement:
        verdict: 部分的に代替可能だが制約大
        detail: 'Agent Teamsの内蔵Mailboxは我が軍のinbox_write.sh/inotifywatchを

          機能的に代替できる。しかし以下の制約:

          (1) Agent Teamsのチーム構造内でのみ動作。チーム外(将軍→家老)には使えない

          (2) Codex忍者はAgent Teamsに参加できない(AC5で詳述)

          (3) 我が軍のinboxはflock+atomic writeで高信頼性を実現済み

          '
      gate_hooks:
        verdict: TeammateIdle/TaskCompleted hookで部分代替可能
        detail: 'TeammateIdle: exit code 2でフィードバック送信し作業継続を強制。

          TaskCompleted: exit code 2で完了をブロックしフィードバック送信。

          cmd_complete_gate.shの品質検証をhookとして差し込める可能性あり。

          ただしhookはshellスクリプト実行のためgate検証ロジックの移植が必要。

          '
      lesson_injection:
        verdict: 直接的な代替機構なし
        detail: 'Agent Teamsには教訓注入の概念がない。

          代替案1: spawn promptに教訓を埋め込む → deploy_task.shの教訓注入に相当

          代替案2: subagentのskillsフィールドで教訓をSkillとして注入

          代替案3: CLAUDE.mdに教訓を含める → 全Teammateに一律適用(粒度粗い)

          いずれも我が軍のタグベース精密注入(deploy_task.sh)には及ばない。

          '
      report_yaml:
        verdict: 構造化報告の仕組みなし
        detail: 'Agent Teamsにはタスク完了時の構造化報告(YAML)メカニズムがない。

          Teammateの完了通知はidle通知として自動送信されるのみ。

          我が軍の報告YAML(AC達成状況/lesson_candidate/decision_candidate)は

          TaskCompleted hookで検証することは可能だが、報告フォーマット自体は

          カスタム実装が必要。

          '
      ninja_monitor_clear:
        verdict: Agent Teamsは独立CTX管理だが/clear相当はなし
        detail: '各TeammateがAutocompact(95%デフォルト)で自動圧縮。

          ただし我が軍のninja_monitorが提供する以下は代替不可:

          - idle検知→無条件/clear(コスト節約)

          - STALE-TASK検出

          - auto-done判定

          - karo_snapshot自動生成

          - 状態遷移検知

          '
    D_migration_risk:
      title: 移行リスクと制約
      risks:
      - id: R1
        severity: CRITICAL
        title: Codex忍者排除（AC5で詳述）
        detail: Agent TeamsはClaude Code専用。Codex CLI忍者4名が参加不可
      - id: R2
        severity: HIGH
        title: experimentalステータス
        detail: '明示的にexperimentalと記載。既知制限多数:

          - /resume, /rewindでin-process Teammateが復元不可

          - タスクステータスの遅延（Teammateが完了マークを怠る場合あり）

          - 1セッション1チーム制約

          - ネストチーム不可（TeammateがTeammateを生成できない）

          - Lead固定（リーダーシップ移譲不可）

          - シャットダウンが遅い場合あり

          '
      - id: R3
        severity: HIGH
        title: カスタムワークフローとの相性
        detail: '我が軍の偵察→実装→レビューの3フェーズワークフローは

          Agent Teamsの想定ユースケース(並列調査/コードレビュー)とは

          異なる。Agent Teamsは「同時並行で異なる角度から作業」が得意だが、

          我が軍は「直列フェーズ+並列忍者配備」のハイブリッド。

          '
      - id: R4
        severity: MEDIUM
        title: 権限設定の粒度不足
        detail: '全TeammateがLeadの権限設定を継承。spawn時のper-teammate設定不可。

          我が軍はエージェント別にCLAUDE_CONFIG_DIRで環境分離済み。

          '
      - id: R5
        severity: MEDIUM
        title: split-pane制約
        detail: 'VS Code統合ターミナル、Windows Terminal、Ghosttyでは非対応。

          WSL2環境での安定性は未検証。

          '
  axis2_sennin:
    title: '調査軸2: 仙人構想の基盤'
    E_agent_teams_for_sennin:
      title: Agent Teamsの仙人への適用
      solo_lead:
        verdict: 技術的に可能だが不自然
        detail: '仙人を「1人チームのLead」として起動は可能。

          ただし「チーム」の概念を1人で使うのは設計意図に反する。

          通常のClaude Codeセッションで十分。

          '
      heartbeat:
        verdict: Agent Teamsでは実現不可
        detail: 'Agent Teamsに自律起床メカニズムはない。

          Leadがタスクを作成→Teammateが実行の受動的モデル。

          仙人の「cron/timerで定期的に起床→思索→/clear」サイクルは

          外部トリガー(cron/tmuxタイマー)が必須。

          Agent Teamsはこの外部トリガーを提供しない。

          '
      isolated_config:
        verdict: 部分的に可能
        detail: '仙人専用のCLAUDE.md: 別working directoryなら可能。

          仙人専用のMCP: subagent定義でmcpServers指定可能。

          仙人専用のSkills: subagent定義でskills指定可能。

          ただしAgent Teamsの設定ではなくsubagent定義の機能。

          '
      chain_separation:
        verdict: 可能だが不要
        detail: '別チーム=別セッションなので完全分離は可能。

          しかしそれは単に別のClaude Codeセッションであり、

          Agent Teamsの機能を使う理由がない。

          '
    F_comparison:
      title: 現行案 vs Agent Teams案
      current_plan:
        approach: tmux別window + cron/tmuxタイマー + 専用CLAUDE.md
        heartbeat: cron or tmux timer → send-keys で起床
        memory: queue/hermit/ に思索蓄積
        soul: 専用CLAUDE.mdにSOUL.md相当を記載
        separation: tmux別windowで物理的分離
        score: 3つの生命維持装置すべてを自然に実装可能
      agent_teams_plan:
        approach: 独立チームのLead + 自律タスク
        heartbeat: 外部トリガー必須(Agent Teams自体にはなし)
        memory: subagentのmemory機能(user/project/local scope)は使える
        soul: CLAUDE.md or spawn promptに記載
        separation: 別セッションで分離
        score: heartbeat不在が致命的。memory機能は有用だが単体利用可
      conclusion: '仙人には現行tmux案の方が3つの生命維持装置を自然に実装できる。

        Agent Teamsの唯一の利点であるmemory機能(persistent memory with scope)は

        subagent定義の機能であり、Agent Teamsなしでも利用可能。

        '
  codex_compatibility:
    title: 'AC5: Codex CLI忍者のAgent Teams参加可否'
    verdict: 参加不可能
    detail: 'Agent TeamsはClaude Code(Anthropic)の機能。

      Codex CLI(OpenAI, v0.111.0)は完全に別製品で相互運用性なし。

      Codex CLIの--helpにteam/agent-teams関連のオプションは存在しない。


      我が軍の編成はOpus4名(kagemaru/hanzo/kotaro/tobisaru) +

      Codex4名(sasuke/kirimaru/hayate/saizo)の混成。

      Agent Teams導入はCodex忍者4名の排除を意味する。


      これは我が軍の設計原則「最適CLI混成配備」に根本的に矛盾する。

      '
    impact: '- 忍者戦力が半減(8→4)

      - Codex忍者の100% impl成功率を喪失

      - round-robin配備の効率性が失われる

      - モデルコスト分散効果も消失

      '
ac_results:
  AC1:
    status: PASS
    evidence: 'findings.axis1_chain_replacement.A_architectureにて

      Lead/Teammate関係、共有タスクリスト(3状態+依存解決+flock排他)、

      Mailbox通信、独立CTX、CLAUDE.md継承、MCP/Skills継承を整理。

      '
  AC2:
    status: PASS
    evidence: 'findings.axis1_chain_replacement.C_coexistenceにて5項目を評価:

      inbox代替(部分的)、GATEフック(部分的)、教訓注入(代替なし)、

      報告YAML(代替なし)、ninja_monitor(代替なし)。

      総合: 我が軍インフラの方が高機能・高信頼。

      '
  AC3:
