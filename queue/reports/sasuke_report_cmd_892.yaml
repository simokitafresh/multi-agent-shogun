  details: |
    実施内容:
    1. Render CLI 認証を確認
       - 既存環境変数のままでは 401 / invalid header が出たため、`backend/.env` から `RENDER_API_KEY` を読み出し、quotes/CRLF を除去した値で CLI を実行。
       - `render whoami` は成功し、workspace 認証は有効と確認。

    2. 直近 deploy 一覧を取得
       - `render deploys list srv-d4ja8pp5pdvs739a5fsg -o json`
       - build_failed 3件は task YAML 指示どおり `7edae7c9` x2, `6d29637c` x1 だった。

    3. 各 deploy 時刻窓で build log を取得
       - `render logs -r srv-d4ja8pp5pdvs739a5fsg --start ... --end ...`
       - 3件とも `next build` 後の type check で同一エラー:
         `./app/monthly-returns/page.tsx:205:29`
         `Property 'isLoadingMore' does not exist on type 'IntrinsicAttributes & Props'.`

    4. コード照合
       - Render が参照した `7edae7c9` 時点の `frontend/components/monthly-returns-table.tsx` では
         `Props` は `data / isLoading / onLoadAll / autoExpandOnCompleteData` までで、`isLoadingMore` が存在しない。
       - 現在のローカル作業木では同ファイルに未コミット差分があり、
         `isLoadingMore?: boolean` の prop 追加、default 値、`Loading All...` 表示制御まで入っている。
       - 呼び出し側 `frontend/app/monthly-returns/page.tsx:212-218` は既に `isLoadingMore={isUpgradingMonthlyReturns}` を渡しているため、
         prop 定義だけが欠けた状態で main に載ったと判断できる。

    修正方針:
    - 原因分類: (a) コード起因
    - 最小修正対象:
      1. `frontend/components/monthly-returns-table.tsx`
         - `Props` に `isLoadingMore?: boolean` を追加
         - 関数引数で `isLoadingMore = false` を受ける
         - `isLoadingAll` を計算し、部分データ読込中は `Show All` ボタンを disabled + `Loading All...` 表示へ切替
      2. `frontend/components/__tests__/monthly_returns_open_toggle.test.tsx`
         - `isLoadingMore={true}` 時の `Loading All...` 表示を検証
    - 波及先:
      - `frontend/app/monthly-returns/page.tsx` の既存呼び出しはそのままで整合する
      - 月次リターン画面の「全件読込中」UI 表示にのみ影響し、他ページ・他componentの prop 契約には波及しない

    補足:
    - `queue/reports/sasuke_report_cmd_892.yaml` の配備テンプレートは未生成だったため、既存報告形式に合わせて補完した。
