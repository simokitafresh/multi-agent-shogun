result:
  summary: "/api/annual-returns の主因は TickerMonthlyReturn 全件ロード、MonthlyReturn 重複ロード、Signal.date 全件ロードの3点。最有力修正は annual_returns_calculator.py だけで完結し、計算結果と response shape を変えずに I/O を削れる。"
  details: |
    処理フロー:
    1. API route `backend/app/api/annual_returns.py:26-98`
    2. `AnnualReturnsCalculator.calculate()` で Portfolio 再取得
    3. `_calculate_from_monthly()`
       - `MonthlyReturn` 全件ロード
       - current month だけ `calculate_monthly_return()` で動的補正
       - `load_monthly_as_df()` で同じ `MonthlyReturn` を再ロード
       - `_get_portfolio_tickers()` で FoF を再帰展開
       - `_calculate_ticker_annual_returns()` で ticker月次→年次へ複利集約
       - `_get_date_ranges_for_partial_notes()` で Signal 全日付から YTD/start 注記を生成
    4. route 側で masking + ETag 応答

    代表実測:
    - Standard `DM-safe`: total `3313.6ms`, `13 queries`
      - `TickerMonthlyReturn` query `834.0ms`
      - `load_monthly_as_df()` duplicate `MonthlyReturn` read `290.3ms`
      - `Signal.date` full scan `288.3ms`
    - FoF `激攻-朱雀`: total `2538.7ms`, `19 queries`
      - `TickerMonthlyReturn` query `879.1ms`
      - `load_monthly_as_df()` duplicate `MonthlyReturn` read `292.3ms`
      - `_get_portfolio_tickers()` recursion `153.5ms / 2 portfolio queries`
      - `Signal.date` full scan `85.1ms`

    定量所見:
    - `TickerMonthlyReturn` は standard PF 5 ticker で `1215 rows` を取得。直近12年ぶん相当は `795 rows` で足り、約 `420 rows` が不要。
    - `Signal.date` は representative PF で `3950-4811 rows` を搬送しているが、必要なのは `ytd min/max` と `first_year min/max` の4値だけ。

    疑似diff:
    ```diff
    --- a/backend/app/services/annual_returns_calculator.py
    +++ b/backend/app/services/annual_returns_calculator.py
    @@
    -        df = load_monthly_as_df(self.db, portfolio.id)
    +        df = load_monthly_as_df(
    +            self.db,
    +            portfolio.id,
    +            monthly_return_cache=monthly_data,
    +        )
    @@
    -        monthly_ticker_returns = monthly_calc._calculate_ticker_monthly_returns(
    -            tickers, months_needed, current_year, current_month
    -        )
    +        min_year_month = (
    +            pd.Period(f"{current_year}-{current_month:02d}", freq="M")
    +            - (months_needed - 1)
    +        ).strftime("%Y-%m")
    +        monthly_ticker_returns = monthly_calc._calculate_ticker_monthly_returns(
    +            tickers, months_needed, current_year, current_month,
    +            min_year_month=min_year_month,
    +        )
    @@
    -        sig_data = self.db.query(Signal.date)...order_by(Signal.date).all()
    -        dates = [s.date for s in sig_data]
    -        ytd_dates = [d for d in dates if d.year == current_year]
    -        start_dates = [d for d in dates if d.year == first_year]
    +        ytd_min, ytd_max = self.db.query(
    +            func.min(Signal.date), func.max(Signal.date)
    +        ).filter(
    +            Signal.portfolio_id == portfolio_id,
    +            Signal.date >= date(current_year, 1, 1),
    +            Signal.date < date(current_year + 1, 1, 1),
    +        ).one()
    +        first_min, first_max = self.db.query(
    +            func.min(Signal.date), func.max(Signal.date)
    +        ).filter(
    +            Signal.portfolio_id == portfolio_id,
    +            Signal.date >= date(first_year, 1, 1),
    +            Signal.date < date(first_year + 1, 1, 1),
    +        ).one()
    +    ```

    優先順位:
    - P1: `min_year_month` 伝播
    - P2: `MonthlyReturn` 再読込削減
    - P3: `Signal` aggregate 化
    - P4: 余力があれば route の duplicate portfolio fetch (`backend/app/api/annual_returns.py:48-50` と `annual_returns_calculator.py:56-59`) も整理可能
