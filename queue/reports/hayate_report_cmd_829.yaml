  evidence: |
    `/api/annual-returns/{portfolio_id}` の処理フローは `backend/app/api/annual_returns.py:26-98` → `AnnualReturnsCalculator.calculate()` (`backend/app/services/annual_returns_calculator.py:40-64`) → `_calculate_from_monthly()` (`:66-243`) → `_get_portfolio_tickers()` (`:245-252`) / `_calculate_ticker_annual_returns()` (`:254-328`) / `_get_date_ranges_for_partial_notes()` (`:330-363`)。実測では representative standard PF `DM-safe` で total `3313.6ms / 13 queries`、内訳は `load_monthly_as_df 1304.4ms`, `_calculate_ticker_annual_returns 842.0ms`, `_get_date_ranges_for_partial_notes 315.1ms`。representative FoF `激攻-朱雀` では total `2538.7ms / 19 queries`、内訳は `_calculate_ticker_annual_returns 885.0ms`, `load_monthly_as_df 384.3ms`, `_get_portfolio_tickers 153.5ms`, `_get_date_ranges_for_partial_notes 89.1ms`。
- id: AC2
  status: pass
  evidence: |
    主ボトルネックは3点。1) `_calculate_ticker_annual_returns()` が `MonthlyReturnsCalculator._calculate_ticker_monthly_returns()` を `min_year_month` なしで呼び、`TickerMonthlyReturn` 全件を読む (`annual_returns_calculator.py:282-287` → `monthly_returns_calculator.py:362-368`)。実測でこの単一SQLが `834.0ms` (standard) / `879.1ms` (FoF)。standard PF では 5 ticker に対し `ticker_monthly_returns` を `1215 rows` 読んでおり、直近12年相当で足りる `795 rows` を約53%超過。2) `_calculate_from_monthly()` が `MonthlyReturn` を `.all()` で読んだ直後に `load_monthly_as_df()` でも同じ `MonthlyReturn` を再読している (`annual_returns_calculator.py:77-80`, `:132-135`; `data_loader.py:174-237`)。この重複読込が `290.3ms` (standard) / `292.3ms` (FoF)。3) `_get_date_ranges_for_partial_notes()` が `Signal.date` 全件をメモリへ引き上げて Python 側で `min/max` している (`annual_returns_calculator.py:343-361`)。representative PF で `signals_all=4811` / `3950` 件を読み、SQLだけで `288.3ms` / `85.1ms`。
- id: AC3
  status: pass
  evidence: |
    修正案は3本。A) `annual_returns_calculator.py:282-287` で `months_needed` から `min_year_month` を算出し、`_calculate_ticker_monthly_returns(..., min_year_month=...)` を渡す。これで precomputed 経路も fallback Price 経路も window query 化される (`monthly_returns_calculator.py:366-367`, `:471-479`)。B) `annual_returns_calculator.py:132-135` を `load_monthly_as_df(self.db, portfolio.id, monthly_return_cache=monthly_data)` に変更し、既に取得済み `MonthlyReturn` を再利用する。`data_loader.py:189-202` にキャッシュ経路が既に存在するため小差分。C) `annual_returns_calculator.py:343-361` の `Signal.date` 全件ロードをやめ、`func.min/func.max` による aggregate query へ置換する。YTD 用と first-year 用に2本の範囲クエリで十分。
