result:
  summary: "Next.js 14.2.3 の App Router/export 実装を確認。fetchServerResponse は本番 export で遷移先を .txt または /index.txt に変換し、_rsc query と RSC 系ヘッダを付けて flight を取得する。response は text/x-component に加え export 本番では text/plain 系も受理し、Content-Type不一致・非2xx・buildId不一致・fetch失敗時は browser navigation へ fallback する。よって H1/H2/H5 はいずれも DENIED。次段は本番で /route/index.txt?_rsc=... の status/content-type/body を採取すべき。"
  files_modified:
    - /mnt/c/tools/multi-agent-shogun/queue/tasks/sasuke.yaml
    - /mnt/c/tools/multi-agent-shogun/queue/reports/sasuke_report_cmd_645.yaml
  notes: |
    主要確認点:
    - 使用中バージョンは frontend/package.json の next 14.2.3。
    - fetchServerResponse は production かつ output=export のとき pathname を .txt / /index.txt に書き換える。
    - request headers は最低でも RSC: 1, Next-Router-State-Tree。条件付きで Next-Router-Prefetch, Next-Url。Accept は fetchServerResponse からは明示設定されない。
    - response 判定は通常 mode では content-type === text/x-component の厳密一致。export 本番では追加で content-type.startsWith('text/plain') を許容。
    - 不一致 or !res.ok は doMpaNavigation() でフルページ遷移へ降格。createFromFetch 失敗や network error も catch で同様に降格。
    - build/export 側は .next/server/app/*.rsc を frontend/out/**/index.txt へ copy しており、Static Export 非対応説はソース上否定される。
