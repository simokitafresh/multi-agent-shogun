result:
  summary: "CDP persistent daemon と AXTree based `@ref` 設計偵察を完了。Pure Python HTTP server は stdlib の `ThreadingHTTPServer` で足り、CDP transport は `websocket-client` 常駐接続 + WebSocket URL cache が最小導入。ref は `Accessibility.getFullAXTree` の `AXNode(nodeId,parentId,childIds,backendDOMNodeId,frameId,role,name,properties...)` を正規化して DFS 順に `e1,e2...` を振り、URL世代一致確認で stale ref を自動排除する設計が妥当。"
  details: |
    【既存前提の確認】
    - repo内の既存CDP実装は `scripts/cdp/cdp_helper.py` と `scripts/cdp/README.md` のみ。repo内 grep では他コードからの直接利用は未検出。
    - task参照先の `memory/cdp-browser-automation.md` は repo 内に存在せず、既存知識は `scripts/cdp/cdp_helper.py` と `context/auto-ops.md` / `docs/research/cmd_816_cdp-measurement-architecture.md` で補完した。
    - 外部実運用先 `auto-ops` 側では `cdp_send_batch()` と ws URL cache が既に有効で、daemon 化でもこの方針を踏襲すべき。

    【AC1: Pure Python HTTPサーバー設計】
    推奨構成:
    1. `http.server.ThreadingHTTPServer` + `BaseHTTPRequestHandler`
       - stdlibのみで足りる。`socketserver.ThreadingMixIn` 系なので request ごとに thread 分離できる。
       - `serve_forever()` / `shutdown()` / `server_close()` が揃っており、30分 idle 停止にも適合。
    2. `DaemonState` を1つ持つ
       - `token`
       - `last_activity_monotonic`
       - `browser_port`
       - `tab_id -> ws_url` cache
       - `ref_generation`, `snapshot_url`, `ref_map`
       - `fatal_error`
       - 上記を守る `threading.RLock`
    3. HTTP endpoint は最小6本で十分
       - `GET /healthz` : alive/fatal/idle seconds
       - `POST /browser/ensure` : CDP起動/接続確認
       - `POST /cdp/command` : 単発 CDP command
       - `POST /cdp/batch` : 複数 command を1WS接続で送信
       - `POST /ax/snapshot` : AXTree取得 + ref生成
       - `POST /ref/resolve` : ref -> backendDOMNodeId / AX metadata
    Bearer認証:
    - `self.headers.get("Authorization")` を読み、`Bearer <token>` 形式のみ許可。
    - 比較は `hmac.compare_digest()` で定数時間比較。
    - token未設定/不一致は常に `401`。header値はログへ出さない。
    Idle停止:
    - 各 request 成功前後で `last_activity_monotonic = time.monotonic()` を更新。
    - watcher thread が 5-30秒間隔で監視し、`now - last_activity_monotonic >= 1800` なら shutdown フラグを立て、別 thread から `server.shutdown()` を呼ぶ。
    - `shutdown()` 完了後に ws close / cache clear / `server_close()` を行い正常終了。
    障害時即死:
    - `websocket-client` の close / reset / timeout / malformed response は recover せず `fatal_error` に記録して `os._exit(1)` か、少なくとも non-zero で即終了する。
    - 理由: gstack と同じく browser crash 後に半死状態で ref cache を温存すると誤操作源になる。次回呼出で clean restart させる方が安全。

    【AC2: Accessibility Tree -> ref体系】
    一次資料ベースの `Accessibility.getFullAXTree` 要点:
    - 戻り値は `nodes[]`
    - 各 `AXNode` に `nodeId`, `ignored`, `role`, `chromeRole`, `name`, `description`, `value`, `properties`, `parentId`, `childIds`, `backendDOMNodeId`, `frameId` などが載る
    - `Accessibility.enable` を先に叩くと AXNodeId の安定性が増すが、navigation を跨いだ ref 永続化には使わない方が安全
    推奨アルゴリズム:
    1. `Accessibility.enable`, `Page.enable` を有効化
    2. `Accessibility.getFullAXTree` を取り、`nodeId -> node` と `parentId -> children[]` を構築
    3. root から DFS。順序は `childIds` を尊重
    4. interactive role のみ抽出
       - 例: `button`, `link`, `textbox`, `searchbox`, `combobox`, `checkbox`, `radio`, `switch`, `menuitem`, `tab`, `option`, `slider`, `spinbutton`
       - `ignored=true` は除外
    5. label は `name.value` 優先、空なら `description.value` / `value.value` を fallback
    6. 同一 `(role,label)` の出現数を先に数え、2nd pass で global traversal order に従い `e1,e2,e3...` を割当
    7. `ref_map[ref] = {backendDOMNodeId, axNodeId, frameId, role, label, ordinal}` を保存
    8. 実操作は `backendDOMNodeId` 起点で `DOM.resolveNode` / `Runtime.callFunctionOn` / `Input.dispatchMouseEvent` へ接続する
    gstackとの差分:
    - gstack は Playwright `ariaSnapshot()` 起点だが、我が軍は CDP `getFullAXTree` で同型の snapshot を作れる
    - ref文字列自体に意味を持たせず、metadata に ordinal を持たせる方が rename / duplicate に強い

    ページ遷移時 ref クリア:
    - 必須: `Page.navigate` / `Page.reload` を daemon 自身が呼んだ直後に `ref_generation += 1` して `ref_map` を空にする
    - 必須: ref操作の前に `Runtime.evaluate('location.href')` で current URL を取得し、`snapshot_url` と不一致なら stale と見なして `ref_map` を即時破棄
    - 拡張候補: 非同期 event loop を持つなら `Page.frameNavigated`, `Page.navigatedWithinDocument`, `DOM.documentUpdated` 受信でも invalidate
    - v1推奨は「post-navigate clear + pre-action URL guard」。event-only 依存より実装が小さく、SPA pushState も拾える

    【AC3: 実装直結まとめ】
    - repo事情上、`scripts/cdp/` 新規ファイルは `.gitignore` whitelist 追加が必要
    - CI は Bats + shellcheck 中心で、Python専用テストを増やすなら `.github/workflows/test.yml` と `Makefile` への導線追加が必要
    - 既存 `scripts/cdp/cdp_helper.py` は launch/detect の互換レイヤとして残し、新daemonから呼ぶ構成が最小差分
