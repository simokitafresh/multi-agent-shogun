ac_checklist:
  - id: AC1
    status: pass
    evidence: "Hamilton(1989)型の数理、状態数設計、遷移確率推定、翌月レジーム確率、84ヶ月×91PFへの適用案、ライブラリ比較、計算コスト、実装直結4要件を本報告に集約した。"
result:
  summary: "HMMによるレジーム推定は DM-Signal へ適用可能でござる。ただし `84ヶ月×91PF` では『91本独立HMM』も『91次元そのままの共通HMM』も不安定で、v1は `monthly_return_open` を用いた 2状態の共通 market-regime HMM を推奨する。PF別の翌月期待リターンは `P(S_{t+1}=k | y_{1:t})` と regime条件付き平均 `μ_{i,k}` の混合で出す設計が最も実装筋が良い。"
  details: |
    数学的定式化（Hamilton(1989)の最小形）:
    1. 潜在状態:
       - `S_t ∈ {1, ..., K}`
       - 遷移確率 `P(S_t = j | S_{t-1} = i) = p_{ij}`
       - 遷移行列 `P = [p_{ij}]`, 各行の総和は1
    2. 観測方程式（v1推奨: ARなし Gaussian emission）:
       - `r_t | S_t = k ~ N(μ_k, σ_k^2)`
       - DM-Signal では `r_t = monthly_return_open`
    3. Hamilton型AR拡張（必要時のみ）:
       - `r_t = μ_{S_t} + Σ_{l=1}^p φ_l (r_{t-l} - μ_{S_{t-l}}) + ε_t`
       - `ε_t | S_t=k ~ N(0, σ_k^2)`
       - ただし `T=84` では AR を入れると自由度が急減するため、v1 は `p=0` が安全
    4. Baum-Welch / EM 推定:
       - forward `α_t(k)=P(r_{1:t}, S_t=k)`
       - backward `β_t(k)=P(r_{t+1:T} | S_t=k)`
       - smoothed posterior `γ_t(k)=P(S_t=k | r_{1:T})`
       - pair posterior `ξ_t(i,j)=P(S_t=i,S_{t+1}=j | r_{1:T})`
       - M-step:
         - `p_{ij} = Σ_t ξ_t(i,j) / Σ_t γ_t(i)`
         - `μ_k = Σ_t γ_t(k) r_t / Σ_t γ_t(k)`
         - `σ_k^2 = Σ_t γ_t(k) (r_t-μ_k)^2 / Σ_t γ_t(k)`
    5. 翌月レジーム確率:
       - filtered current posterior を `π_t` とすると
       - `π_{t+1|t} = π_t P`
       - よって `P(S_{t+1}=k | r_{1:t}) = Σ_j P(S_t=j | r_{1:t}) p_{jk}`
       - 「来月も現在の regime k のまま」の確率を MAP state 基準で出すなら `p_{kk}` を返す

    状態数設計:
    - `K=2`（推奨v1）: `GOOD / DETERIORATING`
      - 理由: 84ヶ月では最も安定。transition matrix 4要素、label意味付けも容易
    - `K=3`（条件付き）: `GOOD / STAGNANT / DETERIORATING`
      - 条件: 共通HMM + 特徴量圧縮 or partial pooling を使う場合のみ
      - 84ヶ月のPF独立fitで3状態は、各状態の滞在月数が薄くなり遷移確率が暴れやすい
    - `K>=4`: 本件データ量では過剰。採用非推奨

    DM-Signal月次リターン（84ヶ月×91PF）への具体的適用設計:
    1. 入力系列:
       - `backend/app/jobs/deterioration_batch.py:37-65` と同様に `monthly_returns.monthly_return_open` を使用
       - `monthly_return_open IS NOT NULL` で MTD partial month を除外
       - RULE09/10 と整合するため close/open 混在は禁止
    2. v1推奨設計:
       - 91PFの raw 91次元ベクトルをそのまま emission にせず、各月を 4-6 個の縮約特徴へ落とす
       - 候補特徴:
         - 全PF cross-sectional median return
         - 全PF cross-sectional IQR or std
         - 上位群-下位群 spread
         - positive-return breadth（91PF中プラス月の比率）
         - safe-haven proxy との差
       - 共通 latent state `S_t` を market regime として推定
       - 各PFごとに regime条件付き平均 `μ_{i,k}` と分散 `σ_{i,k}` を後段で算出
       - 翌月期待リターン:
         - `E[r_{i,t+1} | r_{1:t}] = Σ_k P(S_{t+1}=k | r_{1:t}) μ_{i,k}`
       - 出力指標:
         - current regime posterior
         - stay probability
         - next-month regime probability vector
         - PF別 expected return / downside regime probability
    3. なぜ raw 91次元共通HMMを避けるか:
       - `T=84 < 次元91` で共分散推定が不安定
       - L291/L289 のとおりPF間相関が高く、91本を独立系列と見なせぬ
       - raw panel HMM は実装より先に次元圧縮と正則化の設計が必要
    4. なぜ 91本独立HMMを v1推奨にしないか:
       - PFごとに state label が入れ替わり比較不能（label switching）
       - 84ヶ月では transition 推定が noisy
       - 91本ぶん multi-start 管理と収束判定が必要で、運用コストの割に意味づけが弱い

    PFごとに独立HMMか、全PF共通HMMか、階層HMMか:
    - 案A: PF独立HMM
      - 長所: 実装が単純。PF固有の癖を直接表現できる
      - 短所: 84ヶ月では3状態以上が不安定。state間の意味もPFごとにずれる
      - 判定: offline研究なら可、本番v1の第一選択ではない
    - 案B: 全PF共通HMM（推奨）
      - 長所: 状態意味が全PFで揃う。transitionが安定。91PF相関を「市場共通環境」として自然に扱える
      - 短所: 91次元生データは不可。特徴量設計が必須
      - 判定: v1本命
    - 案C: 階層HMM / partial pooling HMM
      - 長所: 共通 regime を持ちつつ PF別 emission を shrinkage できる。統計的には最良
      - 短所: 実装と計算が重い。batch運用には過剰
      - 判定: v2/v3候補

    ベイズHMM（第1弾ベイズ推定との統合）:
    - 最も筋が良い統合は「HMMで regime posterior を出し、その posterior weight で PF別ベイズ持続確率を state-conditioned に更新する」案
    - 具体:
      - HMMから `w_{t,k}=P(S_t=k | r_{1:T})`
      - 各PF i, state k に対し `w_{t,k}` 重み付きで Normal-Inverse-Gamma posterior を推定
      - predictive は `Σ_k P(S_{t+1}=k | r_{1:t}) × StudentT_{i,k}` の mixture
    - これにより「市場環境が悪化 regime に入った時、このPFがなお勝つ確率」を一段深く定量化できる
    - 真の Bayesian HMM（transitionにDirichlet prior、emissionにNIG prior）も可能だが、v1 は EM HMM + ベイズ後段の二層分離が安全

    必要ライブラリ比較:
    - `hmmlearn`
      - 長所: `GaussianHMM` / `fit()` / `predict_proba()` が揃っており、Baum-Welch実装が軽量
      - 短所: Hamilton型ARまでは面倒を見ない。依存追加が必要
      - 向き: v1共通HMM batch の本命
    - `statsmodels`
      - 長所: `MarkovRegression` / `MarkovAutoregression` があり Hamilton(1989)文脈に最も近い
      - 短所: 汎用 multivariate HMM ではなく、共通特徴量HMMに使うなら設計の自由度が `hmmlearn` より低い
      - 向き: Hamilton型 research comparator、AR付き検証
    - `pomegranate`
      - 長所: `DenseHMM` と posterior 推定が柔軟
      - 短所: Torch系依存を含み重い。今回規模にはオーバースペック
      - 向き: 将来の柔軟モデル実験用
    - 現状の backend 依存:
      - `backend/requirements.txt` には `numpy/scipy` はあるが `hmmlearn/statsmodels/pomegranate` は未導入
    - 推奨:
      - v1実装は `hmmlearn` を追加して batch/service を組む
      - `statsmodels` は Hamilton型ARの研究用比較に限定し、最初から両方を本番依存にしない

    計算コスト見積り:
    - 共通 2状態 HMM（4-6特徴, T=84）:
      - 1 fit は軽微。月次 batch で <1秒級が現実的
    - 91本独立 2状態 HMM:
      - single-start なら数秒級
      - 10 restarts + convergence check を入れると 10-30秒級
    - 3状態 + AR + multi-start:
      - 数十秒〜数分。84ヶ月ではコストより不安定性が問題
    - 階層/Bayesian HMM:
      - 分〜時間。現行 monthly batch の cadence には不向き

    実装方針の結論:
    - `deterioration.py` へ直書きせず、独立 service / batch / snapshot table / API で切るのが安全
    - 理由:
      - P(det) は rolling mean の方向付き悪化判定
      - HMM は latent state / transition / posterior の別系統
      - 同一モジュールに混ぜると unit test と API意味が濁る

    一次資料:
    - hmmlearn docs: https://hmmlearn.readthedocs.io/en/stable/api.html
    - pomegranate HMM tutorial: https://pomegranate.readthedocs.io/en/latest/tutorials/B_Model_Tutorial_4_Hidden_Markov_Models.html
    - statsmodels MarkovRegression: https://www.statsmodels.org/stable/generated/statsmodels.tsa.regime_switching.markov_regression.MarkovRegression.html
    - statsmodels MarkovAutoregression: https://www.statsmodels.org/stable/generated/statsmodels.tsa.regime_switching.markov_autoregression.MarkovAutoregression.html
