result:
  summary: "watchdog不発火の主因は `LAST_STREAM_ACTIVITY` を『意味のある受信』ではなく『read成功した全行』で更新している設計でござる。keepalive/Open行が継続すると30分watchdogは永遠に延命され、coproc FD閉鎖や単純なreadブロック自体は今回の根因ではない。"
  details: |
    1) watchdogロジック精査
    - `scripts/ntfy_listener.sh:317-319` で `read -t` 成功時に無条件で `LAST_STREAM_ACTIVITY=$(date +%s)` を更新している。
    - しかし実際のイベント判定はその後の `process_stream_line()` 内 `scripts/ntfy_listener.sh:190-196`。`event != message`（keepalive/open等）や `outbound` も捨てる設計で、watchdog時刻更新条件と「有意味イベント」条件がズレている。
    - そのため ntfy が keepalive を出し続ける、または outbound 行だけでも流れる状況では、殿の新規メッセージが50分来なくても `NOW_EPOCH - LAST_STREAM_ACTIVITY` が30分に達しない。

    2) coproc FD/read挙動の検証
    - 再現1: `coproc T { sleep 10; }` に対して `read -t 2 -u "${T[0]}"` を実行すると 2秒後に rc=142 で復帰。無出力で子が生存していても `read -t` は永久ブロックせず、watchdogループは回り続ける。
    - 再現2: keepalive行を3秒ごとに流す疑似streamで、watchdog閾値5秒にして同等ロジックを回すと、毎回 read成功直後に activity が0へ戻り、watchdogは一度も発火しなかった。
    - 再現3: 子プロセス終了後は `read` が失敗し、後段 `kill -0 "$STREAM_PID"` 側で break/reconnect に進む。FD閉鎖/EOFそのものは「watchdogが回らない」原因ではない。

    3) watchdogループを実際に止めうる別経路
    - `process_stream_line()` は同一スレッドで動き、`download_attachment_image()` の `curl -sS --fail ...` (`scripts/ntfy_listener.sh:174`) には `--max-time` が無い。巨大添付や通信停止でここが長時間ぶら下がると、その間は watchdogループ自体が止まる。
    - ただし今回症状は「curl本体生存・50分受信なし」であり、平時に最も整合する説明は keepalive/outbound による activity 延命でござる。

    4) flock単一起動ガードの再起動影響
    - `scripts/ntfy_listener.sh:11-13` の `flock -n 200 || exit 0` は多重起動防止としては妥当。
    - ただし旧listenerがハングしたまま lock を保持している状態で、新しい `ntfy_listener.sh` をそのまま起動しても第2プロセスは「already running」で exit 0 する。監視側や手動運用が exit code だけを見ると「再起動成功」に見える。
    - 小テストでも同等の非block flock は 2本目が rc=1 で取得失敗した。よって restart は必ず旧PID kill と対で行う必要がある。

    5) 根本原因の推定
    - cmd_597 の狙いは「30分間受信なしなら kill→再接続」だったが、現実装は「30分間 1行も読めなければ kill」でござる。
    - ntfy keepalive/open/outbound のような“無害な行”が流れ続ける限り watchdog AC2 は満たされない。今回の50分沈黙は、この意味論のずれが第一容疑である。

    6) 根治策案
    - 案A（推奨, 低コスト, 高信頼）: `LAST_STREAM_ACTIVITY` を `process_stream_line()` 側へ移し、戻り値で「inbound message/attachmentを実処理した時だけ」更新する。keepalive/open/outbound では更新しない。実装差分は小さい。
    - 案B（中コスト, 最高信頼）: watchdogを2系統化する。`LAST_BYTE_ACTIVITY` は read成功で更新、`LAST_MESSAGE_ACTIVITY` は message処理成功で更新し、前者で接続死、後者で“意味のある受信停滞”を別判定する。症状切り分けに最も強い。
    - 案C（低コスト, 中信頼）: `curl --max-time` を30分未満へ短縮する。単純だが正常keepalive中でも定期切断が増え、根本の意味論ずれは残る。

