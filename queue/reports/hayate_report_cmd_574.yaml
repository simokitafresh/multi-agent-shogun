result:
  summary: "偵察B完了。analytics summary APIのtier集計は `page_views.tier_id` 起点で、adminは現実装では `Unauthenticated` に吸収される構造と確定。admin独立表示には集計SQLのみでなく、track時の識別情報保持を追加する必要あり。"
  details: |
    【1. GET /api/analytics/summary 実装位置】
    - ルート定義: `backend/app/api/analytics.py:108-114`
    - tier別集計本体: `backend/app/api/analytics.py:142-165`
      - `page_views` を `viewer_tiers` に outer join
      - `group_by(PageView.tier_id, ViewerTier.name)`
      - `tier_name` がNULLなら "Unauthenticated" を付与

    【2. active_tiers が構築される現行ロジック】
    - track時tier抽出: `backend/app/api/analytics.py:60-85`
      - admin認証済みなら即 `None`（:62-63）
      - viewer token でも tier_id in {"", "admin", "legacy"} は `None`（:78-80）
      - 有効な viewer_tiers.id のみ tier_id として記録（:82-84）
    - page view保存: `backend/app/api/analytics.py:97-104`
      - `tier_id=_extract_tier_id(...)` の結果をそのまま `page_views.tier_id` へ保存
    - スキーマ制約: `backend/app/db/models.py:418`
      - `page_views.tier_id` は `viewer_tiers.id` FK（NULL許容）

    【3. tier認証フロー（影響範囲確認）】
    - Viewer認証: `backend/app/api/auth.py:31-73`
      - DB `viewer_tiers` 走査、`password_env_key` で照合
      - 一致時 `generate_viewer_token(tier_id=matched_tier.id, tier_name=matched_tier.name)`
    - Legacy fallback: `backend/app/api/auth.py:53-60`
      - `tier_id="legacy"` を付与
    - Admin認証: `backend/app/auth.py:168-189`, `214-236`
      - viewer_tiersとは独立した admin_session / Basic Auth 判定

    【4. admin独立表示のための修正案】

    案A（推奨・最小変更寄り）: 予約Tier `admin` を明示管理
    - 変更点:
      1) `track_page_view` の `_extract_tier_id` で admin認証時は `"admin"` を返す（現行None返却を変更）
      2) `viewer_tiers` に予約行 `id='admin', name='admin', password_env_key=NULL` をmigrationで保証（ON CONFLICT DO NOTHING）
      3) Tier管理APIで予約行の編集/削除を禁止（保護）
    - 期待効果:
      - `active_tiers` で adminが独立行として集計される（既存queryをほぼ流用可）
    - 既存Tier認証への影響:
      - `verify_viewer` は `password_env_key` 未設定行をskip（`backend/app/api/auth.py:38-40`）するため、予約admin行でviewer認証が壊れない
      - admin認証系はviewer_tiers非依存のため直接影響なし
    - 注意点:
      - Tier一覧UIに予約admin行が出ると運用混乱するため、管理APIまたはUIで非表示/保護が必要

    案B（中規模）: `page_views` に `auth_role` 列追加（admin/viewer/unauthenticated）
    - 変更点:
      - track時に role を保存し、summaryは role + tier で集計
    - 期待効果:
      - FK設計を崩さず adminを確実に分離
    - 影響:
      - migration + API + 型修正が必要（案Aより変更面積大）

    案C（不採用）: summary SQL側だけUNIONでadmin行生成
    - 不採用理由:
      - 現在の `page_views` には admin識別子が保持されておらず、集計時点で admin/unauthenticated の分離不能

    【結論】
    - 現在の主因は "track時点でadminをNULL化"（`backend/app/api/analytics.py:62-80`）。
    - admin独立表示を要件化するなら、集計SQL単体では不足し、track時の識別保持追加が必須。
