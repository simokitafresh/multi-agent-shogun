result:
  summary: "AFML 3手法は DM-Signal に適用可能だが、導入位置は分けるべきである。Fractional Differentiation は『学習 fold 内だけで d を自動選定する前処理層』、Purged CV は『既存 GS の上位評価層』、Meta-Labeling は『既存方向モデルの上に載る第2段確信度モデル』が最も整合的である。推奨順序は ①GS共通 evaluator と event-span 定義を先に作る ②Purged CV で既存忍法/四神選定を leakage-free 化する ③Fractional Diff を特徴量層へ追加する ④Meta-Labeling で『PFを持つべきか』の確率を出す、である。"
  details: |
    ■ 1. Fractional Differentiation

    数学:
    - 分数次差分は一般化二項展開で `x_t^(d) = Σ_{k>=0} ω_k x_{t-k}`、重みは `ω_0=1`, `ω_k = -ω_{k-1}(d-k+1)/k`
    - `d=0` は元系列、`d=1` は通常一次差分。`0<d<1` で unit root を弱めつつ低周波記憶を残せる
    - 実装は expanding だと初期値依存が大きいので、AFML 系の fixed-width fracdiff が自然

    DM-Signal への適用設計:
    - 主入力は PF月次より `prices`/`ticker_daily_returns` の日次系列が本命。PF月次84-169点だけで d 推定すると情報量が弱い
    - 既存 `scripts/analysis/grid_search/gs_data_loader.py:87-199` は月次 returns/cumulative を返すだけなので、日次 series + event month へ変換する loader 追加が必要
    - 既存 `run_077_oikaze.py:61-149` の lookback/top_n グリッドに「特徴量前処理層」として差し込むのが自然で、既存 block ロジック自体は壊さない方が安全
    - `d` 自動最適化は `statsmodels.tsa.stattools.adfuller` で unit-root 棄却を確認しつつ、元系列との相関が最大限残る最小 `d` を binary search で探す設計が妥当
    - 重要: `d` 探索は必ず各 training fold 内でのみ実施。全期間で一度だけ最適化すると test fold へ leakage する

    PFリターン系列での位置付け:
    - `monthly_return_open` の SSOT は既に `backend/app/services/deterioration.py:23-197` と `backend/app/jobs/deterioration_batch.py:37-224` で使われている
    - PF月次系列では fracdiff を「生系列の置換」ではなく、「Bayes/構造変化/Meta 用の stationary feature view 追加」として扱うべき
    - 既存 P(det) や構造変化検定に対し、`recent mean`, `drawdown`, `vol`, `fracdiff mean/std/slope` を説明変数として追加できる

    ■ 2. Purged Cross-Validation

    数学:
    - test fold に含まれる event 区間 `[t0, t1]` と overlap する training event は purge し、さらに `t1` 後に embargo を置くことで look-ahead bias を除去する
    - 月次 rebalance 戦略では「ラベル月」だけでなく、lookback 窓と保有 horizon を含めた event span を持たせないと purge が不十分

    DM-Signal への適用設計:
    - 既存 lessons L286/L283 と整合し、Purged CV は pipeline block ではなく GS runner の evaluator 層に置くのが正しい
    - `docs/rule/ninpou-fof-creation-runbook.md:164-280` と `run_077_oikaze.py:124-142` が現状 monthly 固定 GS の中心。ここに `PurgedKFold/CPCV` を追加し、各忍法 runner 共通で再利用する
    - event 定義は「feature_end = signal month」「label_end = 次回 rebalance 月末/次回 holding return 確定月」で統一するのが DM-Signal の RULE02/03/05 と整合
    - purge 対象は overlap event 全件、embargo は少なくとも最大保有 horizon(通常1 rebalance cycle)ぶん必要
    - 91PF panel は独立サンプルではないため、PF横断 pooling を使う場合は month cluster を壊さない split が必要

    GS統合:
    - 最小変更は `scripts/analysis/grid_search/afml_cv.py` 新設 + `run_077_*` から呼ぶ evaluator 化
    - `backend/app/schemas/pipeline.py:18-67` と `backend/app/jobs/shared.py:240-285` は v1 では変更不要。Purged CV は live pipeline block ではなく offline 評価規則だから
    - 既存 champion 選定は raw IS/OOS + 隣接感度だが、ここへ Purged/CPCV mean score, dispersion, acceptance gate を足すのが自然

    ■ 3. Meta-Labeling

    数学/役割:
    - 第1モデルは方向/候補選定（どの PF を持つか or どの swap を提案するか）
    - 第2モデルは「その第1モデルに従うべきか」の conditional probability を出す。方向と確信度の分離が本質
    - DM-Signal では『PFを保有すべきか』または『現在PFから候補PFへ swap すべきか』を 0/1 ラベル化し、`predict_proba` を殿の求める確率表示へ直結できる

    DM-Signal 設計:
    - primary model は既存忍法/四神/P(det) flag/champion rule をそのまま再利用できる
    - meta features は `p6/p12/p24`, `g1/g2`, recent drawdown, realized vol, turnover, current-vs-candidate momentum spread, fracdiff特徴量、必要なら構造変化フラグ
    - target は「次 rebalance 区間で current_hold を上回る」「Cash 回避が有効」「swap 後 Calmar 改善」など一貫した business label を 1つに固定する必要がある
    - 推奨は `hold/reject` の二値確率。多クラスより運用判断へ直結し、月次リバランス設計とも整合しやすい
    - raw classifier score を確率扱いせず、calibration(Platt or isotonic) を Purged CV の内側で行うべき

    既存システムとの接続:
    - UI/API に確信度を出すなら `backend/app/db/models.py:878-912` の snapshot 拡張、`backend/app/jobs/deterioration_batch.py:74-170` の計算追加、`backend/app/api/deterioration.py:21-177` の返却拡張で吸収できる
    - ただし v1 は backend へ入れる前に GS/offline evaluator で calibration と leakage 監査を済ませるべき

    ■ 4. 推奨アーキテクチャ

    Phase 1（最優先）
    - `scripts/analysis/grid_search/afml_cv.py` 新設
    - event span 定義を `signal month -> next rebalance month` で固定
    - 既存 `run_077_*` に Purged/CPCV evaluator を共通注入

    Phase 2
    - `scripts/analysis/grid_search/afml_features.py` 新設
    - fracdiff(d探索込み) を training fold 内 preprocessing として追加
    - feature 出力を Bayes/構造変化/Meta の候補へ再利用

    Phase 3
    - `scripts/analysis/grid_search/afml_meta_labeling.py` 新設
    - primary rule + meta probability + calibration + threshold search を実装
    - 十分な OOS 安定性が確認できたら backend snapshot/API に昇格

    ■ 5. 外部参照（要点のみ）
    - `fracdiff/fracdiff` README: fixed-width fractional differentiation 実装の参照
    - `statsmodels` ADF documentation: d 自動選定時の unit-root 判定に使用
    - AFML/MLFin 系ドキュメントの meta-labeling / purged CV 設計を参照
