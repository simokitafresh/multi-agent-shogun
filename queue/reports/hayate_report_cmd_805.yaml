result:
  summary: "/api/monthly-returns の現状主因は `expanded_tickers` ではなく、production DB で `ticker_monthly_returns` が空のため fallback に落ち、しかも fallback が `Price` 全履歴を読む設計になっていることだった。`months=12` でも 7.8s 級になる根因はここにある。"
  details: |
    実施内容:
    1. `projects/dm-signal.yaml` / `projects/dm-signal/lessons.yaml` / `context/dm-signal.md` / `queue/archive/reports/*cmd_775*` / `queue/archive/reports/tobisaru_report_cmd_791_20260311.yaml` を読んで先行調査との差分を確認。
    2. `backend/app/api/monthly_returns.py` と `backend/app/services/monthly_returns_calculator.py` / `return_calculator.py` / `price_ratio_calculator.py` / `db/models.py` を精読。
    3. ローカル uvicorn を `127.0.0.1:18000` で起動し、admin Basic Auth で `/api/monthly-returns` を実測。
    4. SQLAlchemy event / cProfile / monkeypatch で関数別タイミングと query 実態を取得。
    5. in-memory 擬似パッチで fallback window 化の短縮幅と返却整合を確認。

    現状の処理フロー:
    - route: `backend/app/api/monthly_returns.py:26-112`
    - precomputed monthly rows: `backend/app/services/monthly_returns_calculator.py:98-139`
    - response 構築: `backend/app/services/monthly_returns_calculator.py:141-318`
    - ticker returns 取得: `backend/app/services/monthly_returns_calculator.py:341-456`
    - fallback price scan: `backend/app/services/monthly_returns_calculator.py:458-548`
    - current month MTD 再計算: `backend/app/services/monthly_returns_calculator.py:222-233` → `backend/app/services/return_calculator.py:53-195`

    主要所見:
    - `ticker_monthly_returns` は production DB で 0 行だった。`MonthlyReturn` は 16448 rows, DM-safe-2 は 225 rows あるが、ticker precompute だけ未投入。
    - そのため `_calculate_ticker_monthly_returns()` は毎回 fallback へ落ち、`_calculate_ticker_returns_from_prices()` が `Price.symbol.in_(tickers)` のみで全履歴を `.all()` している。
    - この fallback は `months` も `min_year_month` も見ていないため、quick path (`months=12`) でも全履歴読み + 全月 resample を支払う。
    - さらに current month 1件だけ `calculate_monthly_return()` を再実行しており、warm でも約1.9s残る。

    擬似diff相当:
    ```diff
    --- a/backend/app/services/monthly_returns_calculator.py
    +++ b/backend/app/services/monthly_returns_calculator.py
    @@
    -        return self._calculate_ticker_returns_from_prices(tickers, months)
    +        return self._calculate_ticker_returns_from_prices(
    +            tickers,
    +            months,
    +            min_year_month=min_year_month,
    +        )
    @@
    -    def _calculate_ticker_returns_from_prices(self, tickers, months):
    +    def _calculate_ticker_returns_from_prices(self, tickers, months, min_year_month=None):
             stmt = select(Price).where(Price.symbol.in_(tickers))
    +        if min_year_month:
    +            y, m = map(int, min_year_month.split("-"))
    +            stmt = stmt.where(Price.date >= date(y, m, 1))
             stmt = stmt.order_by(Price.symbol, Price.date)
    ```

    補足:
    - `_get_date_ranges_for_partial_notes()` の `Signal.date` 全件読込は warm で約82ms。ここは secondary issue で、一次ボトルネックではなかった。
    - `year_month` など未使用フィールド削減は payload 縮小には効くが、現状の支配項は JSON ではなく `Price` / MTD 計算である。
