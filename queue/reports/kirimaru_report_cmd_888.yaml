ac_results:
  - id: AC1
    status: pass
    evidence: |
      GSD関連は `*gsd*` ファイル名では未検出だったが、内容は
      `docs/research/cmd_709_system-comparison.md` §3 と
      `docs/research/system-comparison-2026-03-13.md` §2.3 に集約されていた。
      抽出できた「検知→自動修復」相当パターンは次の3本でござる。
      1) Context Monitor:
         PostToolUse hook が CTX残量を監視し、35%で WARNING、25%で
         CRITICAL + pause-work 促進を注入。5-tool debounce 付き。
         これは「劣化検知→停止/圧縮へ誘導」の予防型ループで、
         直接修復 daemon ではない。
      2) 4段階検証ラダー:
         Existence → Substantive → Wiring → Functional の順に欠陥を検知。
         stub/TODO/empty handler/hard-coded test data/console.log を
         機械的に弾き、失敗した層へ差し戻して再修正させる構造。
      3) Deviation Management:
         bug / blocker / required quality は自己修復、
         design change だけ人間介入へ送る境界線を持つ。
      結論として、GSDは「自動修復そのもの」より
      「検知を構造化し、自己修復してよい範囲だけ自動で回す」設計が強い。
  - id: AC2
    status: pass
    evidence: |
      `docs/research/gstack-analysis.md` §2, §3 と
      `context/infrastructure.md` の cmd_875-878 反映を照合した。
      gate×skill自動修復へ転用しやすいパターンは次の4本。
      1) browse daemon:
         サーバー未起動/Chromiumクラッシュ時、次回CLI呼出で自動再起動。
         trigger=次回アクセス、fallback=再spawn、人間介入は連続失敗時のみ。
      2) Suppressions:
         false positive を報告前に抑制し、修復ループがノイズで暴走するのを防ぐ。
         gateでは [CRITICAL]/[INFO] 分離と組み合わせるのが有効。
      3) stop_for / never_stop_for:
         main/merge conflict/test failure/version bump 等だけ停止し、
         それ以外は自動継続。修復 loop の停止条件を明文化できる。
      4) Two-pass Review:
         blocking 問題と informational 問題を分離し、
         gate が反応すべきトリガーを細くできる。
      応用結論:
      「gateが異常を検知 → stop_for分類 → 対応skill/手順へ自動委譲 →
      再gate」の bounded loop が本命で、常駐 daemon を先に作るより
      `cmd_complete_gate.sh` / `deploy_task.sh` 側の構造化が先でござる。
result:
  summary: "GSDは『検知→自己修復許可範囲の限定→再検証』の構造化が強く、gstackは daemon再起動・Suppressions・stop_for/never_stop_for・Two-pass Review で gate×skill 修復 loop の停止条件とノイズ抑制を提供する。推薦は常駐daemon先行ではなく、gate結果を stop_for / CRITICAL-INFO / AUTO-FIXABLE に分類して skill へ流す bounded repair loop 先行でござる。"
  details: |
    GSD所見:
    - Context Monitor は 35%/25% の閾値で degradation を早期検知するが、
      修復アクションは pause-work 促進であり、背景自動修復ではない。
    - 4段階検証ラダーは stub/wiring/functional 欠陥の検知精度が高く、
      再実装ループの入口として流用価値が高い。
    - Deviation Management により「何を自動修復してよいか」の境界が明確。

    gstack所見:
    - daemon永続化は「死んだら次回呼出で再起動」という軽量自己回復。
    - Suppressions は修復 loop の偽陽性洪水を抑える安全弁。
    - stop_for/never_stop_for は自動継続可能領域を明文化し、
      不要確認を減らしつつ危険領域だけ停止できる。
    - Two-pass Review は gate の blocking 条件を細く保つ。

    gate×skill loop への応用:
    1. gate出力を CRITICAL / INFO / AUTO-FIXABLE に分類する。
    2. AUTO-FIXABLE だけ repair skill / deploy_task metadata へ渡す。
    3. stop_for に一致したら停止、人間判断へ送る。
    4. 修復後に同じ gate を再実行し、再発なら backoff して打ち切る。
