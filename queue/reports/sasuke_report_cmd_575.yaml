result:
  summary: "cmd_575のauto_deploy未発火は、ninja_monitor.shがstatus=doneをauto_deploy判定対象から除外していたことが原因。done経路でもcheck_and_update_done_task→auto_deploy発火を通す修正と再現テストを追加した。"
  details: |
    1) 根本原因特定 (AC1)
    - `scripts/ninja_monitor.sh` の `is_task_deployed()` は `status =~ ^(assigned|acknowledged|in_progress)$` の時だけ
      `check_and_update_done_task()` を呼んでいた。
    - そのため、忍者側でtask YAMLが先に `status: done` へ更新されると、
      報告YAMLがdoneでもauto_deployブロックに入らず `auto_deploy_next.sh` が未発火になる。
    - 実ログでも `cmd_575` について `logs/auto_deploy.log` に開始エントリがなく、
      `logs/ninja_monitor.log` でも `AUTO-DONE` が出ていないことを確認。

    2) 修正実装 (AC2)
    - `scripts/ninja_monitor.sh`
      - `is_task_deployed()` の対象statusを `assigned|acknowledged|in_progress|done` に拡張。
      - `status=done` でも `check_and_update_done_task()` を評価し、成立時は既存の
        `AUTO_DEPLOY_DONE` 重複防止を維持したまま `auto_deploy_next.sh` を発火。
      - `check_and_update_done_task()` 不成立時の `status=done` は従来どおり未配備扱いに維持し、
        `@current_task` クリア挙動も保持。

    3) テスト追加・回帰確認 (AC3)
    - 新規: `tests/unit/test_ninja_monitor_auto_deploy_done.bats`
      - `status=done` でも `check_and_update_done_task()` が呼ばれ、auto_deployが発火する再現テスト。
      - `status=done` かつ未完了判定ではauto_deployが発火しないことを確認。
    - 既存回帰: `tests/unit/test_ninja_monitor_stall.bats`

