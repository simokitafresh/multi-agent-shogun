      - `canonical_as_of.get_canonical_as_of`
      - `Signal.date == as_of_date`
      - `PortfolioFolder.all`
    - 可変 469 query:
      - `Portfolio` SELECT 251
      - `Signal latest<=date` 218

    request-scope cache 設計:
    - 実装方式: route ローカル dict を関数引数で渡す
      - `portfolio_cache: dict[str, Portfolio]`
      - `signal_cache: dict[str, dict[date, dict[str, Any] | str]]`
    - cache key:
      - portfolio: `portfolio_id`
      - signal: `portfolio_id + signal_lookup_date`
    - value:
      - standard PF: `holding_signal` 文字列でも可
      - pipeline FoF/KalmanMeta 互換のため `{signal, holding_signal, weights}` を推奨
    - auth/tier を key に含めない理由:
      - cache 対象は DB 上の Signal/Portfolio 解決だけ
      - viewer/admin 差は `signals.py:144-152` の MaskingConfig と `188-203` / `217-246` のマスキング段で後処理される
      - visible portfolio の選別も route 側 (`139-160`) で先に済む

