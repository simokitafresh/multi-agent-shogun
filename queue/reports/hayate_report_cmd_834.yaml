    エッジケース整理:
    - RULE08:
      - `signals.py:177-181` の `component_signal_date=signal_date` は維持必須
      - cache hit 時も `component_signal_date` を lookup key として扱うこと
    - KalmanMeta:
      - `price_ratio_calculator.py:1048-1066` は `momentum_data.weights` を使う
      - cache value から `weights` を落とすと挙動が変わる
    - viewer/admin:
      - request-scope cache は masking 前の raw解決用なので安全
      - endpoint TTL cache を後段でやるなら `tier_id/is_admin/current_date/as_of_date/calculated_at` を key に含めるべし
    - recursion:
      - `get_portfolio_all_tickers()` (`839-926`) は visited set + max depth
      - `expand_portfolio_to_tickers()` は max depth のみ
      - 今回の cache 化で悪化はしないが、循環FoF対策としては別件で visited 導入余地あり

