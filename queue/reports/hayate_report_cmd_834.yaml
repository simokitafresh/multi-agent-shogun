       - `canonical_as_of.build_pending_map()` で pending projection 判定
    3. `backend/app/api/signals.py:138-204`
       - standard 53件は整形のみ
       - FoF 38件だけ `expand_portfolio_to_tickers()` (`178-181`) へ進む
    4. `backend/app/services/price_ratio_calculator.py:989-1158`
       - `get_signal_payload_at_date()` が component PF ごとに latest<=date を取りに行く
       - `portfolio_cache` 未注入だと `Portfolio` を毎回引き直す
       - nested FoF では 1081-1098 の再帰で同じ component を何度も舐める
    5. `backend/app/api/signals.py:265-281`
       - folder 一覧取得で終了

