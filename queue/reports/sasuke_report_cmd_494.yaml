result:
  summary: "`/api/signals` は `as_of` 当日スナップショットの `holding_signal` をそのまま返す実装で、月替わり pending 投影を持たない。DB照合では monthly standard 23件すべてで `2026-03-02 holding_signal == 2026-02-27 signal` が成立し、`as_of=2026-02-27` と `as_of=2026-03-02` の比較で表示値が 10/23 件変化した。"
  details: |
    偵察対象:
    - backend/api: /mnt/c/Python_app/DM-signal/backend/app/api/signals.py
    - backend/jobs: /mnt/c/Python_app/DM-signal/backend/app/jobs/recalculate_fast.py
    - docs: /mnt/c/tools/multi-agent-shogun/docs/research/cmd_499_march-holding-signal-validation.md

    コード事実:
    1) /api/signals のデータ供給経路
      - 最新 standard signal の日付を `as_of_date` に採用: signals.py L87-L103
      - standard PFは `raw_signal = sig.holding_signal or sig.signal`: signals.py L178-L181
      - standard PFには `Signal.date <= as_of_date` のフォールバックや月替わり投影分岐なし
        （FoFのみ `<= as_of_date` フォールバックあり: signals.py L140-L145）

    2) monthly holding の生成ロジック（計算側）
      - 月変わり判定: recalculate_fast.py L1422-L1423
      - リバランス月の月初に `current_holding_signals = last_generated_signals` を適用: L1427-L1430
      - 日次保存で `holding_signal` を signals に書込み: L1641-L1646
      - コメントで「月中のシグナル変化は保有に反映しない」明記: L1655-L1657

    3) DB照合（本番PostgreSQL, read-only）
      - monthly active standard PF: 23
      - signals件数: 2026-02-27 = 23件, 2026-03-02 = 23件
      - 検証: `3/2 holding == 2/27 signal` は 23/23 一致
      - `as_of=2/27` 相当表示 vs `as_of=3/2` 相当表示で、`holding` 表示値は 10/23 件で変化
      - 例: DM2 (`2/27 holding=TECL`, `2/27 signal=TQQQ`, `3/2 holding=TQQQ`)
      - prices日付分布: 2026-02-27=13件, 2026-03-02=13件（2/28,3/1は0件）

    4) AC1再現（等価再現）
      - 2026-03-02 pre-open 相当: `as_of=2026-02-27` を表示基準にする状態
      - 2026-03-03 pre-open 相当: `as_of=2026-03-02` を表示基準にする状態
      - /api/signals は as_of固定スナップショットのため、月跨ぎで表示が切り替わる。

