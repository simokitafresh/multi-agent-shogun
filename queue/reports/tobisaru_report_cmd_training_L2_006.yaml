result:
  summary: ntfy_listener.sh精査完了。全10関数+メインループの構成・判定条件・入出力・エラーハンドリングを網羅的に記載。grep高速dedup(L286)がyaml.dumpの出力形式と不整合で事実上無効化している点を教訓候補として報告。
  details: '## 関数構成(10関数+メインループ) ### JSON解析関数群 - parse_json(field): python3でJSON fieldを抽出。エラー時空文字列(L80-82)
    - parse_tags(): tagsリストをカンマ区切り文字列に変換(L84-86) - parse_attachment_field(key): attachment.{key}をネスト取得(L88-90)
    - sanitize_attachment_name(name): basename+非英数字除去。デフォルトattachment.png(L92-103)

    ### コア処理関数 - append_ntfy_inbox(msg_id,timestamp,message,status): flock排他+python3
    YAMLシリアライザで原子書込み。corrupt inbox検知時CORRUPT_DIR退避+新規開始。戻値: 0=written,2=duplicate,1=error(L105-201)
    - download_attachment_image(url,name): curl --max-time 30sでDL→タイムスタンプ付保存→latest.png更新(L210-234)
    - to_repo_relative_path(path): SCRIPT_DIR前置を除去しリポ相対パスに変換(L203-208) - mark_message_activity():
    LAST_MESSAGE_ACTIVITY更新(L236-238) - should_restart_stream(now,last_stream,last_msg):
    watchdog判定。ストリーム無応答120s or メッセージ無応答1800sでtrue(L240-258)

    ### メイン処理 - process_stream_line(line): 受信メッセージ処理パイプライン(L260-375): 1. EVENT!=message→スキップ
    2. outboundタグ→スキップ(自己送信除外) 3. 制御文字サニタイズ(tr -d) 4. 画像添付処理(DL+inbox_write) 5. 空メッセージ+添付なし→スキップ
    6. MSG_ID grep高速dedup 7. MCASフィルタ 8. append_ntfy_inbox原子書込み 9. 将軍pane tmux注入(paste-buffer+flock排他+agent_id検証)
    10. バックアップ: inbox_write shogunへ通知

    ### メインループ(L394-435) - coproc curlストリーミング(--no-buffer, keepalive 30s, max-time
    3600s) - read -t 5sポーリング→process_stream_line - watchdogチェック→stream kill+再接続(5s
    delay) - check_script_update()でスクリプト変更自動再起動

    ## エラーハンドリング・例外ケース 1. 多重起動防止: flock -n(L15-16)。LIB_ONLYモード時はスキップ 2. corrupt inbox:
    python3がYAMLError検知→CORRUPT_DIRにバックアップ後空データから再開(L134-158) 3. 重複検知: 二重防御(grep高速チェックL286
    + python原子append内dedup L165) 4. 将軍pane安全: agent_id検証(L331-335)。非shogunなら注入中止 5.
    tmux注入排他: flock -w 5 + timeout 5(L347-360)。失敗時inbox-onlyフォールバック 6. 添付DLタイムアウト:
    30s(L222)。失敗時一時ファイル削除(L231) 7. メッセージ200文字切り詰め(L339-342) 8. curlストリーム断: watchdog
    120s/1800s + 自動再接続 9. MCASフィルタ: アーカイブ済みプロジェクトのアラート除外(L307-309) 10. TOPIC未設定: 即exit
    1(L32-35)

    ## 発見事項(教訓候補) L286のgrep高速dedup: パターン id: 引用符MSG_ID引用符 はpython3 YAMLシリアライザの出力形式と不一致。シリアライザは単純英数字列に引用符を付けず
    id: abc123 と出力する。grepパターンは引用符付きを探すため一致しない。結果として高速dedup層は事実上無効。L165のpython原子dedup層が正しく機能するため実害なし。'
