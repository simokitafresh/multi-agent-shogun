  title: "Compose で固定テーマ定数が広く直参照されている時は Material colorScheme 追加だけでは多テーマ化できない"
  detail: "今回の Android UI は `Kinpaku` / `Zouge` / `Surface4` などの戦国色トークンを多画面で直接参照していたため、`lightColorScheme` を足すだけでは Light/Black へ切り替わらなかった。既存 UI を大規模書換えせず多テーマ化するには、静的定数を `CompositionLocal` 経由の動的パレットへ昇格させ、既存トークン名のまま mode-aware にする方が安全。"
