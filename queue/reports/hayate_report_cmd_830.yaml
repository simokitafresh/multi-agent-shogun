result:
  summary: "Monthly Returns warm 悪化の本体は TTL 切れではなく、persistent data cache と非永続 ETag のミスマッチにより warm reload でも `/api/signals` と monthly-returns 12/120 の再検証が full 200 で走ることだった。prefetch と page 自身の fetch が重なり、ETag は reload 境界で実質無効化されている。"
  details: |
    主要所見:
    1. SWR は cache hit でも network を止めない。
       - `frontend/lib/api-client.ts:517-535` が stale cache を返した直後に background revalidation を起動する。
       - したがって warm = request zero ではない。

    2. ETag 実装は same-tab では効くが hard reload では切れる。
       - `apiCache` は IndexedDB 永続化 (`frontend/lib/api-cache.ts:131-186`)。
       - `etagStore` はメモリ Map のみ (`frontend/lib/api-client.ts:250-253`)。
       - reload 後の cache hit では stale data は復元できても validator が消えるため、再検証は `If-None-Match` なしの 200 full payload になる。

    3. Monthly Returns ページは warm 時でも複数 key を再取得しやすい。
       - SignalsProvider cached path が current page prefetch を起動 (`frontend/contexts/signals-context.tsx:130-143`)。
       - monthly-returns page prefetch は `12` と `120` の 2 key を常時投入 (`frontend/hooks/usePrefetch.ts:203-205`)。
       - page 本体も `120` を毎回呼ぶ (`frontend/app/monthly-returns/page.tsx:45-71`)。`120` cache miss 時は `12→120` の二段 fetch (`frontend/app/monthly-returns/page.tsx:74-121`)。

    4. 退行の説明:
       - warm reload では `/api/signals` revalidation 1 本に加え、monthly-returns の `12` / `120` が低優先度で走る。
       - `frontend/lib/api-client.ts:245-246` の semaphore=4 に収まるため同時進行しやすく、計測値は server jitter と race の影響を受ける。
       - `cmd_826` の 186ms は page render の純粋悪化というより、この再検証 traffic を含む warm 定義のぶれが顕在化した数値と読むのが妥当。

    推奨順:
    1. ETag の persistent 化で reload 後も 304 を成立させる。
    2. monthly-returns page の prefetch を 120 優先 1 本へ縮退し、同ページ自己 fetch と重複させない。
    3. その後に再計測して 129ms 基準との差を確認する。
