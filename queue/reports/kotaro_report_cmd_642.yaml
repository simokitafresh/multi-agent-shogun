  found: true
  title: "useEffectの依存配列にstate変数を含めると意図しないタイミングでeffectが発火する"
  detail: "useEffect([closeMenu, isOpen, pathname])でisOpenが依存にあると、メニューを開く操作(isOpen: false→true)でもeffectが発火しcloseMenu()が即実行される。pathname変化のみに反応させたい場合は[pathname]のみを依存配列にすべき。Reactのexhaustive-depsルールは万能ではなく、意図と依存配列の整合性を人間がレビューする必要がある。"
  project: dm-signal
