         - ただし docs は依然として Phase 3 の正本を `cpcv_full_validator.py` と記述 (`analysis_runs/docs/pipeline-architecture.md:176-208`)。
         - `analysis_runs/results/archive/.../cpcv_validation.md` も `Generated by cpcv_full_validator.py` を名乗るため、コード実体と文書/成果物の参照先が乖離している。
      2. Purge/Embargo:
         - A/C実装 (`cmd_1013_cpcv_cat_ac.py:145-183`) は test群の左右それぞれ `PURGE_MONTHS + EMBARGO_MONTHS` 本を train から落とす対称実装で、purge と embargo を概念的に分離していない。
         - B実装 (`cmd_1013_cpcv_cat_b.py:154-188`) は左側1M purge、右側2M buffer と非対称で、A/C と B で挙動が揃っていない。
         - どちらも幅は固定1M/1Mで、イベントspanや embargo率から算出する仕組みはない。月次144ヶ月では実務上の簡易近似にはなるが、原典準拠を名乗るには根拠が薄い。
      3. PBO計算ロジック:
         - López de Prado/Bailey 系の原義は、train順位から得た test 側相対順位 `omega` を logit変換し、`lambda <= 0` となる確率を PBO とみなす流れ。
         - A/C実装 (`cmd_1013_cpcv_cat_ac.py:393-418`) は `test_rank > len(labels)/2` の比率のみを PBO としており、相対順位の正規化も logit もない。
         - B実装 (`cmd_1013_cpcv_cat_b.py:261-301`) は「train champion の test Sortino が test中央値以下」の割合を PBO としており、A/C と定義も異なる。
         - よって現行cmd_1013群は「中央値以下率ベースの簡略PBO」であり、厳密な PBO 実装ではない。
      4. 評価指標の柔軟性:
         - Sortino は両スクリプトでローカル関数にハードコード (`cmd_1013_cpcv_cat_ac.py:77-94`, `cmd_1013_cpcv_cat_b.py:99-113`)。
         - 差し替え点が抽象化されておらず、CLI引数/strategy pattern/metric registry もないため、Sortino→Sharpe なら局所改修で済むが、Max Run-up 等の path-dependent 指標差し替えは fold evaluator 全体の再設計が要る。
      5. cmd_1013比較:
         - A/C は full-sample best も fold champion も Sortino (`cmd_1013_cpcv_cat_ac.py:374-375`, `393-397`)。
         - B は fold champion 選抜は Sortinoだが、full champion は Sharpe優先 (`cmd_1013_cpcv_cat_b.py:222-225`) で、サマリー表の "Full Sharpe" と PBO側指標が混在。
         - さらに旧Phase 3 docs は benchmark超過勝率・p値・effect size・tier を主責務としており (`analysis_runs/docs/pipeline-architecture.md:180-196`)、cmd_1013群はこのI/Oを満たしていない。
      6. 補助調査:
         - `analysis_runs/experiments.db` の live schema には `grid_search_candidates` テーブルが存在せず、確認できたのは `daily_prices/economic_indicators/monthly_returns/signal_history/...` のみ。
         - 一方 `analysis_runs/_INDEX.md:6-16,81-92` は `grid_search_candidates` や `portfolios` がある前提で書かれており、docs/index と実DBの鮮度ズレがある。
         - `monthly_returns` の live schema は `portfolio_id, year_month, return_close, return_open, signal, benchmark_return` (`PRAGMA table_info(monthly_returns)`) で、cmd_1013 はこのテーブルを直接使って月次系列を再構成している。
    original_source_vs_interpretation:
      original_source:
        - López de Prado 系CPCVの基本形は「N群分割・C(N,k)組合せ・purging/embargo適用」。
        - Bailey & López de Prado 系PBOは、test側相対順位を `omega` とし、`lambda = log(omega/(1-omega))` の符号で OOS劣位確率を測る。
      interpretation:
        - 現行cmd_1013群は「C(6,2)=15 fold の combinatorial split」は満たすが、PBOは相対順位logitではなく中央値以下率へ簡略化されている。
