    3. 30 分無通信時は curl PID を kill して `Connection timeout` とともに再接続。
    4. `--max-time 3600` により watchdog 未発火でも 1 時間ごとに強制再接続し、`--keepalive-time 30` で TCP keepalive も有効化。
    5. 既存の dedup / atomic append / 添付DL認証 / shogun通知経路は `process_stream_line()` へそのまま保持。
