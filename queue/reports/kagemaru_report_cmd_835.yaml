ac5:
  status: PASS
  title: warm退行解消の根拠
  regression_analysis: "cmd_804: Monthly Returns warm = 129ms\ncmd_826: Monthly Returns\
    \ warm = 186ms (+44%)\n\n退行の真因:\n- リロード後、etagStore(メモリ)が消滅\n- If-None-MatchなしでBEにリクエスト\
    \ → 200フル応答\n- apiCacheのIndexedDB永続化は存在するが、SWRパターンにより:\n  L517-536: apiCache.get()\
    \ → cache hit → 即返却 + background revalidation開始\n  background revalidation: requestOnce()\
    \ → ETag無し → 200フル応答(無駄)\n\n129msベースラインはETag未導入時(cmd_804)の値。\n186msはETag導入後だがメモリのみのため、revalidation時に200フル取得。\n"
  with_a4_persistence: "リロード後のフロー:\n1. apiCache.get() → IndexedDB hit → 即返却(~5-10ms)\n\
    2. background revalidation: requestOnce() 実行\n3. etagStore → メモリ空 → IndexedDBから復元\
    \ → If-None-Match送信\n4. BE: ETag照合 → データ未変更 → 304(空body)返却\n5. 304: apiCache.get()\
    \ → data取得 → TTLリフレッシュ\n\n改善効果:\n- 304応答: BEの計算時間は同じだがJSON serialize + ネットワーク転送をスキップ\n\
    - Monthly Returnsレスポンスサイズ: ~5-15KB(PF依存) → 304は~100byte\n- 予測: background revalidation時間が短縮\
    \ → onUpdate()発火タイミングは影響なし\n  (SWRパターンのため初回表示速度には影響しない。revalidation完了後のUI更新が高速化)\n"
  expected_outcome: 'warm退行の直接解消ではなく、background revalidation効率化。

    初回表示(apiCache hit)は現行と同じ。

    ネットワーク帯域とBEレスポンス時間の削減(304 vs 200)。

    本番日次更新頻度(1日1回)を考慮すると、日中はほぼ常に304。

    '
  caveat: 'BE側のETag計算コスト: generate_etag()はdata全体をJSON.dumps→MD5。

    計算自体のコストは残る。削減されるのはネットワーク転送+FEパース時間のみ。

    Monthly Returnsの129→186ms退行が純粋にETag喪失由来かは、

    他の変更(cmd_804→cmd_826間)の影響も考慮が必要。

    '
