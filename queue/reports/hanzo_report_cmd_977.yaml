result:
  summary: "BLOCKED — Renderデプロイ失敗(update_failed)。deterioration.pyのAnnotated+future annotations互換性バグ"
  details: |
    ■ デプロイ状況
    - commit 1be7b592 push済み → Render build成功 → deploy失敗(update_failed)
    - 旧バージョン(dep-d6r7h0ffte5s73adif2g)にロールバック済み
    - healthz OK / /api/p-average → 404 (旧コードにはエンドポイント未登録)

    ■ 失敗原因（Renderログから特定）
    pydantic.errors.PydanticUndefinedAnnotation: name 'Session' is not defined

    deterioration.py の変更が原因:
    - 変更前: db: Session = Depends(get_db)  ← 動く
    - 変更後: db: Annotated[Session, Depends(get_db)] + from __future__ import annotations  ← 壊れる

    `from __future__ import annotations` により全annotationが文字列(ForwardRef)になる。
    Pydantic 2.6が `Annotated[Session, ...]` を解決する際、`Session`を
    module globals内で見つけられず PydanticUndefinedAnnotation が発生。

    ■ 修正方法（2案）
    案A: deterioration.py から `from __future__ import annotations` を削除
    案B: `Annotated[Session, ...]` を元の `Session = Depends(...)` 構文に戻す
    ※ p_average.py も同じパターンだが、deterioration.pyが先にimportされて先にクラッシュ

    ■ 結論
    stop_for条件「BE API(/api/p-average)が404を返す場合（前段未完了）」に該当。
    deterioration.pyのバグ修正 → 再push → Renderデプロイ成功後に再配備が必要。
