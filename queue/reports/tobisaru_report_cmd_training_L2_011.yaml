result:
  summary: inbox_watcher.sh精査完了。16関数+メインループ構成。inotifywaitイベント駆動+3段リトライ+4層nudge判定+セキュリティホワイトリストの堅牢なメールボックス監視スクリプト。669行。
  details: '## 関数構成（16関数）

    1. get_unread_info() [L91-117]: Python3で未読情報一括抽出。TAB区切り(count/has_specials/fingerprint/specials_b64)。1回のPython呼出しで旧5回分のI/O削減(107ms→39ms)。例外時fail-safe("0\tfalse\t\t")。

    2. mark_special_read() [L121-157]: 特殊メッセージ(clear_command/model_switch)既読化。flock
    -w 5 + Python3 atomic write(tmpfile+os.replace)。

    3. write_state_file() [L159-167]: 状態ファイル書込み(flock保護)。

    4. touch_state_file() [L169-176]: 状態ファイルtouch(flock保護)。

    5. refresh_debounce_file() [L178-183]: デバウンスタイムスタンプ更新。

    6. get_first_unread_age() [L185-195]: 最初の未読検出からの経過秒数算出。

    7. mark_first_unread_seen() [L197-201]: 最初の未読検出時刻記録。

    8. clear_first_unread_seen() [L203-205]: 未読検出時刻クリア。

    9. maybe_force_idle_flag() [L207-223]: FORCE_IDLE_AFTER_SEC(60秒)超過でidle flag強制作成。claude
    CLI限定。

    10. get_fp_age() [L226-236]: fingerprintファイルのmtime経過秒数。

    11. get_effective_cli_type() [L241-255]: CLI種別3段解決(pane @agent_cli→settings.yaml→codex
    fallback)。

    12. send_cli_command() [L260-313]: /clear・/model送信。cli_profiles.yamlのclear_method/clear_cmdで動的解決。restart方式(Ctrl-C+launch_cmd)とcommand方式(/clear等)を分岐。

    13. agent_has_self_watch() [L318-320]: pgrepで自己inotifywait検知。

    14. send_wakeup() [L327-439]: 4層nudge判定: Tier1=self-watch skip → Tier1.3=busy
    check(idle flag/@agent_state) → Tier1.5=debounce(10秒) → Tier2=paste-buffer+Enter。flock付きtmux操作。nudge後idle
    flag消費+@agent_state=active設定。

    15. process_unread() [L445-615]: メイン処理サイクル。特殊メッセージ先行処理(busy時defer)→通常nudge(fingerprint
    dedup)→即時リトライ(3回)→BACKOFF(120秒)。

    16. cleanup_inbox_watcher() [L628-638]: EXIT trapで子プロセス(inotifywait等)kill。


    ## 判定条件

    - 特殊メッセージ: clear_command/model_switchは先行処理。busyならdeferしてbreak(次サイクルへ)。

    - 通常メッセージ: fingerprint(未読IDソート結合)比較で新規到着のみnudge。同一FPなら即時リトライ(RETRY_MAX=3)→リトライ枯渇後BACKOFF_SEC(120秒)間隔で再通知。

    - busy判定: claude=idle flag不在=busy(Stop hookが管理)。他CLI=@agent_state=active→check_agent_busy()で判定。busy時return
    2。


    ## 入出力

    - 入力: $1=agent_id, $2=pane_target。inbox YAML(queue/inbox/{agent}.yaml)をinotifywait監視。外部ライブラリ:
    cli_lookup.sh, tmux_utils.sh, agent_state.sh, script_update.sh。

    - 出力: tmux paste-buffer経由nudge("inboxN"文字列)。stderr→ログ。状態ファイル(FINGERPRINT_FILE,DEBOUNCE_FILE,RETRY_COUNT_FILE,FIRST_UNREAD_SEEN)は/tmp/配下。


    ## エラーハンドリングと例外ケース

    - set -euo pipefail(L20) + inotifywait前後でset +e/set -e切替(L652/656)

    - flock -w 5: mark_special_read(L126), write_state_file(L164), send_wakeup内tmux操作(L415)の3箇所

    - SEND_KEYS_TIMEOUT=5秒: tmuxハング防止(PID 274337事故対策)。ASW_PROCESS_TIMEOUT=0で無制限も可。

    - get_unread_info Python例外: fail-safe("0\tfalse\t\t")で誤nudge防止。副作用: inbox YAML破損時にサイレントに0未読扱い→agent通知なし。

    - atomic write: mark_special_readのtmpfile+os.replace()でデータ消失防止。失敗時os.unlink(tmpfile)。

    - DEBOUNCE_SEC=10: nudge嵐防止。楽観的ロック(送信前にデバウンス更新)で並行nudge排除。

    - セキュリティ: clear_commandのシェルメタ文字拒否(L517: バッククォート/$/</>等)。model_switchのモデル名プレフィックスホワイトリスト(L526:
    claude-/gpt-/o[0-9]/opus/sonnet/haiku)。

    - WSL2 inotify不発: INOTIFY_TIMEOUT=60秒で安全網。rc=0/1/2すべて同一処理(process_unread→再watch)。

    - atomic write rc=1: inode変更→inotifywatchが無効化→次ループで自動再watch。

    - FIRST_UNREAD_SEEN + FORCE_IDLE_AFTER_SEC(60秒): 未読放置でidle flag強制→nudge送信可能に。

    - inbox未存在: 初期化("messages: []")(L76)。

    - self-restart: script_update.shがMIN_UPTIME(10秒)経過後にスクリプトハッシュ+依存ハッシュ変更を検知→自動再起動。

    - ASW_DISABLE_ESCALATION=1: send_cli_command/send_wakeupを完全スキップ(テスト用)。'
