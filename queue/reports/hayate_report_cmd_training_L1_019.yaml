result:
  summary: ninja_monitor.sh(2665行)を精査。idle検知(二段階@agent_state+capture-pane+Phase1/2確認)、auto-clear(三段階ガード+報告ゲート+自動commit)、STALL検知(status別閾値+エスカレーション)の3大機能を網羅分析。品質ゲート相当の判定条件6種・閾値群・軍師関連機能を記載。
  details: '■ 1. idle検知ロジック (check_idle関数 L234-303) (1) Primary: @agent_state変数ベース判定
    - idle → IDLE確定(ただしgrace period: @last_activeから15秒以内はBUSY扱い) - idle + pstreeに子プロセス検出
    → BUSY(PSTREE-OVERRIDE) - bash_running → BUSY(ただし30分超継続でcrash残留と判断しidle補正) - その他(active等)
    → 安全側でBUSY (2) Fallback: check_agent_busy(lib/agent_state.sh)でcapture-pane判定 (3)
    二段階確認(Phase 1/2): - Phase 1(L2417-2509): 全忍者高速スキャン → BUSY/maybe-idle分類 - Phase
    2(L2511-2554): maybe-idle忍者をCONFIRM_WAIT(5秒)後に再確認 - Phase 2b: Codex CLI忍者は追加待機(cli_profiles.yamlのconfirm_wait)後にチェック
    - 両Phase IDLE → CONFIRMED IDLE

    ■ 2. auto-clear条件 (三段階ガード) Stage 1(L2433-2481): task YAML status確認 - assigned/acknowledged/in_progress/pending
    → /clear禁止 - ただしSTAGE1-TIMEOUT安全弁: assigned=15分, in_progress=30分超で強制idle化 - TIMEOUT時もreport未提出なら/clear禁止(STAGE1-REPORT-MISSING
    L2447-2462) Stage 1.5(L2482-2502): レースコンディション防止 - Guard 1: inbox未読あり → /clearスキップ
    - Guard 2: task YAML更新2分以内 + active status → /clearスキップ _handle_auto_clear(L993-1046):
    idle時自動/clear - CTX=0% → スキップ(CLEAR-SKIP, 連続10回超は5分間隔ログ) - clear_debounce(cli_profiles.yaml定義)経過後に発火
    - can_send_clear_with_report_gate: done状態で報告未提出 → /clear保留 safe_send_clear(L310-357):
    - check_idle()委譲でidle再確認 - 未commitファイル自動commit(運用ファイル除外フィルタ付き L330-342) - inbox既読化後に/clear送信
    - POST_CLEAR_PENDING: /clear後にpost_clear_cmd(例:/fast)自動送信

    ■ 3. STALL検知 check_stall(L1134-1243): assigned/acknowledged/in_progress + idle状態
    - assigned: STALL_THRESHOLD_MIN=10分 - acknowledged: 10分 - in_progress: cli_profileのin_progress_stall_min(デフォルト20分),
    progress_updated_at 20分以内更新なら作業中と判断 - Ghost Filter: task_id空のSTALL誤検知を排除(L1150-1154)
    - STALL_RENOTIFY_DEBOUNCE=300秒(5分)で再通知抑制 - STALL_ESCALATE_THRESHOLD=2: 同一taskで2回STALL
    → STALL-ESCALATEメッセージ - in_progress停滞時は忍者にtask_assigned再送(L1236-1238) _handle_deploy_stall(L898-968):
    タスク配備済み+idle - effective_debounce(stall_debounce優先, なければclear_debounce)経過後に/clear+再送
    - 家老にDEPLOY-STALL通知 + 忍者にtask_assigned再送 - STALL_COUNT: 同一subtaskで2回以上 → STALL-ESCALATEエスカレーション

    ■ 4. 品質ゲート相当の判定条件・閾値一覧 (G1) 報告フォーマットgate: gate_report_format.sh実行(L727-738) →
    FAIL時auto_deployをBLOCK+忍者にinbox通知 (G2) uncommittedチェック: done/idle以外の忍者にcommit催促(L706-726)
    → BLOCKフラグ設定 (G3) 報告未提出BLOCK: can_send_clear_with_report_gate(L509-571) → done状態で報告なし→/clear保留+家老通知
    (G4) STALL閾値: assigned=10分/acknowledged=10分/in_progress=20分(progress未更新時) (G5)
    家老/clear閾値: CTX>70%でidle時に/clear送信(現在は無効化 L2608-2609, 殿裁定2026-03-25) (G6) 将軍CTXアラート:
    CTX>50%でntfy通知(SHOGUN_ALERT_DEBOUNCE=30分) WARNING閾値: STALL検知(分単位), stale cmd=4時間,
    YAML肥大化=500行/completed10件超 BLOCK条件: 報告フォーマットFAIL, uncommitted, 報告未提出, STAGE1 active
    task

    ■ 5. 軍師(gunshi)関連機能 - GUNSHI_PANE: @agent_idから動的解決(L61-62), 不在時は空(処理スキップ) - check_model_names:
    軍師のモデル名・背景色の整合性チェック+自動修正(L2028) - check_inbox_renudge: 軍師の未読inbox放置を検知しre-nudge送信(L1520)
    - update_inbox_counts: 軍師のinbox未読数をペイン変数に反映(L2085) - check_inbox_watcher_health:
    軍師のinbox_watcher死亡を検知し自動再起動(L1766) 注: 「軍師レビュー指摘の自動表示機能」はninja_monitor.shには存在しない(cmd_save.shの機能)

    ■ 6. その他の主要機能 - ペイン生存チェック: check_pane_survival(L193-229) OOM Kill等で消失した忍者を検知→家老通知
    - 破壊コマンド検知: check_destructive_commands(L1426-1478) D001-D008相当パターン5種 - stale cmd検知:
    4時間pending+subtask未配備のcmdを家老に通知(L1292-1371) - pending cmd遷移検知: 新規pending出現時のみ1回通知(L1376-1416)
    - report done + status未idle不整合: 家老にアラート(L1249-1290) - lesson健全性: 10分間隔でgate_lesson_health.sh(L2148-2186)
    - 第三層loop健全性: 30分間隔でgate_loop_health.sh(L2188-2224) - 連想配列クリーンアップ: 10分間隔で非activeキー削除(L1079-1129)
    - 家老陣形図: 毎サイクルwrite_karo_snapshot(L1816-1942) - ダッシュボード自動更新: 状態変化時のみ(L2638-2655)
    - Self-restart: スクリプト変更検知で自動再起動(L66-69)'
