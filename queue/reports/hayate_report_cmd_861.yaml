ac_results:
- id: AC3
  status: pass
  evidence: |
    PSR は Bailey/Lopez de Prado の Sharpe inference 系原典に従い、
    `PSR(SR*) = Φ(((SR_hat - SR*) * sqrt(n-1)) / sqrt(1 - skew*SR_hat + ((kurt-1)/4)*SR_hat^2))`
    と整理できる。`SR*=0` を置けば「Sharpe > 0 の確率」を直接出せる。ここで `skew`,`kurt` は月次 excess return の標本歪度・標本尖度。
    DSR は同じ PSR の閾値 `SR*` を「多数試行後に偶然でも出やすい最大 Sharpe」の期待値 `SR0` に置き換える形で、
    `DSR = PSR(SR0)` と整理できる。`SR0` は DSR 論文の極値近似
    `E[max SR] ≈ mean_SR + sqrt(var_SR) * ((1-γ) * z(1-1/N) + γ * z(1-1/(N*e)))`
    （γ は Euler-Mascheroni 定数、`N` は試行数または有効試行数）で実装可能。
    DM-Signal では PSR を全PFの月次 excess return 系列に対して計算し、DSR を GS champion の Sharpe に対する multiple-testing 補正として計算する設計が自然。
result:
  summary: PSR は「このPFの Sharpe が基準 SR* を超える確率」、DSR は「GS で多数試した後でも champion の Sharpe が偶然ではない確率」として DM-Signal に無理なく統合できる。実装の主戦場は backend の Sharpe 出力点、`grid_search_metrics_v2.py`、および `run_077_*` 群の重複 metrics 計算である。
  details: |
    1. 数学的定式化
       - PSR:
         - 入力は月次 excess return `r_t - rf_t`。
         - `SR_hat = mean(excess) / std(excess, ddof=1)` を月次スケールで計算し、UI表示用の annualized Sharpe は別途 `SR_hat * sqrt(12)` とするのが安全。`SR*=0` なら月次/年率のどちらでも符号は同じだが、推論核は月次で統一した方が `n` と整合する。
         - 非正規補正は標本歪度・標本尖度を使う。DM-Signal にはレバレッジETFが多く fat tails リスクが強いので、通常 Sharpe より PSR の方が解釈一貫性が高い。
       - DSR:
         - PSR の benchmark threshold を `0` ではなく `SR0 = expected max Sharpe under N trials` に置く。
         - `N=100` のような粗い grid 試行数をそのまま入れることもできるが、GS の隣接パラメータは高相関なので、v1 でも `n_trials_raw` と `n_trials_effective` を分けて持つ方が安全。
         - champion が Sharpe 最大で選ばれている時だけ DSR を主判定に使うべき。Calmar など別 metric で champion を選ぶ場合、DSR は補助指標へ下げるのが筋。

    2. DM-Signal への適用設計
       - 全PF PSR:
         - 第一候補は `backend/app/services/metrics_calculator.py:770-799,958-965`。
         - ここでは既に Sharpe / Skewness / Excess Kurtosis を同じ `monthly_df` から計算しており、`monthly_excess_open = portfolio_return_open - rf_return` を使えば RULE09 に沿った open 系 PSR を追加できる。
         - 出力例: `Sharpe > 0 probability`, `Probabilistic Sharpe Ratio (SR*>0)`, `psr_open`, `psr_close`。
       - GS champion DSR:
         - 共通 feature-store 側は `scripts/analysis/grid_search/grid_search_metrics_v2.py:1825-1827,1991-2013` が主入口。
         - ここに `psr_0`, `dsr`, `n_trials_raw`, `n_trials_effective`, `expected_max_sr`, `sharpe_skewness`, `sharpe_kurtosis` を加えると SQLite enrichment と downstream ranking に使える。
         - ただし `run_077_*` の結果CSVはこの shared path を通らないため、CSVに出したければ各 runner の `calc_metrics_fast()` / `pattern_to_row()` も更新が必要。

    3. files_to_modify
       - 数学 SSOT 候補:
         - 新規 `backend/app/services/sharpe_inference.py`
           - `compute_sharpe_moments(excess_returns)`
           - `probabilistic_sharpe_ratio(sr_hat, n, skew, kurt, sr_star=0.0)`
           - `expected_max_sr(mean_sr, var_sr, n_trials)`
           - `deflated_sharpe_ratio(sr_hat, n, skew, kurt, sr_star_from_trials)`
         - 理由: backend と GS で同じ数式を使い回せる。
       - 全PF PSR 出力:
         - `backend/app/services/metrics_calculator.py:770-799,958-965`
       - GS feature-store / SQLite:
         - `scripts/analysis/grid_search/grid_search_metrics_v2.py:522-630`
         - `scripts/analysis/grid_search/grid_search_metrics_v2.py:1825-1827`
         - `scripts/analysis/grid_search/grid_search_metrics_v2.py:1991-2013`
         - SQLite schema を保持する migration / ALTER TABLE 系（先例: `docs/archives/future/111-enhanced-metrics-implementation.md`）
       - 077 runner CSV:
         - `scripts/analysis/grid_search/run_077_bunshin.py:151,465`
         - `scripts/analysis/grid_search/run_077_oikaze.py:199,661`
         - `scripts/analysis/grid_search/run_077_nukimi.py:187,665`
         - `scripts/analysis/grid_search/run_077_kawarimi.py:158,635`
         - `scripts/analysis/grid_search/run_077_kasoku.py:181,680`
         - `scripts/analysis/grid_search/run_077_monban.py:242,759`

    4. affected_files
       - `scripts/analysis/grid_search/run_077_kawarimi_mp_exp.py`:
         - `run_077_kawarimi.py` の metrics schema に追随。
       - `backend/tests/test_grid_search_consistency.py`:
         - shared kernel を backend / GS で共用するなら parity test を増やす候補。
       - `backend/app/services/trades_calculator.py:597-606`
       - `backend/app/jobs/generators/risk_metrics.py:125-135`
         - compare-summary 系や stored risk metrics に PSR 表示を広げるなら波及。
       - `outputs/grid_search/DATA_CATALOG.md:170-177`
         - 実態と違い `template_gs_runner.py` 前提の記述が残っており、共通化方針を入れるなら更新対象。
       - `scripts/analysis/register_285_yotsume_fof.py` など champion metric を読む downstream:
         - DSR を ranking / champion selection に昇格させる場合のみ影響。

    5. related_tests
       - 既存あり:
         - `backend/tests/test_right_tail_metrics.py` は formula-only テスト追加の好例。
         - `backend/tests/test_true_cagr_metrics.py` は metric 公式検証の好例。
         - `scripts/analysis/deterioration/test_deterioration_estimator.py` は probability estimator の edge guard テストの好例。
       - 追加推奨:
         - `backend/tests/test_sharpe_inference.py`
           - 正規対称系列で `PSR(SR*=0)` が Sharpe の符号と単調整合
           - positive skew / high kurtosis 系で denominator が正を保つ
           - `n<3` / `std≈0` / constant series / all-NaN を NaN or insufficient に倒す
         - `backend/tests/test_grid_search_consistency.py`
           - shared `sharpe_inference` を backend と GS で同値確認
         - `scripts/analysis/grid_search` 側の新規テスト
           - `pattern_to_row()` に `psr_0`,`dsr` が出ること
           - `grid_search_metrics_v2.py` の DB update が新カラムと整合すること

    6. edge_cases
       - 小サンプル:
         - `n<24` では skew/kurt 推定がかなり不安定。PSR/DSR は `insufficient_data` 扱い、または `confidence_low` flag を別途返すべき。
       - 非正規分布:
         - レバレッジETFで尖度が大きく、PSR denominator `1 - skew*SR + ((kurt-1)/4)*SR^2` が極端に小さくなることがある。`<=0` は NaN にして clamp しない方が解釈事故が少ない。
       - serial correlation:
         - 原典PSRは iid/non-normal 補正が主で、自己相関補正ではない。DM-Signal は月次系列でも autocorr がありうるので、v1 は caveat 明記、v1.1 で Lo/HAC 補正版を検討。
       - multiple testing inflation:
         - raw grid count をそのまま `N` に入れると過度に悲観的になりうる。近傍パラメータ高相関を見て `N_effective` を導入した方が GS 実態に近い。
       - objective mismatch:
         - champion が Calmar 最大なのに DSR(Sharpe)だけで採否を決めると指標不整合。DSR は first gate ではなく supplementary gate に置くのが安全。
       - risk-free consistency:
         - backend は `rf_return` を持つ一方、077 runner は raw returns ベースの Sharpe。PSR/DSR を比較可能にするには GS 側も excess return ベースへ揃える必要がある。

    7. Bonferroni / BHY 比較
       - Bonferroni:
         - `alpha / N` で FWER を強く抑えるが、GS の高相関候補では保守的すぎる。
       - BHY:
         - 任意依存下の FDR 制御として Bonferroni より実用的だが、p値補正であって Sharpe 推定量の歪度・尖度・有限標本誤差そのものは扱わない。
       - DSR:
         - champion Sharpe の「偶然にしては高すぎるか」を直接評価でき、Sharpe inference と multiple testing を同じ座標系で扱える。DM-Signal の GS では最も設計相性が良い。

    参考一次資料:
       - Bailey & de Prado, "The Sharpe Ratio Efficient Frontier" (PSR)
       - Bailey & de Prado, "The Deflated Sharpe Ratio: Correcting for Selection Bias, Backtest Overfitting and Non-Normality" (2014)
       - quantresearch.org lecture index（Karo inbox 追補）
