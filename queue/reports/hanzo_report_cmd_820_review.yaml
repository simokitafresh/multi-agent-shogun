ac_results:
  AC1_impl_review:
    status: PASS
    detail: |
      cmd_820原本AC1-6すべてを影丸の実装コードと報告から確認。以下各項の検証結果:

      【観点1: 一括ロード＋ループ内DB照会排除】PASS
      - _build_entries() L122-205でtry/except内に4段階bulk preload:
        (a) load_business_days(db, "SPY", range_start, range_end) → 1クエリ
        (b) get_last_rebalance_month_end_business_pure() でsignal_date計算 → 0クエリ(Pure関数)
        (c) Signal.date.in_(unique_signal_dates) → 1クエリ(M個一括)
        (d) PriceCache.load(db, all_tickers, range_start, range_end) → 1クエリ(全ticker一括)
      - ループ内(L206-400)ではbulk_loaded判定で全てcache/dict参照。DB照会なし。
      - 合計: 170回(M=24,T=2) → 3回に削減。設計意図通り。

      【観点2: PriceCacheの_get_price_movement()注入】PASS
      - L364-370: price_cache=price_cache if bulk_loaded else None で注入。
      - _get_price_movement() L777: keyword引数price_cacheで受取。
      - L848-869: cache hit時はdict lookup(O(1))。MTDはbisect_leftでbackward検索。
      - cache missまたはbulk_loaded=False時はper-ticker DBフォールバック(L871-900)。
      - FoFのexpand後のmissing ticker動的追加(L337-346): price_cache.load(merge=True)で対応。

      【観点3: Pure関数の正確性】PASS
      - get_month_first_business_day_pure() (business_day_utils.py L76-104):
        bisect_leftでmonth_start以降の最初のbusiness_dayを検索。
        next_month_startとの境界チェックあり。空リストでNone返却。
        DB版(L22-47)と同一ロジック(SPY Price MIN → bisect_left)で等価。
      - get_last_rebalance_month_end_business_pure() (rebalance.py L120-152):
        _resolve_signal_month()でsignal月を解決→bisect_leftでnext_month_start直前を取得。
        DB版(L93-117)と同一ロジック(SPY Price MAX → bisect_left降順相当)で等価。

      【観点4: APIレスポンスshape不変】PASS
      - entry dict構築(L301-318): 全22フィールド維持。フィールド追加・削除なし。
      - FoF追加フィールド(L322-346): component_portfolios, expanded_tickers維持。
      - Standard PF(L348-359): expanded_tickers計算ロジック変更なし。
      - Pydantic未宣言field(price_movement/calculated_return_open/calculated_return_close/
        matched_weight/is_pending): L364-386で全て従来通り設定。
      - _get_price_movement()戻り値(L915-933): 12フィールド維持(ticker, start_price_open,
        end_price_open, change_pct_open, start_price_close, end_price_close, change_pct_close,
        start_price, end_price, change_pct, actual_start_date, actual_end_date)。

      【観点5: 既存テスト全PASS】PASS
      - 22 passed, 0 failed, 0 skipped (1.09s)。レビュアー側で実行確認済み。

      【観点6: 実測改善】PASS(影丸報告ベース)
      - Standard PF (DM2): 2.2-3.0秒(安定時)。DB照会170→3回削減。
      - FoF (Ave-X): 36.8秒。expand_portfolio_to_tickers内部N+1は別課題(本タスク対象外)。
      - 理論改善: RTT≈50ms/query × 167回削減 ≈ 8.35秒短縮。

  AC2_trade_rule_compliance:
    status: PASS
    detail: |
      【RULE08: FoF展開は当月初日のholding_signal使用】準拠
      - FoF展開(L328-332): expand_portfolio_to_tickers(db, portfolio.id, position_start_date,
        component_signal_date=position_start_date)。
      - position_start_dateは当月初営業日(bulk_loadedならget_month_first_business_day_pure)。
      - N+1最適化はposition_start_dateの取得手段(DB→cache)のみ変更。
        値自体は不変(同一business_days→同一bisect結果)。
      - signal_dateの計算もDB版と同一ロジック(_resolve_signal_monthは共通)。

      【RULE09: Open/Close独立計算系列】準拠
      - _get_price_movement()はstart_price_open/end_price_open/change_pct_openと
        start_price_close/end_price_close/change_pct_closeを独立して計算。
      - PriceCacheの価格データ構造: {date: {"close": float, "open": float}}で
        open/closeを分離保持。混在なし。
      - _calculate_return_from_price_movement()はprice_type引数で
        "open"/"close"を分離計算(L972: change_pct_key = f"change_pct_{price_type}")。

      【RULE11: 同一年月・同一PF Return完全一致】準拠
      - monthly_returnはmr.monthly_return(MonthlyReturnテーブル)から直接取得(L287)。
      - MTDのみcalculate_monthly_return()で動的計算(L291-299)。
      - N+1最適化はリターン計算ロジックに一切触れていない。
      - price_movementの値は同一日付→同一価格(cache/DBで同一データソース)→同一値。

