    \n■ AC4: Phase 3推奨事項\n\n  (1) Nested FoF(22体)はFoF→FoF→Standardの2階層構造。\n      Component\
    \ PFがfof型のため、ComponentPriceBlockは中間FoFの\n      cumulative_returnを\"価格\"として読み込む。計算パスは同一だが\n\
    \      中間FoFのmonthly_return精度がnested計算に波及する。\n  (2) Phase 2の精度(max diff 1e-10)は極めて高い。中間FoFを経由する\n\
    \      Nested FoFでも1e-6基準は問題ないと予測。\n  (3) ただし旧忍法(15体)のcomponentが旧四神(fof型)であるため、\n\
    \      旧四神のholding_signalがさらにUUID群→ticker展開される。\n      展開段数が増えるほどweight計算の丸め誤差が蓄積する可能性あり。\n\
