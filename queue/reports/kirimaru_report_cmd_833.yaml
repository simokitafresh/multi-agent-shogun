      1. backend/app/services/monthly_returns_calculator.py:615-649
      2. backend/app/services/annual_returns_calculator.py:330-362

      置換不可(全件が必要)な箇所:
      - history.py: 実レスポンスとして時系列全件を返すため全件必要。
      - jobs/shared.py: FoF signal_cache を日付キー辞書にするため全件必要。
      - generators/trade_performance.py / monthly_returns.py:
        resample・holding lookup・dates_raw 構築に全系列が必要。

      月次 calculator 疑似diff:
      ```python
      from sqlalchemy import func

      current_start = date(current_year, current_month, 1)
      next_month = date(current_year + (current_month == 12), 1 if current_month == 12 else current_month + 1, 1)
      mtd_min, mtd_max = self.db.query(
          func.min(Signal.date), func.max(Signal.date)
      ).filter(
          Signal.portfolio_id == portfolio_id,
          Signal.date >= current_start,
          Signal.date < next_month,
      ).one()

      start_min, start_max = self.db.query(
          func.min(Signal.date), func.max(Signal.date)
      ).filter(
          Signal.portfolio_id == portfolio_id,
          Signal.date >= date(first_year, first_month, 1),
          Signal.date < next_month_of_first_period,
      ).one()
      ```

      年次 calculator 疑似diff:
      ```python
      ytd_min, ytd_max = self.db.query(
          func.min(Signal.date), func.max(Signal.date)
      ).filter(
          Signal.portfolio_id == portfolio_id,
          Signal.date >= date(current_year, 1, 1),
          Signal.date < date(current_year + 1, 1, 1),
      ).one()

      start_min, start_max = self.db.query(
          func.min(Signal.date), func.max(Signal.date)
      ).filter(
          Signal.portfolio_id == portfolio_id,
          Signal.date >= date(first_year, 1, 1),
          Signal.date < date(first_year + 1, 1, 1),
      ).one()
      ```

      計算結果不変の根拠:
      - monthly 側は現状でも `dates = [s.date for s in sig_data]` の後に
        `mtd_dates` / `start_dates` へ絞り、最終的に `min()` / `max()` しか使っていない
        (backend/app/services/monthly_returns_calculator.py:638-648)。
      - annual 側も `ytd_dates` / `start_dates` の `min()` / `max()` しか使っていない
        (backend/app/services/annual_returns_calculator.py:350-361)。
      - downstream consumer は min/max から作られる `partial_note`, `period_start`, `period_end`,
        `trading_days=(last_day-first_day).days+1` のみ。
        `frontend/components/period-notes.tsx:43-69` も中間日付列を要求しない。

      波及先:
      - frontend/components/period-notes.tsx:43-69
      - backend/tests/test_monthly_returns_start_partial.py:77-143
      - backend/tests/test_monthly_returns_mtd.py:23-153
      - backend/tests/test_annual_returns_calculator.py:70-99, 249-293
      - backend/tests/test_annual_returns_058.py:103-189

      関連テスト:
      - 既存の partial/YTD behavioral tests はそのまま有効で、期待値変更不要。
      - 追加任意: query count regression test を1本追加し、
        `_get_date_ranges_for_partial_notes()` が `.all()` を呼ばないことを guard。

      エッジケース/副作用:
      - signal 0件なら `{}` を返す挙動維持。
      - first_year/first_month の開始月が月途中でも min/max は現行と同値。
