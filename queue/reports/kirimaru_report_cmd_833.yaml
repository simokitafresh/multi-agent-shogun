ac_results:
  AC1_s2_pool_pre_ping:
    status: PASS
    detail: |
      対象ファイル:
      - backend/app/db/database.py:76-83

      現状:
      - PostgreSQL 経路は `create_engine(url, poolclass=QueuePool, pool_size=5, max_overflow=10, pool_timeout=30, pool_recycle=1800)`。
      - SQLite test 経路は `StaticPool` で分岐済み (backend/app/db/database.py:68-73)。

      変更案:
      ```python
      return create_engine(
          url,
          poolclass=QueuePool,
          pool_size=5,
          max_overflow=10,
          pool_timeout=30,
          pool_recycle=1800,
          pool_pre_ping=True,
      )
      ```

      整合性:
      - QueuePool + pool_recycle=1800 と併用しても矛盾なし。`pool_recycle` は aged connection 回収、`pool_pre_ping` は checkout 時の死活確認で役割が別。
      - SQLite 分岐は無変更なので in-memory test fixture 群には影響しない。

      テスト方法:
      - 新規 unit test 推奨: `backend/tests/test_database_engine_config.py`
        1. PostgreSQL URL で `sqlalchemy.create_engine` を patch し、kwargs に `pool_pre_ping=True` が入ることを検証。
        2. SQLite URL では `pool_pre_ping` を渡さないことを検証。
      - 既存広域影響確認: `backend/tests/test_deterioration_api.py:10-17` など `create_db_engine("sqlite:///:memory:")` 使用系を1本回せば回帰検知可能。

      エッジケース/副作用:
      - DB が完全停止中なら ping 後に従来どおり失敗する。改善対象は「死んだ pooled connection による初回500」。
      - checkout ごとに軽微な ping オーバーヘッドが乗るが、Render/managed PG の瞬断耐性メリットが勝つ。

  AC2_a2_benchmark_fast_path:
    status: PASS
    detail: |
      対象ファイル:
      - backend/app/api/benchmark.py:12, 22-121

      参照根拠:
      - backend/app/jobs/ticker_returns.py:59-73, 109-146
        TickerMonthlyReturn は `月初 -> 翌月初` の monthly_return / monthly_return_open を事前計算。
      - docs/rule/calculation-theory.md:808-812
      - docs/rule/business_rules.md:676-680
        `benchmark_return == TickerMonthlyReturn[benchmark].monthly_return` が SSOT ルール。
      - backend/app/jobs/generators/monthly_returns.py:154-169, 273-279
        MonthlyReturn.benchmark_return も TickerMonthlyReturn 優先で上書き済み。

      変更案:
      1. import を `TickerDailyReturn` 単独から `TickerDailyReturn, TickerMonthlyReturn` へ拡張。
      2. route 内を helper 2本に分離。
         - `_build_monthly_series_from_ticker_monthly_return()`
         - `_build_monthly_series_from_ticker_daily_return()` (現行ロジック温存)
      3. fast path 条件:
         - まず `TickerMonthlyReturn.symbol == ticker_upper` を取得。
         - 完全履歴 (`years == 0`) は pure monthly path でよい。
         - `years > 0` は「境界月が partial になり得る」ため、
           a. `cutoff_date` の属する月だけ daily path を使用
           b. その翌月以降を monthly path にする
           c. もしくは parity 優先で `years > 0` は丸ごと daily fallback
         - monthly rows 不足/空なら現行 daily path へ fallback。

      疑似diff:
      ```python
      monthly_rows = db.query(TickerMonthlyReturn).filter(
          TickerMonthlyReturn.symbol == ticker_upper
      ).order_by(TickerMonthlyReturn.year_month.asc()).all()

      if years == 0 and monthly_rows:
          total_return = build_from_monthly_rows(monthly_rows)
      else:
          total_return = build_from_daily_rows(...)
      ```

      計算結果不変の根拠:
      - Compare 画面の実呼び出しは `frontend/app/compare/page.tsx:127-148, 157-159` の `years=0` 固定。
      - この経路では「月次粒度 + 月初日付」に揃えることが UI contract であり、
        `TickerMonthlyReturn` は既に Monthly Returns / Annual Returns / Monthly generator と同じ月次SSOT。
      - `years>0` の境界月だけは current daily path が partial month を作り得るため、そこだけ fallback すれば API contract 完全維持が可能。

      波及先:
      - frontend/app/compare/page.tsx:135-137 (consumer, contract不変)
      - frontend/components/comparison-chart.tsx:175-206 (date/cumulative shape を前提)
      - frontend/lib/types/api.ts:73-84 (レスポンス形状は不変)

      関連テスト:
      - 既存: backend/tests/test_benchmark_repro.py:19-65
        TickerMonthlyReturn 優先の概念実証あり。
      - 既存: backend/tests/test_monthly_benchmark_single_source.py:36-173
        benchmark と ticker の SSOT 一致テストあり。
      - 追加推奨:
        1. `backend/tests/test_benchmark_api.py`
           - monthly fast path が `TickerMonthlyReturn` から `total_return` を作ること
           - monthly rows 空時に daily fallback すること
           - `years > 0` の boundary month を daily path へ逃がすこと
        2. compare page は contract 不変なので FE 修正不要。

      エッジケース/副作用:
      - precompute 未生成 (`ticker_monthly_returns` 空) は fallback 必須。`backend/services/ticker_precompute_health.py` で degraded 判定済み。
      - DTB3/Cash は docs 上 benchmark 禁止だが、防御的には rows 空 -> daily fallback / NotFound 維持で安全。
      - monthly path は 120 rows 程度、daily path は 2500 rows 程度。速度差の本丸は compare years=0。

  AC3_a3_signal_aggregation:
    status: PASS
    detail: |
      Signal.date 全件取得箇所の洗い出し:
      - backend/app/services/monthly_returns_calculator.py:630-648
      - backend/app/services/annual_returns_calculator.py:342-361
