      | 36 | BLOCK根本原因 | BLOCK原因を1行で特定できている=YES | 原因不明のまま回避策でBLOCK解消した=FAIL |

      | 37 | 次cmdの品質向上 | 教訓登録 or 防御層追加 or ランブック改善を実施=YES | 今回限りの例外処理で完了=FAIL |


      ### 一次データ不可侵

      | # | 項目 | PASS条件 | FAIL条件 |

