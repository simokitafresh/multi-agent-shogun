result:
  summary: "perf_measure.py の長時間化主因は、cold runごとの再認証、`wait_for_page_ready()` の3段直列待機、reload系で `collect_perf_probe()` を使わず背景APIを取り逃す点、`initial_portfolio_id=None` 固定の4点である。"
  details: |
    処理フロー図:
    main()
      -> load_config / normalize_pages / parse_mode_arg / parse_navigation_mode_arg
      -> launch_browser / get_tab_id / enable_browser_domains
      -> [prod only] _warm_up_render -> _get_admin_credentials -> _fetch_viewer_password -> _authenticate_viewer_via_cdp
      -> for page in selected_pages
           -> for session_mode in session_modes
                -> for navigation_mode in navigation_modes
                     reload: ensure_authenticated -> navigate(wait=5s default) -> wait_for_page_ready -> settle(0.5s default) -> metrics/resource集計
                     spa:    ensure_authenticated -> source pageへnavigate(wait=5s) -> wait_for_page_ready(source)
                             -> reset_perf_probe -> trigger_spa_transition -> wait_for_page_ready(target)
                             -> collect_perf_probe(extra_wait=max(400ms, settle)) -> metrics/resource集計
           -> [pf_switch指定時のみ] measure_pf_switch_scenarios
                -> 再認証 -> start pageへnavigate -> DOM観測 -> available PF抽出
                -> for session_mode x requested_pf_pair x runs
                     ensure_authenticated -> start pageへnavigate -> wait_for_page_ready
                     -> source PF選択 -> sleep(1.0s)
                     -> _measure_pf_switch_in_browser(settle_ms=500 default, timeout=120)
                     -> wait_for_page_ready -> metrics/resource集計
           -> per_page_baseline JSON書込
      -> final JSON/Markdown report 書込 -> failures集計

    1ページ（monthly-returns, reload only, runs=3, mode=both）の実行回数:
    - session_modes=['cold','warm'] × navigation_modes=['reload'] × runs=3 = 6 run
    - cold 3本は毎回 `clear_browser_state()` + `_authenticate_viewer_via_cdp()` をフル実行

    理論所要時間（default値ベース）:
    - prod startup 最小: Render warm-up 2HTTP + viewer password取得 + auth固定wait(5s navigate + 5s post-login) で概ね10秒台後半以上
    - prod startup worst-case: `_warm_up_render()` 2本×90秒 + password取得30秒 + auth初期待機160秒超で 300秒超まで伸び得る
    - warm reload 1本: navigate 5.0s + settle 0.5s + CDP取得少々 = 理論最小 約5.5-6秒
    - cold reload 1本: clear 0.5s + auth固定wait約10s + navigate 5.0s + settle 0.5s = 理論最小 約16秒
    - wait timeout側: `wait_for_page_ready()` は document/path/selector を直列に各30秒まで待つため、1回の navigation budget が最大90秒になる
    - したがって monthly-returns 1ページでも reload both/runs=3 の理論最小は 3*cold(16s) + 3*warm(5.5s) = 約64.5秒 + startup、timeout側では数分になる

    実時間ギャップの主因:
    1. `wait_for_page_ready()` が 30秒 budget を共有せず、document/path/selector に逐次フル適用している (`:635-642`)
    2. cold run が「初回だけ」ではなく every attempt で cookie/localStorage を消して再認証する (`:1447-1455`, `:1575-1583`, `:1704-1712`)
    3. reload計測は `collect_resource_entries()` しか呼ばず、SWR/低優先度の背景fetchを待たない (`:1467-1471`)
    4. `initial_portfolio_id` が常に `None` のため、portfolio必須ページでも URL に `?portfolio=` が付かず、ページが ready でも肝心のAPIが発火しない run が出る (`:1891-1915`)

    実測で確認したこと:
    - Monthly Returns を PF UUID 付きで計測すると `/api/monthly-returns?...months=12/120` は約1.0-1.2秒台で観測できた
    - しかし reload 既定実装相当（probe待機なし/短待機）では warm側の `/api/monthly-returns` を取り逃した
    - `collect_perf_probe(extra_wait_ms=8000)` に延長すると warm側でも background revalidation を捕捉できた
    - つまり「人間は数秒で見終わる」のに CLI が何分もかかる主因は、API自体ではなく orchestration 側の固定待機と直列timeout である

