    - bunshin: ファイル一切なし(781行版消失)


    ■ 原因推定

    WSL2 /mnt/c上の大規模ファイル書込み→/clear時にフラッシュされず消失。

    .bakファイル(各1000行)は第1波テスト実行の残骸。

    第2波(本番GS全量実行)のCSVが全て消失。


    ■ 利用可能データ

    - backup/246_kasoku_grid_results_fast.csv (238,986行,Mar17版) — cmd_1057以前の可能性

    - .bakファイル3つ(各1000行) — テスト版のため集約に使用不可

    - shin_shijin_l1/ — L1データ(忍法GSではない)


    ■ 対策案(家老判断を仰ぐ)

    (1) 全忍法GSを再実行(CSV書込み後にsync確認を追加)

    (2) 報告YAML内のmd5/行数から忍者が保持していたデータの復元可否を確認'
