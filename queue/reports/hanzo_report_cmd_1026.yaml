result:
  summary: "32体ユニバース適用時の6忍法パターン数を算出。総パターン19,175,608（現行361,603の53倍）。推定実行時間10.7〜42.6時間。対処案5案を提示。"
  details: |
    ## 前提

    **現行12体ユニバース**: C(12,2)+C(12,3)+C(12,4) = 66+220+495 = 781サブセット
    **32体ユニバース**: C(32,2)+C(32,3)+C(32,4) = 496+4,960+35,960 = 41,416サブセット
    **倍率**: 41,416 / 781 = **53.03倍**

    ## 6忍法 × 32体 パターン数テーブル

    | # | 忍法 | パラメータ乗数 | 12体パターン数 | 32体パターン数 | 倍率 |
    |---|------|-------------|-------------|-------------|------|
    | 1 | 追い風(oikaze) | 18lb × 2top_n = 36 | 28,116 | 1,490,976 | 53.03 |
    | 2 | 抜き身(nukimi) | 39combo × 2top_n = 78 | 60,918 | 3,230,448 | 53.03 |
    | 3 | 変わり身(kawarimi) | 18period × 2sel_n = 36 | 28,116 | 1,490,976 | 53.03 |
    | 4 | 加速(kasoku) | 153pair × 2method = 306 | 238,986 | 12,673,296 | 53.03 |
    | 5 | 分身(bunshin) | 1 (なし) | 781 | 41,416 | 53.03 |
    | 6 | 四つ目(yotsume) | 3base × 2top_n = 6 | 4,686 | 248,496 | 53.03 |
    | | **合計** | | **361,603** | **19,175,608** | **53.03** |

    構成比: 加速66.1% / 抜き身16.8% / 追い風+変わり身15.6% / 四つ目1.3% / 分身0.2%
    サブセットサイズ別: size4=86.8%(35,960) / size3=12.0%(4,960) / size2=1.2%(496)

    ## 実行時間概算

    基準: cmd_1018 L1 GS = 191,796パターン → 760.71秒 → 3.97ms/パターン
    (ファミリー間単価安定: DM2=4.05ms, DM3=3.93ms, DM6=3.79ms, DM7+=3.85ms)

    | シナリオ | 単価 | 総時間 | 根拠 |
    |---------|------|-------|------|
    | 楽観(0.5×) | 2.0ms | 38,351秒 ≈ **10.7h** | L1月次リターン再利用で軽量化 |
    | 中央(1×) | 4.0ms | 76,702秒 ≈ **21.3h** | L1と同等負荷 |
    | 悲観(2×) | 8.0ms | 153,405秒 ≈ **42.6h** | サブセット選択の追加overhead |

    メモリ注意: 19.2M×167ヶ月×8byte ≈ 25.6GB（全パターン月次リターン保持時）

    ## 対処案（5案）

    ### 案1: サブセットサイズ上限k=3
    C(32,2)+C(32,3) = 5,456サブセット → 全忍法一律86.8%削減 → 総2.53M → **2.8h**
    長所: 実装最小。短所: size4(4ファミリー直交12×4×12×4=2,304通り含む)を全捨て

    ### 案2: ファミリー混合必須制約
    同一ファミリーのみサブセット除外(781+11+781+11=1,584) → 39,832 → 3.8%削減のみ
    長所: 設計意図に整合。短所: 単独では効果小。案1/3と併用推奨

    ### 案3: 2段階GS（粗密戦略）
    Phase A: 粗グリッド(lb6点/top_n1/method1)で全41,416サブセット → 1.82M
    Phase B: 上位10%サブセット(4,142)のみ完全グリッド → 1.92M
    合計3.74M → **4.2h**
    長所: size4を捨てない。短所: 粗探索で見落とすリスク。Phase A基準に殿裁定必要

    ### 案4: ファミリーバランス制約
    size4は「4ファミリー各1体」のみ(12×4×12×4=2,304) + size2/3は混合必須
    推定7,300サブセット → 3.38M → **3.7h**
    長所: 直交性を構造的に保証。短所: 部分混合(同族2体+他1体)の価値を捨てる

    ### 案5: 並列分散実行（パターン数削減なし）
    6忍法独立 + 加速を4分割 = 8並列実行
    ボトルネック: 加速1チャンク=3.17M → **3.6h**
    長所: 探索完全性◎。短所: CPU/メモリ資源必要。メモリ25.6GB問題

    ### 組合せ比較

    | 組合せ | 総パターン | 推定時間 | 完全性 |
    |--------|----------|---------|-------|
    | 全探索(直列) | 19.18M | 21.3h | ◎ |
    | 案1(k≤3) | 2.53M | 2.8h | △ |
    | 案3(粗密) | 3.74M | 4.2h | ○ |
    | 案5(8並列) | 19.18M | 3.6h | ◎ |
    | 案1+2(k≤3+混合) | 2.36M | 2.6h | △ |
    | 案3+5(粗密+並列) | 3.74M | 1.1h | ○ |
