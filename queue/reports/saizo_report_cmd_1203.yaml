result:
  summary: 'kawarimi batch/sequential md5不一致の根本原因を特定。set→list変換の非決定的反復順序がモメンタムタイ時(16.75%)にソート結果を変える。10+ブロックに影響する汎用問題。推奨修正: sorted(context.current_tickers)統一。'
  details: 'AC1コード差分: TrendReversalFilterBlock.execute() L72で tickers=list(context.current_tickers) を使用。setの反復順序はPYTHONHASHSEED依存で非決定的。一方get_sim_context() L323のnp.argsort()はリスト順でタイ解決。両者のstable sortは同値タイを入力順序で解決するが入力順序が異なり、タイ存在時に異なるコンポーネントが選択される。実データ実証:
    2012-06月subset=[常勝-青龍,常勝-朱雀,常勝-白虎,鉄壁-朱雀]で常勝-朱雀と鉄壁-朱雀のモメンタム=0.201145(完全一致タイ)。Batchはリスト順で常勝-朱雀が先(picks=[1,2])、Sequentialはset順で鉄壁-朱雀が先(picks=[2,3])。コード差分箇所: Batch=run_077_kawarimi.py L322-323, Sequential=trend_reversal_filter.py
    L72。AC2原因特定: 環境Python3.12.3/numpy2.4.2/pandas3.0.0。(1)argsort差=否定 (2)浮動小数点差=否定(pct_change=self/shift-1で同一) (3)真因=set反復順序。PYTHONHASHSEED=0でも350パターン7821月差異確認。タイ頻度=2400点中402点(16.75%)。Python3.12固有でなく汎用問題(Python3.3以降全版共通)。影響範囲=kawarimi固有でなく10+ブロック(momentum_filter/reversal_filter/momentum_acceleration_filter/single_view/relative/multi_view/monthly_return/absolute_momentum/p_bar_selection)。equal_weight.pyのみsorted使用済。AC3修正方針:
    (a)batch修正=非推奨(set順序再現不可) (b)環境統一=非推奨(コード設計問題) (c)fallback恒久化=緊急時のみ(1600倍遅化) (d)全BlockでのSorted統一=推奨(コスト0/PYTHONHASHSEED非依存/1行変更x10)。修正: 全SelectionBlockでtickers=sorted(current_tickers)+GS batch側もsorted()統一。sorted()キーはUnicode順でYAML定義順と異なるため両側揃え必須。'
