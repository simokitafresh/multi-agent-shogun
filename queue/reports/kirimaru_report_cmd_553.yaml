result:
  summary: "本番404の根因はBackendデプロイ実体に`/api/deterioration`ルートが存在しないこと。render.yamlにはcron追加漏れも確認。"
  details: |
    偵察結果（要点）:
    - 本番backend `https://dm-signal-backend.onrender.com/openapi.json` に `/api/deterioration` および `/api/deterioration/{portfolio_id}` が未掲載
    - 本番backendへ直接 `GET /api/deterioration` 実行で `{"detail":"Not Found"}` を返却（FastAPIルート未登録時の404）
    - ローカル実装では `backend/app/main.py` に `app.include_router(deterioration_router.router)` が存在し、`backend/app/api/deterioration.py` も正常定義
    - よって「コード欠落」ではなく「本番backendのデプロイ内容ドリフト（未反映）」が主因
    - 追加で `render.yaml` のcron定義に deterioration-batch が未登録（データ生成ジョブ欠落）

    推奨修正:
    1) backendサービスを最新mainで再デプロイ（/api/deteriorationルート反映）
    2) `render.yaml` に deterioration cronを追加（sync系完了後）
       例: `name: dm-signal-deterioration-batch`, `schedule: "50 1 * * *"`,
           `startCommand: curl -f -u "$ADMIN_USER:$ADMIN_PASS" -X POST https://dm-signal-backend.onrender.com/admin/deterioration-batch`

