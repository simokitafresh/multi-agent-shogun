result:
  summary: |
    AC1-5 PASS。実コード上の主因は `3e515ca` による `uvicorn --workers 2` 化である。admin/viewer セッションは `backend/app/auth.py` の in-memory dict に保持されており worker 間共有がないため、ログインを処理した worker と後続 API を処理する worker が分かれると cookie/token が未登録扱いとなり 401 化する。Static Export や `/offline` 自体は直接原因ではない。
  details: |
    ■ 1. フロントエンド側の認証取得経路

    1) `/admin/*`
    - `frontend/app/admin/layout.tsx:1-8` が `AdminAuthProvider` を注入。
    - `frontend/contexts/admin-auth-context.tsx:45-87` は mount 時に `localStorage['admin_session_active']` を見て `api.getPortfolios({ includeInactive: true })` を実行し、cookie セッションの有効性を確認する。
    - `frontend/contexts/admin-auth-context.tsx:90-102` の `login()` は `api.adminLogin()` 成功後に `refreshPortfolios()` を実行する。

    2) 非adminページ
    - `frontend/components/viewer-auth-modal.tsx:17-113` は `/admin` 以外で表示され、Admin タブから `adminAuth.login()` を叩ける。
    - `frontend/lib/admin-auth.ts:8-17` は `api.adminLogin()` を呼び、成功時に viewer token を消す。
    - modal 成功後は `window.location.reload()` で再読込する。

    3) `/offline`
    - `frontend/app/offline/page.tsx:4-17` は完全な静的表示のみ。
    - `useAdminAuth`, `adminAuth`, `api-client`, `document.cookie` の参照はない。
    - codebase 内で `/offline` へ auth failure から遷移させる Service Worker / router 経路は見当たらない。

    ■ 2. Cookie / session lifecycle

    A. 設定
    - admin login: `frontend/lib/api-client.ts:275-293` が Basic Auth 付きで `/api/admin/login` を POST。
    - backend: `backend/app/api/auth.py:79-89` が `generate_admin_token()` → `set_session_cookie(response, 'admin_session', token, expires)`。
    - viewer login: `backend/app/api/auth.py:21-76` が tier password を検証し、`viewer_session` cookie を設定しつつ token/expires を JSON でも返す。

    B. frontend 側の扱い
    - admin は cookie を直接読めないため、成功時に `localStorage['admin_session_active']='true'` を立てる (`frontend/lib/api-client.ts:286-289`)。
    - 後続 request は `credentials: 'include'` 付き fetch を使い (`frontend/lib/api-client.ts:525-530`)、admin active 時は Authorization header を付けない (`frontend/lib/api-client.ts:497-500`)。
    - viewer は `dm_viewer_token` を localStorage にも保存する (`frontend/lib/viewer-auth.ts:8-18`) が、server 側では cookie / Bearer どちらでも受ける。

    C. backend 側の読取
    - admin: `backend/app/auth.py:168-189` の `require_admin()` が `request.cookies['admin_session']` を最優先で見て、なければ Basic Auth へ fallback。
    - viewer: `backend/app/auth.py:192-211` の `require_viewer()` が admin 認証済みを先に通し、その後 `viewer_session` cookie または Bearer token を検証する。

    D. 失効・削除
    - token 失効判定は `verify_admin_token()` / `verify_viewer_token()` (`backend/app/auth.py:142-165`)。
    - frontend 401 時は `admin_session_active` や viewer token を localStorage から消す (`frontend/lib/api-client.ts:532-550`)。
    - server cookie 自体の削除は `/api/auth/logout` → `clear_session_cookie()` (`backend/app/api/auth.py:92-97`, `backend/app/auth.py:262-270`)。

    E. Cookie 属性
    - 名前: `admin_session`, `viewer_session`
    - `HttpOnly=True` (`backend/app/auth.py:251-257`)
    - `Secure=True` / `SameSite='none'` は production (`RENDER_EXTERNAL_URL` 存在時)
    - dev は `Secure=False` / `SameSite='lax'`
    - `domain` 指定なし = host-only cookie
    - `path` 指定なし = framework default `/`
    - `expires` は ISO date を UTC midnight として設定 (`backend/app/auth.py:243-257`)

    ■ 3. 4 commit の影響分析

    - `0a76f42`
      - runtime 変更は dashboard の `SignalPieChart` dynamic import。
      - auth 関連は test の `waitFor` と `pendingRequests.clear()` のみで、本番認証経路は不変。

    - `3e515ca`
      - `render.yaml` の backend 起動が `uvicorn ... --workers 2` に変化。
      - 一方で session store は `backend/app/auth.py:44-46` の in-memory dict。
      - 各 worker は別 process なので token store は共有されず、worker A で発行した `admin_session` / `viewer_session` を worker B が `verify_*_token()` で認識できない。
      - これにより「ログイン直後は通るが次の API で 401」「ページによって通ったり落ちたり」がコード上で説明できる。

    - `ad25d51`
      - `frontend/app/layout.tsx` から KaTeX CSS を外し、`SignalsContext` を useMemo 化しただけ。
      - admin layout / auth context / cookie path は未変更。

    - `b488c0c`
      - `SignalsContext` の prefetch 起動本数を 83 → selected PF 3本に削減。
      - auth API, auth context, cookie 実装には触れていない。

    ■ 4. `/api/auth/test` について

    - backend / frontend ともに `/api/auth/test` 実装は存在しない。
    - `frontend/lib/api-client.ts:702-705` の `testAuth()` は独立 endpoint ではなく `adminLogin()` を再利用して boolean を返すだけ。
    - したがって、admin 認証確認の実体は `/api/admin/login` 再実行である。

    ■ 5. 所見

    中立所見として、今回の intermittent admin failure は Static Export 固有問題よりも `3e515ca` 後の multi-worker 化と in-memory session store の不整合が本命である。`/offline` は無関係、`AdminAuthProvider` 配置も `/admin/*` に限定されており構造上明快である。再現条件は「ログイン cookie 発行 worker と、後続 API 検証 worker が異なること」で、admin だけでなく viewer も同型リスクを持つ。
