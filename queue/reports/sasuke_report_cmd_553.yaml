result:
  summary: "本番404の主因は『本番backendデプロイに deterioration ルート未反映』。ローカルコード側のルーター/import/マイグレーションは正常。render.yaml には deterioration-batch cron が未定義。"
  details: |
    調査結果（要点）:
    1) Render cron定義
       - render.yaml の cron は以下5件:
         - dm-signal-sync-prices (0 1 * * *)
         - dm-signal-sync-tickers (5 1 * * *)
         - dm-signal-sync-standard (10 1 * * *)
         - dm-signal-sync-fof (40 1 * * *)
         - dm-signal-password-rotation (0 16 1 * *)
       - deterioration-batch cron は未定義（欠落）

    2) BEルーター/importチェーン
       - backend/app/main.py で deterioration_router の import + include_router を確認
       - backend/app/api/deterioration.py の import 連鎖を検証
       - .venv で import実行確認: app.api.deterioration = OK
       - app.main.app の routes に以下が存在:
         - /api/deterioration
         - /api/deterioration/{portfolio_id}
         - /admin/deterioration-batch

    3) DBマイグレーション
       - backend/app/db/migrations.py に deterioration_snapshots 作成/追設ロジックあり
       - backend/app/db/init_db.py が run_migrations() を実行
       - render.yaml backend startCommand は python -m app.db.init_db を含み、起動時マイグレーション実行構造

    4) FE→BE接続
       - render.yaml frontend env: NEXT_PUBLIC_API_HOST=https://dm-signal-backend.onrender.com
       - 本番配信JSでも baseUrl が上記hostに展開済み、/api/deterioration を呼び出す実装を確認

    5) 本番404の直接証跡
       - curl https://dm-signal-backend.onrender.com/api/deterioration => 404 {"detail":"Not Found"}
       - 本番 openapi.json に /api/deterioration と /admin/deterioration-batch が未掲載
       - 一方、ローカルmain(HEAD)では当該ルートが存在
       ⇒ 根本原因はコード欠陥より『本番backendが deterioration 追加コミットを未デプロイ』と判断

