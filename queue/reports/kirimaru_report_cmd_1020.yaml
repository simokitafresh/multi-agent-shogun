result:
  summary: Phase 3 用の汎用 CPCV エンジンを追加した。wide monthly-return CSV を低オーバーヘッドで読み、logit
    PBO、pluggable metrics、8群28fold CPCV を一つの CLI に統合した。実データ検証は DM7+ 3メトリクス、DM2 1メトリクスで完走した。
  details: "実装要点:\n1. データ読込\n   - pandas の超wide DataFrame常駐を避けるため、CSVを行単位で読み込み `T\
    \ x N` NumPy 行列へ変換した。\n   - `meta.yaml` の common_period と実CSV期間が一致しない場合は即エラーにしている。\n\
    \n2. logit PBO\n   - test score の descending rank を 0..1 に正規化し、best=1 / worst=0\
    \ になる向きで扱った。\n   - `epsilon=1e-6` で clip して `lambda = log(rank / (1-rank))` を計算。\n\
    \   - PBO は `mean(lambda <= 0)`、比較用 simplified PBO は `mean(rank_norm <= 0.5)`\
    \ として同一入力比較を markdown に出力した。\n\n3. pluggable metrics\n   - `shin_shijin_l1_gs.py`\
    \ の8メトリクス定義を engine 内へ移植し、`metric_dispatch()` へ集約した。\n   - `ReturnWindow` キャッシュで\
    \ cumulative / running_peak / running_min / sorted_desc を使い回し、fold内で複数メトリクスを評価しても再計算を抑えている。\n\
    \n4. fold 構造\n   - live common period は 167ヶ月で 8 等分不可のため、`np.array_split` による\
    \ contiguous 8群（21,21,21,21,21,21,21,20）を採用した。\n   - 各 test block の前1ヶ月を purge、後1ヶ月を\
    \ embargo とし、group番号/期間/train/test月数を summary に出力した。\n\n5. 実行確認\n   - `DM7+` で\
    \ `Calmar_Ratio NHF Max_Run-up` の 3メトリクス同時実行を確認。\n   - `DM2` で `Calmar_Ratio`\
    \ の大規模ケースを確認し、76,680変種でもエンジンが完走することを見た。\n"
