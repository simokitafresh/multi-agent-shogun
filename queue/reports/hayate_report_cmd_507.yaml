      - "signals.py L201/L260: FoF `signal_pending: False` 固定"
      - "monthly_trade_calculator.py L126/L405: pending判定のsignal_date計算が `\"monthly\"` 固定"
      - "portfolio-details.tsx L34-L35, dashboard/page.tsx L260-L261: target month が client `new Date()` 基準"
    impact: "月初pending期間で as_of基準と画面期待（月表示）がズレ、ページ間で表示契約が揺れる。"

  - id: F2
    title: "[HIGH] OPEN/CLOSE切替で benchmark表示が混在（close固定箇所あり）"
    evidence:
      - "monthly-returns-table.tsx L282: benchmark balance は `entry.benchmark.balance` 固定"
      - "annual-returns-table.tsx L231: benchmark balance は `entry.benchmark.balance` 固定"
      - "rolling-returns-summary-table.tsx L138-L145: benchmark列は average/high/lowのみ参照（*_open未使用）"
    impact: "OPEN選択時に portfolioはOPEN系、benchmarkはCLOSE系が混在し、比較が歪む。"

  - id: F3
    title: "[HIGH] precomputed trades の0値が None 化される"
    evidence:
      - "trades_calculator.py L733-L737: `if trade.<value> else None` により 0.0 が None 化"
    impact: "0%の実値が欠損表示(\"-\")になり、取引履歴の事実とUIが不一致化。"

  - id: F4
    title: "[MEDIUM] Monthly Trade API公開項目の一部がUI非表示"
    evidence:
      - "monthly_trade_calculator.py L197-L198/L255/L257/L438-L444: benchmark_return, in_market, calculated_return_*, matched_weight, component_portfolios"
      - "monthly-trade-table.tsx: 上記フィールド参照なし（grep一致なし）"
    impact: "backendで算出済みの検証・説明情報がユーザーに届かず、調査時の可観測性が低い。"

  - id: F5
    title: "[LOW] /api/mtd の signal/raw_signal は現行UI未使用"
    evidence:
