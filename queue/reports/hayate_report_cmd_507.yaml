result:
  summary: "cmd_507 偵察Aを完了。主要APIのレスポンス棚卸しとfrontend実表示の突合を実施し、cmd_494同種のpending表示契約ズレを含む高リスク不整合を特定。"
  details: |
    実施範囲（実装変更なし、reconのみ）:
    - Backend API/Service:
      - backend/app/api/{signals,monthly_trade,monthly_returns,annual_returns,history,performance,benchmark,metrics,trades,rolling_returns,drawdowns}.py
      - backend/app/services/{monthly_trade_calculator,monthly_returns_calculator,annual_returns_calculator,trades_calculator,rolling_returns_calculator,drawdowns_calculator}.py
    - Frontend:
      - frontend/lib/{api-client.ts,types/*}
      - frontend/app/{page,dashboard,compare,compare-summary,summary,monthly-trade,monthly-returns,annual-returns,metrics,trades,rolling-returns,drawdowns}/page.tsx
      - frontend/components/*table.tsx, *chart.tsx, portfolio-details.tsx

    監査結果（要旨）:
    1) cmd_494同種（pending表示契約）の不整合を再検出:
       - /api/signals は standard monthly のみ pending判定。
       - /api/monthly-trade 側 pending判定は trigger固定 monthly を使用。
       - Home/Dashboard の target month は client `new Date()` 依存。
       → as_of基準と画面ラベル基準が分離し、月替わりで表示期待が揺れる構造が残存。

    2) OPEN/CLOSEトグルの表示整合に差分:
       - Monthly/Annual Returns table の benchmark balance が OPENでも close残高表示。
       - Rolling summary table の benchmark列が OPEN値（*_open）を使わず close固定。

    3) precomputed trades の0値処理:
       - 0.0が truthy判定で None 化され、frontend表示上 "-" になるパスを確認。

    4) API公開済みだがUI未表示の項目（例）:
       - Monthly Trade entry: benchmark_return, in_market, calculated_return_open/close, matched_weight, component_portfolios。

