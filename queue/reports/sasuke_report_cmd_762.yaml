result:
  summary: |
    最大のボトルネックは「単一 Render backend への運用集中」である。`dm-signal-backend` 1サービスに、公開API、admin API、4本の日次cron、月次 deterioration batch、月次 password rotation、Render環境変数更新依存が集中しており、障害時の blast radius が広い。次点は deploy gate/rollback 自動化不足、三点目は監視・アラートがログ/手動計測中心で能動通知が薄いこと。
  details: |
    調査結論:
    1. Render構成 / コスト
       - `render.yaml:3-24` で backend は `plan: pro`、`render.yaml:167-172` で DB は `basic-1gb`。repo内の旧コスト資料 `docs/deployment/render-info.md:3-15,67-74` は「現在 Standard / 合計 ~$26/月」と記載しており、現行 manifest と不一致。
       - 同資料の価格表をそのまま使うと、現行 manifest は backend Pro $85 + DB Basic-1gb ~$10 で、既知ベースだけでも少なくとも ~$95/月級。static frontend と cron の課金は repo 上で明文化不足。

    2. 最大の障害リスク: 単一 backend への集中
       - `render.yaml:3-24` の単一 web service を、frontend (`render.yaml:82-83`) と全 cron (`render.yaml:87-165`) が共有。
       - cron はすべて backend の admin endpoint を `curl` で直叩き (`render.yaml:96,108,120,132,144`)。backend 停止・認証不整合・Render DNS/route 障害時に、公開画面と定期処理が同時に止まる。
       - `backend/app/api/etl_trigger.py:22-28,46-69,84-119` では ETL 状態管理がプロセス内メモリ `_etl_status`。単一プロセス前提であり、将来 multi-instance 化時に状態の一貫性が崩れる。
       - `backend/app/jobs/password_rotation.py:23-37` は DB + Render API の両方に依存し、`backend/app/services/render_env.py:25-60` 失敗時は例外送出。月次ローテーション失敗の退避/再試行/補償が実装されていない。

    3. デプロイパイプライン評価
       - backend build は `pip install -r requirements.txt` のみ (`render.yaml:9`)、frontend build は `npm install && npm run build` のみ (`render.yaml:31`)。render.yaml 上に pre-deploy test gate は無い。
       - repo 直下 `.github/workflows` は存在せず、自動CI workflow は未確認（`/mnt/c/Python_app/DM-signal/.github` 不在を確認）。
       - 自動化として見つかったのは `auto-ops/deploy_and_measure.sh` の post-deploy 監視だけで、内容は Render API polling + CDP計測 + ntfy 通知 (`auto-ops/deploy_and_measure.sh:45-160,165-192`)。rollback 実行は含まれず、失敗時も通知止まり。

    4. 監視・アラート体制
       - backend は `/healthz` と `/healthz/deep` を提供 (`backend/app/main.py:217-285`)。ただし Render health check は軽量 `/healthz` のみ (`render.yaml:11`) で、DB/外部APIの深い異常は自動検知対象に入っていない。
       - `/healthz` ログは抑制され (`backend/app/main.py:50-62,77-79`)、パフォーマンス観測は `[PERF]` ログ中心 (`docs/logging/LOGGING_GUIDE.md:108-148`)。Sentry / OpenTelemetry / external uptime monitor / pager 系の実装は repo 内で未確認。
       - `deploy_and_measure.sh` の ntfy (`auto-ops/deploy_and_measure.sh:21-32,190-192`) は手元運用補助であり、本番API/cron失敗を常時監視する仕組みではない。

    5. 運用改善 Top3
       - Top1: cron と重処理を backend web service から切り離す。特に L0-L4 sync/batch を queue/worker か dedicated job service 化し、frontend/API availability と batch failure domain を分離。
       - Top2: pre-deploy test gate + rollback 手順のコード化。Render deploy 前に backend/frontend の最小 smoke を必須化し、post-deploy failure 時に revert or previous deploy rollback を自動/半自動化。
       - Top3: 監視の二層化。`/healthz` だけでなく `/healthz/deep` 相当の内部監視、cron 成否記録、Render API/DB/Stock API 異常の alert fan-out を追加。
