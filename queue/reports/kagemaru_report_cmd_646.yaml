result:
  summary: "SW CacheStorageによるAPIレスポンス永続化はFEASIBLE。stale-while-revalidate戦略でフルリロードでも瞬間表示を実現可能。実装コスト中。"
  details: |
    ■ 1. 担当観点と調査範囲

    観点2: Service Workerによるキャッシュ永続化
    - 現行sw.js(v8)の構造分析
    - CacheStorage vs IndexedDB の比較評価
    - stale-while-revalidate戦略の設計
    - キャッシュ有効期限・容量管理
    - PF切替時のキャッシュ戦略
    - 現行APIクライアント(api-client.ts)・インメモリキャッシュ(api-cache.ts)との統合設計

    ■ 2. 提案アプローチの概要

    sw.jsのfetchハンドラを拡張し、バックエンドAPIレスポンスをCacheStorageに
    stale-while-revalidate戦略で永続キャッシュする。フルページリロード後も
    CacheStorageからAPIレスポンスを即返却し、バックグラウンドで最新データに更新する。

    ■ 3. 技術的実現可能性: FEASIBLE

    根拠:
    (a) CacheStorage APIはSW内で完全サポートされており、ページ遷移で消えない
    (b) 現行sw.jsは/api/リクエストをbypassしているだけなので、拡張が容易
    (c) cross-origin APIリクエスト(dm-signal-backend.onrender.com)もSW fetchイベントで
        インターセプト可能(現行sw.jsで既にpathname判定済み)
    (d) DM-SignalバックエンドはCORS設定済み(credentials:'include'で通信中)
        → レスポンスはopaque化しない → CacheStorageにContent-Type付きで保存可能
    (e) Next.js Static Export環境でもSW登録は正常動作中(現行sw.jsで実証済み)

    ■ 4. 実装コスト: 中 / リスク

    変更対象:
    - sw.js: ~60行追加(APIキャッシュ戦略 + TTL管理 + 定期cleanup)
    - api-client.ts / api-cache.ts: 変更不要(インメモリキャッシュは併存)
    - usePrefetch.ts: 変更不要(prefetchAll はそのまま動く。SWが透過的にキャッシュ)
    - ServiceWorkerRegister(layout.tsx): CACHE_NAMEバンプ時のSW更新フロー確認のみ

    リスク:
    (a) Staleデータ表示: revalidateで軽減。データは日次更新のため5分TTLで十分
    (b) キャッシュバージョン不整合: デプロイ時にAPI_CACHE_NAMEをバンプすれば解決
    (c) CORS設定変更: 現行CORS設定が壊れるとopaque responseになりキャッシュ不能
        → 既存のcredentials:'include'通信が正常ならリスク低
    (d) SW更新遅延: skipWaiting()使用中のため即時アクティベートされる → リスク低

    ■ 5. 期待効果

    | シナリオ | 現状 | SW Cache後 | 改善幅 |
    |---------|------|-----------|--------|
    | 初回訪問 | API fetch 1-3秒 | 変化なし(キャッシュ空) | - |
    | 同一セッション内ページ遷移 | API fetch 1-3秒(キャッシュ全消滅) | <100ms(CacheStorage即返却) | 10-30倍高速 |
    | 翌日再訪問(TTL切れ) | API fetch 1-3秒 | stale即表示 + BG更新 | 体感瞬間 |
    | PF切替 | API fetch 1-3秒 | <100ms(全PFキャッシュ済み) | 10-30倍高速 |

    特に「メニューから別ページへ遷移」のユースケースで劇的改善。
    現行はwindow.location.hrefでフルリロード → インメモリキャッシュ全消滅 → loading表示。
    SW Cache後はフルリロードでもCacheStorageから即応答 → 瞬間表示。

    ■ 6. 現行コードベースへの影響範囲

    6.1 sw.js (frontend/public/sw.js) — 主要変更箇所

    現行構造:
    ```
    install: 静的アセット(manifest, icons)キャッシュ
    activate: 旧CACHE_NAME削除
    fetch:
      /_next/static/* → Cache First
      /_next/* (other) → Network Only
      navigate → Not intercepted (browser直接)
      /api/ + /admin/ → Not intercepted ← ★ここを変更
      signals.json → Network First
      other → Cache First (JS/CSS/images)
    ```

    変更案:
    ```
    fetch:
      /api/ (backend origin) → Stale-While-Revalidate (NEW)
      /admin/ (non-page) → Network Only (維持)
    ```

    6.2 二層キャッシュ構造(共存設計)

    | 層 | 実装 | 永続性 | TTL | 用途 |
    |---|------|--------|-----|------|
    | L1: SW CacheStorage | sw.js | ページ遷移で生存 | 5分 | フルリロード後の即応答 |
    | L2: インメモリMap | api-cache.ts | ページ遷移で消滅 | 5分 | 同一ページ内の高速アクセス |

    L1 → L2 の関係:
    - prefetchAllがAPI呼び出し → fetchイベントでSWが透過的にキャッシュ(L1)
    - 同時にapi-client.tsのrequest()がインメモリキャッシュ(L2)にもセット
    - ページ遷移後: L2消滅 → prefetchAllが再実行 → SWのL1から即応答 → L2に再セット
    - つまりprefetchAllのコードは変更不要。SWが透過的に動く。

    6.3 影響を受けないファイル

    - api-client.ts: SWは透過的に動作。fetchの戻り値が変わらない
    - api-cache.ts: インメモリキャッシュはそのまま機能
    - usePrefetch.ts: prefetchAllはAPI呼出→SWが自動キャッシュ。変更不要
    - usePortfolioParam.ts: URLパラメータ管理のみ。影響なし

    ■ 7. 新たに発見した事実

    7.1 CacheStorage vs IndexedDB の比較

    | 観点 | CacheStorage | IndexedDB |
    |------|-------------|-----------|
    | データ型 | Request/Response pairs | 任意のJS object |
    | SW統合 | ネイティブ(event.respondWith直結) | 非同期API経由で変換必要 |
    | 複雑度 | 低(cache.match → cache.put) | 高(open → transaction → objectStore) |
    | キー | URL(Request) | カスタムキー自由 |
    | 容量 | origin単位で数百MB-GB | 同左 |
    | このユースケース適合度 | ◎ (HTTPキャッシュが目的) | △ (オーバースペック) |

    結論: CacheStorageが適切。IndexedDBは不要。

    7.2 現行sw.jsの/api/バイパスの実態

    sw.jsの `url.pathname.startsWith("/api/")` チェックは、
    cross-originリクエスト(dm-signal-backend.onrender.com)のpathnameもマッチする。
    つまり現行でもバックエンドAPIリクエストはSWのfetchイベントを通過している
    (bypassでブラウザに委任されている)。
    stale-while-revalidateへの切替は、このbypassを条件分岐に変えるだけ。

    7.3 キャッシュキーの自然な一致

    APIクライアントのendpointパターン:
    - /api/history/{portfolioId}?days=365
    - /api/performance/{portfolioId}?years=3
    - /api/metrics/{portfolioId}?years=10
    - /api/drawdowns/{portfolioId}?limit=10
    - /api/rolling-returns/{portfolioId}
    - /api/monthly-returns/{portfolioId}?months=120
    - /api/annual-returns/{portfolioId}?years=12
    - /api/monthly-trade/{portfolioId}?limit=24
    - /api/mtd/{portfolioId}
    - /api/metrics/summary?years=0

    CacheStorageのキー(Request URL)とapi-cache.tsのキー(endpoint string)は
    自然に一致する。PFごと・パラメータごとに独立エントリとなり衝突しない。

    7.4 容量見積もり

    - ポートフォリオ数: ~100 PF
    - API種類: 9 + global 1 = 10
    - 平均レスポンスサイズ: ~50KB (JSON)
    - 合計: 100 × 10 × 50KB = 50MB
    - CacheStorage quota: origin単位で数百MB-GB (十分)

    7.5 PF切替時のキャッシュ戦略: 全PFキャッシュ推奨

    - 現行prefetchAllが既に全PF×全APIをバックグラウンドfetchしている
    - SWはこのfetchを透過的にキャッシュするだけ → 全PF自動キャッシュ
    - 50MBは容量的に問題なし
    - 「現PFのみキャッシュ」は追加ロジックが必要で複雑化するだけ

    7.6 TTL管理の推奨実装

    SW内でのTTL管理方法:
    ```js
    // キャッシュ保存時にタイムスタンプヘッダ付与
    const timedHeaders = new Headers(response.headers);
    timedHeaders.set('sw-cached-at', Date.now().toString());
    const cachedResponse = new Response(response.clone().body, {
        status: response.status,
        statusText: response.statusText,
        headers: timedHeaders
    });
    cache.put(request, cachedResponse);

    // 読出時にTTLチェック
    const cachedAt = parseInt(cached.headers.get('sw-cached-at') || '0');
    const isStale = (Date.now() - cachedAt) > API_CACHE_TTL;
    if (isStale) {
        // staleだがまず返す → BG更新
        event.respondWith(cached);
        event.waitUntil(fetch(request).then(r => cache.put(request, r)));
    }
    ```
