result:
  summary: "cdp_helper.py は各 CDP コマンドごとに `/json` 再取得 + WebSocket 再接続を行う設計で、固定 sleep と 30 秒既定 timeout が重なり、perf_measure の認証・待機ループで数分級へ膨張しうる。"
  findings:
    - category: "CDP通信フロー"
      detail: "launch_browser→`/json/version` 疎通確認(cdp_helper.py:110-148)→get_tab_id→`/json` で tab 検索(perf_measure.py:494-501, cdp_helper.py:151-167)→enable_browser_domains で `Page.enable`/`Performance.enable`/`Network.enable` を各1回送信(perf_measure.py:531-535)→各送信時に `_resolve_ws_url` が再び `/json` を引き(tab_id→ws_url 解決)、`_cdp_send_sequence` が WebSocket を新規接続・送信・応答待機・close まで毎回実施(cdp_helper.py:170-250)。"
    - category: "全CDPコマンド発行"
      detail: "helper 内で直接発行する CDP method は `Runtime.evaluate`(58-66), `Page.navigate`(69-74), `Page.captureScreenshot`(271-283), `Performance.enable` + `Performance.getMetrics`(286-295)。HTTP endpoint は `GET /json/version`(35-42, 142-148) と `GET /json`(159-186)。caller 側の `enable_browser_domains` は `Page.enable`/`Performance.enable`/`Network.enable` を追加送信(perf_measure.py:531-535)。"
    - category: "ページロード完了判定"
      detail: "helper 自体は表示完了イベントを待たず、`navigate()` 後に固定 sleep するだけ(cdp_helper.py:69-74)。実際の完了判定は caller 側で `document.readyState === 'complete'` を 1 秒間隔 polling する `wait_for_document_complete`(perf_measure.py:576-588) と、CSS selector 存在を 0.5 秒間隔 polling する `wait_for_element`(cdp_helper.py:253-268, perf_measure.py:615-650) の組み合わせ。`Page.loadEventFired` や lifecycle event は未使用。"
    - category: "前処理時間見積"
      detail: "1 ページ計測開始前の helper/caller 起因オーバーヘッドは、warm でも `get_tab_id` 1回 + domain enable 3回 + first navigate 1回で少なくとも 4 回の `/json` 取得 + 4 回の WebSocket 接続が入る。さらに navigate は local で固定 1 秒、production/auth 系では最小 5 秒(perf_config.yaml:7-8,16-19, perf_measure.py:167,198,280,1457,1585,1684)。cold/auth では `wait_for_element(timeout=10)` が実際には `js_eval` の既定 30 秒 timeout を内包し(cdp_helper.py:58-66,253-268)、1 回の認証試行だけで 30 秒超、再試行込みで数分級になりうる。"
    - category: "問題箇所"
      detail: "主因は 1) command ごとの ws 再接続(cdp_helper.py:45-55,170-250), 2) `_resolve_ws_url` の毎回 `/json` 走査(170-186), 3) `navigate()` の固定 sleep(69-74), 4) `wait_for_element()` が呼び出し timeout を `js_eval` へ渡さないため declared timeout を超過しうる点(253-268), 5) `get_page_metrics()` で毎回 `Performance.enable` を再送する重複(286-293)。エラー時は retry/backoff なしで subprocess timeout 任せ(19-32,201-250)。"
    - category: "実装直結"
      detail: "最優先変更は `cdp_helper.py:45-55,170-250,253-295`。`tab_id` 解決時に ws_url を 1 回だけ確定し、persistent session もしくは batched send を使って `Page.enable`/`Performance.enable`/`Network.enable`/`Page.navigate`/polling を同一接続へ寄せる。`js_eval` に timeout 引数を通し `wait_for_element` が実 timeout を守るよう修正。caller 側は `perf_measure.py:531-540,576-650,1868-1887` を追従更新し、`Page.loadEventFired` or lifecycle-based wait へ置換。テストは helper 単体の fake CDP 応答試験 + perf_measure の auth/navigation timeout 回帰試験が必要。"
  verdict: "CDP 計測遅延の根因の一つは cdp_helper.py の stateless transport 設計であり、特に polling 系 API が毎回 `/json` + WebSocket 接続を繰り返す点と timeout 伝播不備が支配的。"
  confidence: high
  blind_spots: "実ブラウザ相手の live trace は未実施。所要時間はコード上の sleep/timeout/ループ構造からの見積であり、WSL2/Render 実測は別任務の縦偵察結果と統合が必要。"
