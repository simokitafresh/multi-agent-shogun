  cmd_1301:
    title: startup gate bash算術エラー修正 — grep -c || echo anti-pattern根絶
    task_type: implement
    command: |
      ■ 背景
      gate_shogun_startup.shに2箇所のbash算術エラーが存在。
      grep -c はマッチ0件時にexit 1を返す。
      $(grep -c ... || echo "0") は「0」「0」の二重出力を生み、
      $((...))算術式でsyntax errorになる。

      具体的影響:
      - Line 282: dash_proposals計算失敗 → Gate 11(軍師未処理提案)が全スキップ
        → 軍師S43の3件(GP-021/022/023)が将軍に不可視
      - Line 101: ruling_count計算失敗 → 裁定0件時にsyntax error
        （現在は裁定8件あるため偶然発火していない）

      ■ 修正方法
      2箇所とも同一パターン:
      Before: var=$(grep -c 'PATTERN' "$FILE" 2>/dev/null || echo "0")
      After:  var=$(grep -c 'PATTERN' "$FILE" 2>/dev/null) || var=0

      ■ AC
      AC1: gate_shogun_startup.sh line 101 と line 282 の
           grep -c || echo "0" anti-pattern を修正
      AC2: bash scripts/gates/gate_shogun_startup.sh 実行時に
           syntax error が0件であること (stderr確認)
      AC3: Gate 11の出力検証 — gunshi_review_log.yamlに
           status: pending の proposals が存在する場合、
           「未処理PROPOSAL」セクションが正しく表示されること
    acceptance_criteria:
    - gate_shogun_startup.sh内のgrep -c || echo anti-patternが全箇所修正されていること
    - bash scripts/gates/gate_shogun_startup.sh 2>&1 実行でsyntax errorが0件であること
    - 軍師提案(status:pending)存在時にGate 11が提案件数を正しく表示すること
