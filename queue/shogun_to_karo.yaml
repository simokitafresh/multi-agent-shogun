    status: delegated
    timestamp: '2026-03-19T04:20:00+09:00'
  cmd_1078:
    acceptance_criteria:
    - 'AC1: Phase 3 CPCV screeningをDM7+ RXLU 48変種のみで実行。出力: outputs/analysis/cmd_1078_screening_DM7P_RXLU.csv（各変種のcandidate
      PBO × 3メトリクス + binomial PASS判定）'
    - 'AC2: 二項検定PASS候補数を報告（Bin(28,0.50), PBO≤0.321, 3メトリクス全通過）。PASS 0体の場合はその事実を報告して停止'
    - 'AC3: Phase 4 decorrelation selectionをPASS候補のみで実行。K=1のみ（殿裁定済み）。4体選出。出力: outputs/analysis/cmd_1078_dm7p_rxlu_selected.csv'
    - 'AC4: 選出4体のパフォーマンスサマリー（CAGR, MaxDD, UD_Ratio, Skewness, Max_Run-up）+ 既存玄武4体との比較表'
    - 'AC5: git commit完了'
    command: '■ 背景

      シン玄武(DM7+)の現行4体はPhase 3をskipし、かつDNA違反（RGLD=GLD, lookback 15M/18M）。

      DM7+のDNA: relative=XLU, lookback=24M（SM07「24Mは鈍さが本質」SM11「XLU1つは意図的」）。

      RXLU固定でPhase 3+4をやり直し、DNA準拠の4体に差し替える。


      ■ 実行手順

      Phase 3:

      - scripts/analysis/cmd_1023_phase3_cpcv_screening.py をベースに、DM7+ RXLU 48変種のみで実行

      - build_dm7p_skip_frame() のbypassロジックを使わず、DM2/DM3/DM6と同じrun_family_screening()を通す

      - ただしDM7+のTriple-Eメトリクスは ["Max_Run-up", "UD_Ratio", "Skewness"]（Phase 4スクリプトのTRIPLE_E定義に従う）

      - RXLU以外の変種（RGLD）をフィルタで除外してからCPCV実行

      - GS月次リターンCSV: outputs/grid_search/shin_shijin_l1/monthly_{tag}.csv（tag=DM7Pのはず。shin_shijin_cpcv_engine.pyのFAMILY_TAG参照）


      Phase 4:

      - Phase 3のPASS候補に対し、scripts/analysis/cmd_1024_phase4_k_selection.py のロジック（decorrelation
      selection）を適用

      - K=1のみ実行（K=2/3は不要）

      - 4体選出: Triple-Eメトリクスごとにseed選定 → 残りスロットは最小相関で補完


      ■ 入力ファイル

      - outputs/grid_search/shin_shijin_l1/monthly_DM7P.csv（月次リターン行列）

      - outputs/grid_search/shin_shijin_l1/metrics_DM7P.csv（パフォーマンスメトリクス）

      - scripts/analysis/shin_shijin_cpcv_engine.py（共通CPCV関数）

      - scripts/analysis/cmd_1023_phase3_cpcv_screening.py（Phase 3参照実装）

      - scripts/analysis/cmd_1024_phase4_k_selection.py（Phase 4参照実装）


      ■ 注意

      - 既存スクリプトを直接修正するな。cmd_1078専用の新スクリプト(scripts/analysis/cmd_1078_dm7p_rxlu_redo.py)を作成せよ

      - 共通エンジン(shin_shijin_cpcv_engine.py)のimportは活用してよい

      - PASS 0体の場合: lookback制約を24M固定にさらに絞るか判断が必要になるが、まずは48体全体(12M/15M/18M/24M × 12
      rebalance)で実行し結果を見せよ

      '
    delegated_at: '2026-03-19T05:30:00'
    id: cmd_1078
    not_in_scope:
    - DM2/DM3/DM6の再実行（変更なし）
    - RGLD変種の使用（XLU固定が目的）
    - シン四神30体構成の最終確定（将軍が判断）
    - 設計書(shin_shijin_design.md)の更新（将軍が実施）
    priority: high
    project: dm-signal
    purpose: シン玄武(DM7+)をXLU固定でPhase 3+Phase 4やり直し。DNA準拠の4体を再選定する
    scope_mode: REDUCTION
