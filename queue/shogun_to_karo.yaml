  cmd_1311:
    title: GP-003正規表現バグ修正 — report YAML hookが全忍者で未発火
    task_type: implement
    command: |
      ■ 背景
      GP-003(PreToolUse DENY)はWrite/Editによる報告YAML直接書込みを禁止するhook。
      しかし**正規表現バグにより全忍者で発火していなかった。**

      ■ 根本原因（将軍が確認済み）
      hookの正規表現: queue/reports/.*_report_.*\.yaml$
      実際のファイル名: hayate_report.yaml（全6忍者同パターン）

      _report_ は _report.yaml にマッチしない。
      _report_ は _report_cmd_1307.yaml にはマッチする。
      現在のdeploy_task.shは report_filename: {ninja}_report.yaml を生成。
      → hookは全忍者の報告で発火しない。GP-003は実質無効だった。

      ■ 検証コマンド（将軍実施済み）
      [[ "queue/reports/hayate_report.yaml" =~ queue/reports/.*_report_.*\.yaml$ ]]
      → NO MATCH（hookすり抜け確認）

      ■ 修正箇所
      scripts/hooks/pre-write-report-deny.sh L35:
        修正前: if [[ "$file_path" =~ queue/reports/.*_report_.*\.yaml$ ]]; then
        修正後: if [[ "$file_path" =~ queue/reports/.*_report[_.].*\.yaml$ ]]; then
      （_report_ → _report[_.] で _report.yaml と _report_cmd_XXX.yaml の両方にマッチ）

      ■ テスト
      修正後に以下の4パターンで発火テスト:
      (1) hayate_report.yaml → DENY（修正後新たにマッチ）
      (2) hayate_report_cmd_1307.yaml → DENY（既存マッチ維持）
      (3) queue/tasks/hayate.yaml → 通過（report以外は無関係）
      (4) report_field_set.sh経由 → 通過（REPORT_FIELD_SET_ACTIVE=1バイパス）
    acceptance_criteria:
    - pre-write-report-deny.shの正規表現が {ninja}_report.yaml にマッチすること
    - 修正後4パターンテスト全PASS（上記■テスト参照）
    - 既存テスト（bats）が回帰なしで全PASS
    project: infra
    priority: high
    quality_gate:
