commands:
  cmd_1077:
    acceptance_criteria:
    - docs/rule/ 配下に手順書が作成されていること
    - '以下の手順が具体的なAPI呼び出し例（curl/python）付きで記載されていること:'
    - '  (1) フォルダー作成（POST /api/admin/folders、認証方法、2階層制約）'
    - '  (2) L0素材PF登録（standard PF作成、hide_portfolio=true設定）'
    - '  (3) L1 K=1 PF登録（standard PF作成、フォルダー移動）'
    - '  (4) L1 K=2/K=3 FoF登録（component_portfolios指定、フォルダー移動）'
    - '  (5) L2 シン忍法FoF登録（component_portfolios指定、フォルダー移動）'
    - '  (6) 登録順序の依存関係図（L0→L1 K=1→L1 K=2/3→L2）'
    - 手順書の各ステップが本番APIコードと整合していること（推測禁止、コード確認必須）
    command: '■ 背景

      シン四神30体+シン忍法21体+L0素材10体の本番DB登録が控えている。

      登録手順を事前にドキュメント化し、実行時に忍者が迷わず作業できるようにする。


      ■ 調査対象ファイル

      - backend/app/api/folders.py — フォルダーCRUD API全容

      - backend/app/api/portfolios.py — PF保存API（POST /api/portfolios/save）

      - backend/app/db/models.py — Portfolio, PortfolioFolder モデル（type, config, folder_id,
      hide_portfolio）

      - backend/app/schemas/ — PF作成リクエストスキーマ

      - backend/.env — 認証情報（Basic認証のユーザー/パスワード）

      - docs/skills/api-reference.md — 既存API利用ガイド


      ■ 命名規則（確定済み、設計書§2参照）

      - L0素材: L0-{params}（hide_portfolio=true）

      - L1 K=1: シン{四神}-P{n}（standard PF）

      - L1 K=2/3: シン{四神}-P{n}-K{k}（FoF）

      - L2: シン{忍法}-{モード}（FoF）

      - フォルダー: 「シン四神」「シン忍法」の2つのみ


      ■ 手順書の構成

      1. 前提条件（認証、本番URL、MAX_PORTFOLIOS確認）

      2. フォルダー作成（2フォルダー）

      3. L0素材PF登録（10体、非表示設定）

      4. L1 シン四神登録（30体、K=1 standard + K=2/3 FoF）

      5. フォルダー移動（L1 30体をシン四神フォルダーへ）

      6. L2 シン忍法登録（最大21体、Phase 5完了後に実行）

      7. 検証手順（登録後の確認方法）

      '
    delegated_at: '2026-03-19T04:15:42'
    id: cmd_1077
    not_in_scope:
    - 実際のPF登録（手順書作成のみ）
    - '命名規則の決定（確定済み: outputs/analysis/shin_shijin_design.md §2参照）'
