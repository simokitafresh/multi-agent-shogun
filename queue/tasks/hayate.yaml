task_id: cmd_1156_impl
parent_cmd: cmd_1156
status: pending
project: infra
type: implement
command: |
  【緊急バグ修正】ninja_monitor.shのflat YAML非対応修正。AC1+AC2を実装せよ。

  AC1: scripts/ninja_monitor.sh の check_and_update_done_task 修正（L567付近）
    現行: yaml_field_set "$task_file" "task" "status" "done" → flat YAMLで FATAL
    修正: yaml_field_set失敗時のフォールバック追加:
      1. yaml_field_setをif文で囲み、失敗時にフォールバックへ
      2. grep -q "^status:" "$task_file" でflat形式を確認
      3. sed -i "s/^status: .*/status: done/" "$task_file" で直接更新
      4. log "FLAT-YAML-FALLBACK: $name status → done (yaml_field_set failed, flat format detected)"
      5. completed_atも同様にflat形式対応（python3ブロックがtask blockを前提 → 不在時はsed）
      6. 更新後にfield_get "$task_file" "status"が"done"を返すことを確認

  AC2: STAGE1-SKIPタイマー安全弁追加（L2093付近）
    現行: status=assigned/acknowledged/in_progress/pending → 無条件/clear禁止
    修正: mtime 15分超 + pane idle → STAGE1-SKIP解除
      1. task YAMLのmtimeをstat -c %Y で取得
      2. 現在時刻との差が900秒以上 → STAGE1-SKIP解除
      3. task YAMLのstatusをidleにリセット（sedフォールバック使用）
      4. log "STAGE1-TIMEOUT: $name task_status=$status stale for ${age}s, resetting to idle"
      5. 通常の/clearフローへ合流
      6. 注意: in_progressの場合は閾値を1800秒（30分）にする
acceptance_criteria: |
  AC1: yaml_field_set失敗時にflat形式フォールバックが発火しstatus更新が成功すること
  AC2: STAGE1-SKIP 15分タイマーが実装され、stale taskで/clear解除されること
binary_checks:
  AC1:
    - "yaml_field_set失敗時のフォールバックコードがcheck_and_update_done_taskに存在するか?"
    - "grep ^status: によるflat形式検出があるか?"
    - "sed -i によるstatus直接更新があるか?"
    - "FLAT-YAML-FALLBACKのログ出力があるか?"
    - "field_getによるpost-update検証があるか?"
  AC2:
    - "stat -c %Y によるmtime取得があるか?"
    - "900秒(15分)の閾値チェックがあるか?"
    - "in_progress時の1800秒(30分)閾値があるか?"
    - "STAGE1-TIMEOUTのログ出力があるか?"
    - "statusをidleにリセットするコードがあるか?"
stop_for:
  - bash -n scripts/ninja_monitor.sh がシンタックスエラー
never_stop_for: []
