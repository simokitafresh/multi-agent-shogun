task:
  ac_checkpoint: '各AC完了後に checkpoint: 次ACの前提条件確認 → scope drift検出 → progress更新'
  ac_priority: AC1 > AC2 > AC3
  acceptance_criteria:
  - id: AC1
    description: 'field_get.shの検索優先順位を修正。トップレベル(^field:)を先に検索し、見つからない場合のみインデント付きを検索。現状はインデント付き優先でネストされたフィールドを誤返却する'
    binary_checks:
    - field_get.sh内で ^field: (トップレベル)検索が ^\\s+field: (インデント付き)検索より先に実行されるか: yes/no
    - トップレベルにヒットがあればインデント付き検索をスキップしてその値を返すか: yes/no
    - トップレベルにヒットがなければインデント付き検索にフォールバックするか: yes/no
  - id: AC2
    description: '修正後field_getが hanzo_report_cmd_1022.yaml の status で "done" を返すことを確認(現在は "PASS" を返すバグ)'
    binary_checks:
    - 'bash scripts/lib/field_get.sh queue/reports/hanzo_report_cmd_1022.yaml status の出力が "done" か: yes/no'
    - 'bash scripts/lib/field_get.sh queue/reports/hanzo_report_cmd_1022.yaml status の出力が "PASS" でないか: yes/no'
    - 他の報告YAMLでも同様にトップレベルstatusが返るか(3ファイル以上で確認): yes/no
  - id: AC3
    description: 'bash scripts/archive_completed.sh をsweepモード実行し、archive対象reportsが正常にアーカイブされること。実行前後のqueue/reports/ファイル数を記録'
    binary_checks:
    - sweep実行前のqueue/reports/ファイル数を記録したか: yes/no
    - sweep実行後にkept数が大幅に減少したか(sweep前比50%以上減): yes/no
    - アーカイブされたファイルがqueue/archive/reports/に移動されているか: yes/no
  command: "field_get.shの検索優先順位バグを修正せよ。\n\n■ 根本原因\nfield_get.shはインデント付き行(^\\s+field:)を先に検索→トップレベル(^field:)より優先。\n報告YAMLのstatus: done(トップレベル)ではなくbinary_checks内のstatus: PASS(ネスト)を返す。\n→ archive_reportsの受入リスト(done|completed等)に非該当 → 610ファイルがkeptに分類。\n\n■ 修正方針\nfield_get.sh L57-80の検索順序を反転:\n1. まず ^field: (トップレベル)を検索 → 結果があればそれを返す\n2. なければ ^\\s+field: (インデント付き、最浅マッチ)を検索\n\n■ AC3 sweep実行\n修正後、bash scripts/archive_completed.sh --sweep を実行し、アーカイブ結果を記録せよ。"
  context_files:
  - scripts/lib/field_get.sh
  never_stop_for:
  - tool permission denial
  - git操作エラー(auto-retry)
  - 一時ファイル操作エラー
  not_in_scope:
  - field_get以外のYAMLパーサー変更
  - archive_completed.shのarchive_reportsロジック変更
  - 非YAML形式ファイルへの対応
  parallel_ok: []
  parent_cmd: cmd_1355
  project: infra
  related_lessons:
  - id: L070
    summary: field_get呼出し義務
  report_path: queue/reports/hayate_report_cmd_1355.yaml
  status: idle
  stop_for:
  - field_get修正後に既存呼出し元が壊れる兆候がある場合
  target_path: scripts/lib/field_get.sh
status: done
