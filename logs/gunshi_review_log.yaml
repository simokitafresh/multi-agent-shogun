# SG7: 完全パッケージ (NEW 2026-03-23 — 利他サイクル)
#   □ report review verdict=LGTM時、以下を追加バンドル:
#     (a) gate_precheck: gate_report_format.sh結果 + commit確認結果 + GATE通過予測
#     (b) lesson_extraction: lesson_candidateの要約 + 登録推奨判定
#     (c) context_reflux: context索引更新要否の判定（数値・事実・設計決定の有無）
#     (d) dashboard_line: "cmd_XXXX {ninja} {verdict}。{成果1行}。workaround: {yes/no}" 事前ドラフト
#     (e) karo_workaround_needed: yes/no（家老の手動修正が必要か事前判定）
#   □ 目的: 家老の後処理5ステップ→1ステップ(stamp)に圧縮。家老の時間をCMD分解に解放
#   □ 計測: SG7適用前後の家老CMD→配備タイムラグ変化で効果検証
#   □ バンドル出力フォーマット仕様（verdict=LGTM時にinbox_writeメッセージ末尾に付与）:
#     --- SG7 bundle ---
#     gate_precheck:
#       report_format: PASS/FAIL      # gate_report_format.sh結果
#       commit_verified: true/false    # files_modifiedの各ファイルにcmd_idのcommit存在
#       gate_prediction: CLEAR/WARN   # 上記2項からGATE通過を予測
#     lesson_extraction:
#       has_candidate: true/false      # lesson_candidateが存在するか
#       summary: "{教訓の1行要約}"      # has_candidate=true時のみ
#       register_recommended: true/false  # 正式登録を推奨するか(一般論=false, 再利用可能な具体知見=true)
#     context_reflux:
#       needed: true/false             # context索引の更新が必要か
#       target: "{context/*.mdパス}"   # needed=true時のみ。更新すべきcontextファイル
#       content: "{更新内容の1行要約}" # needed=true時のみ
#     dashboard_line: "cmd_XXXX {ninja} PASS。{成果1行要約}。workaround: no"
#     karo_workaround_needed: no       # yes=家老の手動修正が必要, no=スタンプのみで完了
#     --- SG7 bundle end ---
#   □ 運用ルール:
#     - verdict=LGTM時のみ出力。FAIL時はfail_reasonsのみ（バンドル不要）
#     - 家老はバンドルを受領→内容確認→stamp(PASS)+ペースト(dashboard/教訓/context)で完了
#     - gate_precheck.gate_prediction=WARNの場合、家老は自らGATEを確認してから進行
# SG8: 自動消火チェック (2026-03-23 — cmd_1278教訓 + S27遡及検証で4類型追加)
#   □ 全draftレビュー時に以下4類型を順にチェック:
#     TypeA(根本原因推測): 根本原因が「推測」「〜と思われる」のままAPPROVEしていないか？
