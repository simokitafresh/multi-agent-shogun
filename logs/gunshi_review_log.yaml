# SG0: gate_report_format.sh実行(自動化済み。手動チェック不要)
#   bash scripts/gates/gate_report_format.sh <report_path>
#   → PASS: SG2へ進む
#   → FAIL: 軍師がフォーマットを直接修正(report_field_set.sh or Edit)→再gate→PASS後SG2へ
#     修正内容をSG7バンドルに format_corrected: true, corrections: [修正箇所] で記録
