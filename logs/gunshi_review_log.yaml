#       → 矛盾解決の別cmdを先行させよ
#       → 実例: cmd_1267 — タイムスタンプ源不在の設計矛盾を忍者裁量に委ねた
#     TypeC(技術債正当化): 「将来清掃候補」「scope外だが」で技術債を正当化していないか？
#       → 技術債は未来形でなく確定スケジュールに。並列cmdで整理を起票
#       → 実例: cmd_1275 — grid_search内の残存スクリプトを「将来清掃候補」で先送り
#     TypeD(構造問題一行削除): 大規模な構造問題を一行の設定変更/削除で隠蔽していないか？
#       → 根源的構造改革(Vercel化等)のcmd化を要求
