project:
  id: dm-signal
  name: "DM-Signal"
  path: "/mnt/c/Python_app/DM-signal"
  description: "動的モメンタムシグナルシステム。トレンドフォロー自動適応。FoF=乗り換え戦略。"

# =============================================================================
# (a-0) Engineering Preferences (gstack知見適用 — cmd_876 / cmd_927)
# =============================================================================
# PJ固有の判断基準。レビュー・偵察での推薦はこの基準にマッピングせよ。

engineering_preferences:
  - "prefer trade-rule.md / RULE01-11一致 over ローカル解釈。特にRULE05/06/08/11を先に照合せよ"
  - "prefer 実API diffによる全数値フィールド完全一致検証 over 数学的に同じはずという推測"
  - "prefer 本番selection blockでの正規判定 over 事前選別・近道ロジック。選抜条件を前段で勝手に削るな"
  - "prefer FoF展開 + holding_signal + signal_date規則 over 『前月末』『当月シグナル』の短絡理解"
  - "prefer PostgreSQL直読/直書き + UPSERT + 本番コードパス over SQLite書き込み・DELETE+INSERT分離・ローカル専用経路"
  - "prefer explicit/minimal diff over clever abstraction。ただしSSOT整合性とSKIP=FAILの検証義務は削るな"

# =============================================================================
# (a) Trade Rule 要約 (RULE01-11)
# =============================================================================
# 正規ソース: docs/rule/trade-rule.md
# 11の絶対ルール。例外なく適用される。

trade_rules:
  source: "docs/rule/trade-rule.md"
  last_updated: "2026-01-28"

  rules:
    - id: RULE01
      summary: "signal(生シグナル)とholding_signal(保有シグナル)は別物"
    - id: RULE02
      summary: "holding_signalはリバランス月の月初のみ更新される"
    - id: RULE03
      summary: "リバランス月のholding_signalは前月末のsignalを採用する(当月初ではない)"
    - id: RULE04
      summary: "シグナル変更(銘柄変更)とリバランス(比率調整)は独立概念"
    - id: RULE05
      summary: "リターン計算: Return = Σ wᵢ × (P_end / P_start - 1)。wᵢは月初目標ウェイト（ドリフト後ではない）。非リバランス月でも月初にリセット（暗黙的月次リバランス=ユーザー公平性設計）。Trade期間リターンはbuy-and-holdではなく月次複利合成: R_trade = Π(1+R_月) - 1"
    - id: RULE06
      summary: "月初にウェイトを目標値にリセット。月中は価格変動でドリフト（日次リバランスではない）。非リバランス月でも月初にリセットする（暗黙的月次リバランス）"
    - id: RULE07
      summary: "FoFはティッカー×ウェイトに展開可能。展開後は標準PFと同じ計算ロジック"
    - id: RULE08
      summary: "FoF展開は当月初営業日(position_start_date)のholding_signalを参照する。この値は直近リバランス時のsignal_dateで確定したsignalの反映結果。「前月末」表現はリバランスタイミングにより不正確"
    - id: RULE09
      summary: "Open-to-OpenとClose-to-Closeは独立した計算系列。混在禁止"
    - id: RULE10
      summary: "シグナル判定は常にClose。リターン計算のみOpen/Close選択可"
    - id: RULE11
      summary: "同一年月・同一PFのReturnはどのページでも完全一致"

  critical_notes:
    - "RULE09: 同一計算内でOpen価格とClose価格を混ぜてはならない"
    - "RULE10: モメンタム計算(シグナル判定)にOpenを使うことはない"
    - "誤解14(重要): デフォルトはOpen-to-Open(Close-to-Closeではない)。実運用T+1始値執行に近い"

  # =========================================================================
  # BE変更時の計算完全一致要件（殿厳命 2026-03-11 — 絶対ルール）
  # =========================================================================
  # DM-signalは投資を扱う。BE最適化・リファクタリング時は以下を厳守せよ。
  calculation_integrity:
    ruling_date: "2026-03-11"
    source: "殿直接指示"
    rule: |
      signals/returns/metricsなど全数値フィールドが
      全PF×全期間で許容誤差ゼロの完全一致であること。
      これがBE変更の最低基準。
    requirements:
      - "変更前後で実APIを叩き、全数値フィールドが完全一致することをdiffで検証"
      - "フィールド除去時は除去対象以外の全フィールドが完全一致"
      - "処理順序変更(slicing前倒し等)でも浮動小数点の計算順序が変わらないこと"
      - "一見無駄に見えるフィールドでも、他のページ・エンドポイント・テストで使われている可能性がある。全消費者を網羅確認"
    enforcement:
      - "BE変更implのACに必ず「実API diff検証（除去対象以外の全フィールド完全一致）」を含めよ"
      - "偵察段階でFE grepだけでなく、BE内部の参照・テストの前提・admin系ページも確認"
      - "段階的除去を推奨: オプショナル化→FE不要確認→本削除"
    warning: "効率化に目がくらんで他で使っている一見無駄なものを壊すな"

  ssot_hierarchy:
    - level: "Level 0 (データ)"
      name: "Price table"
      role: "全ての原点。株価データのSSoT。営業日=Priceレコードが存在する日"
    - level: "Level 0 (ルール)"
      name: "trade-rule.md"
      role: "理論上の理想形(真に正しいルール定義)"
    - level: "Level 1a"
      name: "calculate_monthly_return()"
      role: "月次リターンのSSOT関数"
      file: "backend/app/services/return_calculator.py"
    - level: "Level 1b"
      name: "calculate_trade_period_return()"
      role: "Trade期間リターンのSSOT関数（月次複利合成方式）"
      file: "backend/app/services/return_calculator.py"
    - level: "Level 2"
      name: "MonthlyReturn table"
      role: "Level 1aの事前計算キャッシュ。recalculate_fast.pyで生成"
    - level: "Level 3"
      name: "UI表示層"
      role: "Level 1/2を使用する派生実装"

  common_misconceptions:
    - "誤解1: signalが変わったら即座に保有も変わる → holding_signalはリバランス月初のみ更新"
    - "誤解5: 累積インデックスの比がリターン → 正しくはΣ wi × (P_end/P_start - 1)"
    - "誤解6: 日次複利積がリターン → 毎日リバランスを暗黙に仮定しており正しくない。ただし月次リバランスは意図的設計（ユーザー公平性）"
    - "誤解7: FoFは当月シグナルを使う → 当月初営業日のholding_signal（直近リバランス時のsignal反映結果）を参照"
    - "誤解11: OpenとCloseを混ぜて計算できる → 混在禁止"
    - "誤解12: シグナル判定にOpen価格を使用 → 常にClose"
    - "誤解14: デフォルトはClose-to-Close → Open-to-Openがデフォルト"

# =============================================================================
# (b) モメンタム計算の正しい手順 (殿の裁定 2026-02-15)
# =============================================================================

momentum_calculation:
  ruling_date: "2026-02-15"
  steps:
    - step: 1
      action: "構成tickerの共通データ期間を求める"
    - step: 2
      action: "lookback期間を考慮して計算開始日を決定"
    - step: 3
      action: "計算する"
  key_insight: |
    共通期間内ならNaN行は存在せずpivot/per-tickerの差異は消える。
    問題の根源はNaN行の扱いではなく、共通期間を先に確定していないこと。

# =============================================================================
# (c) 本番DB接続ルール
# =============================================================================

database:
  production:
    type: "PostgreSQL"
    host: "singapore-postgres.render.com"
    connection: "backend/.envのDATABASE_URLを使用"
    tables:
      signals:
        pk: "(portfolio_id, date)"
        fk: "portfolio_id → portfolios.id"
        columns: "signal, holding_signal, momentum_data(JSON), created_at"
        model: "backend/app/db/models.py:91-101"
        upsert: "ON CONFLICT(portfolio_id,date) DO UPDATE signal,holding_signal,momentum_data"
        upsert_impl: "backend/app/jobs/flush/signal_flush.py:45-54"
      portfolios:
        pk: "id (UUID)"
        columns: "name, type, config(JSON), folder_id, created_at, updated_at, hide_portfolio, hide_signal, is_active"
        model: "backend/app/db/models.py:66-84"
        note: "pipeline_configはconfig JSON内にネスト(独立カラムではない)"
    rules:
      - "書き込みは必ずPostgreSQL経由"
      - "dm_signal.db(SQLite)は本番ではない。書き込み禁止"
      - "ローカルSQLiteへのINSERTは無意味"
      - "UPSERT維持が正解。DELETE+INSERT分離はデータ消失リスク(L038/L040)"
      - "本番データ読み取りもDATABASE_URL(PostgreSQL直接接続)を使え。Render HTTP API経由禁止 — DNS障害等の障害点を増やす不要な中間層(cmd_194教訓/L064)"
      - "本番コードパス統一原則: 数学的等価でも本番と同一コードパスを使え。MomentumCache≡PipelineEngineでも、本番がPipelineならGSもPipelineを使用。同一設定にはコードパスも含む(cmd_196殿裁定/L076)"

    recalculate_concurrency:
      description: "本番再計算(recalculate-sync)は排他制御が効いている。同時実行は不可能"
      mechanism:
        - "API門番: POST /admin/recalculate-sync 呼出時にis_recalculating()チェック → 実行中ならHTTP 409 Conflict即拒否"
        - "実行ロック: threading.Lock + start_recalculation() → 原子的排他制御(recalc_status.py)"
        - "レイヤーロック: sync-prices/tickers/standard/fofの4層独立ロック + 依存チェック"
      source_files:
        - "backend/app/utils/recalc_status.py (ロック本体)"
        - "backend/app/api/etl_trigger.py:329 (409チェック)"
      when_409_received:
        meaning: "別のプロセスが再計算中。データ破損ではない"
        action: "30秒待って再実行すればよい。パニック不要"
        do_not: "エラーとしてFAIL報告するな。409は正常な排他動作"
      operational_rule: "複数忍者がrecalculateを同時に叩くとどちらかが409で弾かれる。家老はDB操作タスクを直列配備すること"

  local_sqlite:
    dm_signal_db:
      path: "backend/static/data/dm_signal.db"
      role: "本番PostgreSQLのローカルミラー。PF設定の参照のみ"
      write: false
    experiments_db:
      path: "analysis_runs/experiments.db"
      role: "価格データground truth(ローカル分析用)"
      tables:
        daily_prices: "OHLCV日次価格(86銘柄)"
        monthly_returns: "バックテスト月次リターン"
      note: "run_077_monban.py は DM_IDS + experiments.db を継続使用。その他run_077_*は gs_data_loader 経由で本番PostgreSQL直読が主系"

  common_mistakes:
    - wrong: "dm_signal.dbから価格取得"
      correct: "experiments.dbのdaily_pricesを使え"
    - wrong: "dm_signal.dbに書き込み"
      correct: "本番PostgreSQLに書き込め"
    - wrong: "recalculate_fof.pyをローカル実行"
      correct: "動かない(スキーマ差異)。experiments.db+dm_signal.dbで直接計算せよ"
    - wrong: "DELETE+INSERT分離で高速化(OPT-D)"
      correct: "UPSERT維持。性能差+1.3s(0.05%)で安全性犠牲不可(L038/L040)"

# =============================================================================
# (d) BBパイプライン構成
# =============================================================================

pipeline:
  source: "backend/app/services/pipeline/"
  engine: "backend/app/services/pipeline/engine.py"
  base: "backend/app/services/pipeline/base.py"

  block_catalog:
    selection_blocks:  # 11 types
      - type: MomentumFilterBlock
        alias: "追い風の術(oikaze)"
        description: "モメンタム上位N選択"
      - type: AbsoluteMomentumFilterBlock
        alias: "門番(monban)"
        description: "絶対モメンタム閾値判定"
      - type: RelativeMomentumFilterBlock
        alias: "追い越しの術(oikoshi)"
        description: "参照資産との相対モメンタム比較"
      - type: MomentumAccelerationFilterBlock
        alias: "加速の術(kasoku)"
        description: "短期/長期モメンタム比率による加速度判定"
      - type: ReversalFilterBlock
        alias: "逆風の術(gyakufuu)"
        description: "低モメンタム逆張りフィルタ"
      - type: SafeHavenSwitchBlock
        alias: "セーフヘイブン切替"
        description: "空集合時にセーフヘイブン資産に切替"
      - type: ComponentPriceBlock
        alias: "コンポーネント価格読込"
        description: "FoF用:構成PFの累積リターンを価格として読込"
      - type: MultiViewMomentumFilterBlock
        alias: "複数視点モメンタム"
        description: "4視点(0M,1M,2M,3Mスキップ)のTop N和集合"
      - type: SingleViewMomentumFilterBlock
        alias: "抜き身の術(nukimi)"
        description: "単一視点skip付きモメンタム"
      - type: TrendReversalFilterBlock
        alias: "変わり身の術(kawarimi)"
        description: "トレンド+リバーサル和集合選択"
      - type: MonthlyReturnMomentumFilterBlock
        alias: "月次リターンモメンタム"
        description: "MonthlyReturnテーブルから直接読取り(GS方式)"

    terminal_blocks:  # 3 types
      - type: EqualWeightBlock
        alias: "分身の術(bunshin)"
        description: "均等配分"
      - type: CashTerminalBlock
        alias: "キャッシュ退避"
        description: "全額キャッシュ(空集合時)"
      - type: KalmanMetaBlock
        alias: "カルマンフィルタ加重"
        description: "スケルトン実装(将来統合用)。block registryには登録済み"

  standard_pattern:
    description: "DM戦略の標準パイプライン構成"
    flow: "MomentumFilter → AbsoluteMomentumFilter → SafeHavenSwitch → EqualWeight"
    blocks:
      - step: 1
        type: MomentumFilterBlock
        role: "relative_assetsからtop_n選出"
      - step: 2
        type: AbsoluteMomentumFilterBlock
        role: "absolute_assetのモメンタム > RFなら通過、さもなくば空集合"
      - step: 3
        type: SafeHavenSwitchBlock
        role: "空集合ならsafe_haven_assetに切替"
      - step: 4
        type: EqualWeightBlock
        role: "最終配分(均等)"

  pipeline_config_structure:
    description: "pipeline_configはportfolios.config JSON内にネスト(独立カラムではない)"
    schema:
      selection_pipeline:
        blocks: "SelectionBlockの配列"
      terminal_block: "1つのTerminalBlock"

tiebreak_rule:
  principle: "GS側のtop_n選出は本番のselection blockと完全一致させる"
  cutoff_score_blocks:
    - "MomentumFilterBlock (追い風/oikaze)"
    - "SingleViewMomentumFilterBlock (抜き身/nukimi)"
    - "MomentumAccelerationFilterBlock (加速/kasoku)"
    - "MultiViewMomentumFilterBlock (多眼)"
    - "MonthlyReturnMomentumFilterBlock (月次リターン)"
  strict_slice_blocks:
    - "TrendReversalFilterBlock (変わり身/kawarimi)"
    - "ReversalFilterBlock (逆風/gyakufuu)"
  note: "変わり身・逆風は本番がstrict slice。GS側もstrict sliceで一致"

# =============================================================================
# (e) 四神 — DMファミリー設計原理と構成
# =============================================================================
# ★ 全エージェント必読。すべての検討はこの理解が前提条件。

shijin:
  description: "4つの守護神ファミリー。各DMファミリーのGSチャンピオン戦略で構成。4体×3モード=12体"

  # =========================================================================
  # 設計原理（殿直伝 2026-03-15）
  # =========================================================================
  #
  # ■ L0概念: 単一銘柄とDM PFは根源的に異なる（最重要・全ての前提）
  #
  #   単一銘柄(SPY,TQQQ等) = 受動的な価格系列。市場が動けば価格が動く。
  #   判断はない。意思はない。学術論文のほぼ全てはこれを前提としている。
  #
  #   DM PF(青龍,玄武等) = 意思決定が埋め込まれた価格系列。
  #   中にアルゴリズムがいる。ルックバック窓で市場を見て、absoluteと比較し、
  #   relativeから選び、safe havenに切り替える。出力されるリターン系列は
  #   「市場の動き＋アルゴリズムの判断」の合成物。
  #
  #   DM-Signalはこの「意思決定が埋め込まれたDM PF」をL0として扱う。
  #   四神はL0。忍法はL0を選択するFoF。
  #   この根源的な相違を理解していないと、以下が全て間違う:
  #
  #   (1) モメンタム分析: DM PFのモメンタム=モメンタム戦略のモメンタム(二階微分)
  #       受動的資産のモメンタムとは統計的性質が全く異なる
  #   (2) 相関分析: DM PFの相関は時変。青龍はTQQQ保有時(市場高相関)と
  #       XLU保有時(市場低相関)で別の資産になる。1つの相関係数は無意味
  #   (3) forward-looking: 「SPYが来月上がるか」=市場予測(1変数)
  #       「青龍が来月良いか」=市場環境×アルゴリズム判断の組合せ予測(多変数)
  #       市場が上がってもlookback窓のタイミングでsafe havenにいる可能性がある
  #   (4) 最適化の二重化: DM PFのパラメータは既にGSで最適化済み。
  #       その上にメタレイヤー(FoFウェイト最適化)を乗せると過適合リスクが乗算
  #   (5) 性能の因果分解: 好成績=市場が良かったのか/切替が当たったのか/
  #       リバランス日が偶然良かったのか。受動的資産より因果分解が困難
  #
  #   ★ 論文の手法をDM PFに適用する際は、分析対象が受動的資産ではなく
  #     意思決定システムの出力であることを常に意識せよ。
  #     手法をそのまま適用できるケースはほぼない。適応が必要。
  #
  # ■ absolute assetが戦略のDNA
  #   absolute_assetの選択がファミリーを定義し、戦略の性格を決定する。
  #   GS(172,818パターン)はこのDNA制約の中で最適パラメータを「発見」した。
  #   設計ではなく発見。だがabsolute assetが問題空間を制約するため、
  #   発見されたパラメータは一つの意思を持つ組み合わせに自然に収束する。
  #
  # ■ 全パラメータが一体となって一つの意味を成す
  #   lookback・rebalance・relative・safe_havenを個別に見ても本質は掴めない。
  #   全パラメータの組み合わせが一つの統一された戦略性格を形成する。
  #
  # ■ 3モード（激攻/鉄壁/常勝）はDNAの中での味付け
  #   3モードは最適化メトリクス（CAGR/MaxDD/NewHigh）が異なるだけ。
  #   absolute + relative + safe_havenは共通（＝ファミリー定義＝不変）。
  #   GS結果のlookback/rebalance/top_Nが変わるが、源流の性格は変わらない。
  #
  # ■ 4ファミリーの直交性
  #   時間スケール(15D〜24M) × 対象市場(株/債券/VIX/マクロ) ×
  #   行動頻度(月次〜四半期) × 攻守構造(常時攻め/スイッチ/レジーム/逆転)。
  #   構造的に相関が低く、同じ市場環境で4つが全く異なる判断を下す。

  design_principles:
    l0_concept: |
      DM PFは単一銘柄と根源的に異なる。単一銘柄=受動的価格系列(判断なし)。
      DM PF=意思決定が埋め込まれた価格系列(市場の動き+アルゴリズムの判断の合成物)。
      DM-SignalはこのDM PFをL0として扱う。論文の手法をDM PFに適用する際は
      「分析対象が意思決定システムの出力である」ことを常に意識せよ。
      影響: モメンタム分析(二階微分), 相関(時変), forward-looking(多変数),
      最適化(二重化リスク), 性能分解(因果不明)の全てが受動的資産と異なる。
    dna_rule: "absolute_assetがファミリーを定義し、戦略のDNAを決定する"
    parameter_unity: "全パラメータが一体となって一つの意味を成す。個別パラメータだけでは本質を掴めない"
    three_modes: "3モード(激攻/鉄壁/常勝)はDNA内の味付け。源流の性格は不変"
    orthogonality: "4ファミリーは時間スケール×対象市場×行動頻度×攻守構造で直交"
    metric_separation: |
      計算と解釈の分離原則（殿裁定 2026-03-16）:
      評価指標（p̄, CPCV等）は全PFに一律で計算し、結果はそのまま記録する。
      解釈・運用は別レイヤーの人間判断。四神は素材、FoFが完成品。
      朱雀がp̄高/CPCV不合格でも素材価値は別。素材に単独一貫性を要求するのは設計矛盾。
      「CPCVダメだからFoFに使わない」は誤用。例外を作らず一律計算、使い方で分ける。

  family_dna:
    DM2:
      absolute: LQD
      dna: "降りない"
      explanation: |
        LQD(投資適格債券)は極めて安定。これをabsoluteに置くと退避がほぼ発動しない。
        safe_haven=XLU(公益株)=退避しても株の中にいる。12M複合窓はノイズを平滑化。
        全パラメータが「長期上昇トレンドに乗り続ける」に収束。常時リスクオン。
      dna_constraints: |
        ■ relative assetsは3倍レバETF必須（TQQQ/TECL/SOXL等）。
          理由: LQDが退避を抑制するため、ほぼ常時保有する。非レバ(SPY/QQQ等)では
          「降りない」設計の恩恵を活かせない。レバレッジ×常時保有で最大リターンを狙う構造。
          例: SOXL(3倍半導体)→OK(セクター違いだがレバ×攻め)。SPY(1倍広域)→NG(設計の無駄遣い)
        ■ safe havenは防御的「株」であること（XLU等）。
          理由: 債券や現金に逃げると「降りない」DNAが崩れる。退避しても株の中に留まる設計。
        ■ lookbackは長期寄り（月単位）。短期(日単位)はwhipsawを招きDNA「降りない」と矛盾。
    DM3:
      absolute: TMF
      dna: "債券方向スイッチ"
      explanation: |
        TMF(3倍債券ロング)とTMV(3倍債券ショート)は完全逆ポジション。
        20D窓で直近の勢いを捉え、債券の攻め↔守りを切り替える。
        bimonthlyは3倍レバ×短期窓の過剰切替を防ぐブレーキ。
        株ではなく債券方向にレバレッジで賭ける独自軸。
      dna_constraints: |
        ■ absoluteとsafe_havenは債券の正逆ペア必須（TMF/TMV）。
          理由: DNAは「債券方向の賭け」。GLDやXLUをsafe_havenにすると方向スイッチが壊れる。
        ■ rebalanceは短すぎず（3倍レバのwhipsaw防止）。bimonthly程度が適切。
        ■ lookbackは短期（日〜数週間）。債券トレンドの短期転換を捉える必要がある。
    DM6:
      absolute: "^VIX"
      dna: "レジーム判定"
      explanation: |
        ^VIXは株でもETFでもなく恐怖の指数。absoluteに使うとモメンタム判定が
        「恐怖の上昇/下降」のレジーム検知に変わる。15D窓で瞬間状態を読み取るが
        quarterly rebalanceで年4回しか行動しない。観測は最速、行動は最遅。
        VIXの日次ノイズを無視し、本当のレジーム変化のみに反応する設計。
        safe_haven=GLD(金)は恐怖局面で買われる第三の軸(株でも債券でもない)。
      dna_constraints: |
        ■ rebalanceは低頻度（quarterly）必須。
          理由: VIXは日次で極端に乱高下する。月次以上の頻度ではノイズに振り回される。
          観測窓(15D)が短いのは「今の状態」を正確に読むため。行動頻度と観測窓は独立の概念。
        ■ safe_havenは株・債券と非相関な資産（GLD等）。
          理由: VIXレジーム判定は株/債券の二項対立を超えた第三軸。safe_havenも第三軸であるべき。
        ■ lookbackとrebalanceの「落差」がDNAの本質。両方短いor両方長いはDM6ではない。
    "DM7+":
      absolute: SPXL
      dna: "構造的逆張り"
      explanation: |
        relative=XLU(守り)1つ、safe_haven=TQQQ(攻め)。通常DMと攻守が逆転。
        24M窓に2年分の上昇が残っている限り、短期暴落でもTQQQを離さない。
        月次チェックでも24M窓はほぼ動かない=本物のマクロ転換でのみポジション変更。
        攻守逆転は設計のバグではなく、「常に最も攻撃的なポジションに居座る」を
        構造的に強制する意図的な仕掛け。
      dna_constraints: |
        ■ lookbackは超長期（年単位）必須。短期ルックバックの提案はDNAの否定。
          理由: 短期窓にすると暴落に反応して退避する=逆張りではなくなる。
          24M窓が短期暴落を吸収する構造こそが「構造的逆張り」の実体。
        ■ 攻守逆転（relative=守り、safe_haven=攻め）は意図的設計。「修正」するな。
          理由: 通常DMの攻守を正す提案はDNAの破壊。この逆転が「常に最攻撃的」を実現する。
        ■ safe_havenに防御的資産(GLD/XLU/債券)を置く提案はNG。
          理由: 玄武の「safe haven」は名前と逆で最大火力ポジション。ここを防御にすると凡庸なDMになる。

  # =========================================================================
  # よくある誤解（殿直伝 2026-03-15 — LLM/人間の暗黙の前提による典型的誤判断）
  # =========================================================================
  # 一般的な投資常識・ML常識を四神に当てはめると必ず間違える。
  # 以下は「正しいと思い込んで提案するが、四神では全て間違い」のリスト。
  common_misconceptions_shijin:
    - id: SM01
      misconception: "safe havenは防御的資産（債券/現金/金）であるべき"
      reality: "玄武のsafe_haven=TQQQ(3倍Nasdaq)は最大火力ポジション。攻守逆転は意図的設計"
      cause: "教科書のsafe haven定義を無条件に適用"
    - id: SM02
      misconception: "レバレッジETF(3倍)は長期保有に不適。ボラティリティ減衰で損する"
      reality: "四神は全て3倍レバETFを使用。レバ×常時保有(DM2+)やレバ×方向スイッチ(DM3)が設計の核心"
      cause: "『レバETF=デイトレ専用』という一般論を無条件に適用"
    - id: SM03
      misconception: "暴落時はポジションを縮小してリスク管理すべき"
      reality: "青龍はLQD基準で暴落中も保有を継続する設計。『降りない』がDNA。これはバグではない"
      cause: "リスク管理=退避という暗黙の前提"
    - id: SM04
      misconception: "危機時は債券に逃げるべき（60/40ポートフォリオの前提）"
      reality: "朱雀は危機時にTMV(債券ショート)に行く。債券急騰は行き過ぎると判断する逆方向の賭け"
      cause: "株↓→債券↑という相関の固定観念"
    - id: SM05
      misconception: "VIXが高い=危険=退避すべき"
      reality: "DM6はVIXの『水準』ではなく『方向(上昇中/下降中)』を見ている。高VIXでも下降中なら攻め"
      cause: "VIX=恐怖指数→高い=怖いという単純化"
    - id: SM06
      misconception: "リバランス頻度を上げれば変化を速く捉えられる"
      reality: "DM6のquarterlyはVIXのノイズ除去装置。月次にするとノイズに振り回されて性能劣化"
      cause: "頻度↑=性能↑という最適化バイアス"
    - id: SM07
      misconception: "ルックバックを短くすれば敏感になって有利"
      reality: "DM7+の24Mは鈍さが本質。短期暴落を吸収する構造が逆張りを実現。短縮=DNA破壊"
      cause: "速さ=良さというテック志向の暗黙前提"
    - id: SM08
      misconception: "戦略ラベル(strategy名)は戦略の動作を正確に説明する"
      reality: "玄武の旧ラベル『リセッション防御』は動作と真逆。実態はマクロ逆張り(リセッション時にも攻撃的ポジション維持)"
      cause: "ラベルを字義通り信頼する"
    - id: SM09
      misconception: "CAGR最低の戦略は劣っている・改善すべき"
      reality: "玄武のCAGR29.5%(最低)は弱点ではない。価値は他3つとの低相関。4つ合わせた時の分散効果が本質"
      cause: "単体リターン最大化=最適という前提。ポートフォリオ理論の欠如"
    - id: SM10
      misconception: "パラメータは独立にチューニングできる（lookbackだけ変更等）"
      reality: "全パラメータが一体で一つの意味を成す。lookbackだけ変えるとrebalanceやasset選択との整合が壊れる"
      cause: "ML的な独立変数最適化の発想"
    - id: SM11
      misconception: "relative assetが1つしかないのは設計ミス（比較対象が必要）"
      reality: "玄武のrelative=XLU1つは意図的。相対モメンタム比較ではなくXLUのモメンタム状態によるレジーム判定"
      cause: "デュアルモメンタム=2資産比較という教科書的理解"
    - id: SM12
      misconception: "relativeに非レバETF(SPY/QQQ)を使えばリスクが下がって安全"
      reality: "DM2+はLQD基準でほぼ常時保有。非レバを持つと「降りない」設計の恩恵を活かせない。レバ×常時保有が設計の核心"
      cause: "レバ=リスク、非レバ=安全という単純化。設計全体の整合性を無視"
    # --- 思想レベルの誤解（パラメータではなく運用哲学） ---
    - id: SM13
      misconception: "4ファミリーに動的ウェイトを付けて最適化すべき（長期重視60%/短期40%等）"
      reality: "メタ最適化=オーバーフィッティング。均等保有か好みで3つ選ぶのが正解。殿の哲学: 全パラメータは本質的に不可知"
      cause: "ポートフォリオ理論(平均分散最適化)の機械的適用。未来のウェイトは計算できない"
    - id: SM14
      misconception: "複数PFを組み合わせて1つの完璧なPFを作るべき"
      reality: "10個を混ぜて1つの完璧を作ろうとする=オーバーフィッティング(殿明確否定)。単純均等か好みの3つ選択が優れる"
      cause: "最適化すれば必ず改善するという信念。バックテスト最適化の罠"
    - id: SM15
      misconception: "最も成績が良い神に集中すべき（成績が悪い神は外す）"
      reality: "パフォーマンスチェイシング。玄武を外す=低相関を捨てる=分散効果を破壊。4つの価値は組み合わせにある"
      cause: "過去の成績が未来を予測するという前提。単体最適化思考"
    - id: SM16
      misconception: "4つの神が一致したとき（全員リスクオン等）だけ行動すれば確度が上がる"
      reality: "不一致こそが低相関の証明。合意フィルタは4戦略を1戦略に縮退させる。独立に動くことが設計の本質"
      cause: "コンセンサス=正しいという民主主義的バイアス"
    - id: SM17
      misconception: "忍法は四神の上位互換（忍法があれば四神は不要）"
      reality: "忍法はBBで四神を動的に選択するFoF。レイヤーが違う。四神の均等保有にも忍法の選択式にもそれぞれ別の意味がある"
      cause: "新しい仕組み=古い仕組みの置き換えという進化論的思考"
    - id: SM18
      misconception: "ある神のシグナルで別の神を制御すれば改善できる（朱雀で玄武のタイミングを計る等）"
      reality: "1つの神で別の神を制御=独立性の破壊。4つが独立に動くことで相関が低く保たれている"
      cause: "情報の統合=改善という直感。独立性の価値の軽視"
    - id: SM19
      misconception: "FoFの構成比率を動的に変えるのが高度な運用"
      reality: "動的配分=メタレイヤーの最適化。殿の哲学は真逆: 全パラメータは不可知→単純保有+長期で見る。複雑化は過適合の入口"
      cause: "高度=複雑=優秀という前提。ヘッジファンド的運用への憧れ"
    - id: SM20
      misconception: "ビルディングブロックを増やしてパイプラインを複雑にすれば精度が上がる"
      reality: "忍法のBBは選択の切り口を変えるもの。追い風(モメンタム上位N)のようなシンプルなBBがGSチャンピオン。複雑化≠精度向上"
      cause: "パイプライン段数↑=精度↑というMLエンジニアリングの発想"
    # --- 根源的誤解（L0概念: 受動的資産 vs 意思決定システム） ---
    - id: SM21
      misconception: "DM PFを単一銘柄と同じように分析・最適化できる"
      reality: |
        単一銘柄=受動的価格系列(市場だけで決まる)。
        DM PF=意思決定が埋め込まれた価格系列(市場+アルゴリズム判断の合成物)。
        この区別を無視すると以下が全て間違う:
        (a) モメンタム分析→DM PFのモメンタムはモメンタム戦略のモメンタム(二階微分)
        (b) 相関分析→DM PFの相関は時変(保有銘柄がregimeで切り替わるため)
        (c) forward-looking→市場予測だけでは不十分。市場×アルゴリズム判断の組合せを予測する必要
        (d) 最適化→既にGSで最適化済みのDM PFにメタ最適化を重ねると過適合リスクが乗算
        (e) 性能分解→好成績が市場要因か/切替の当たりか/リバランス日の偶然か分解困難
      cause: |
        学術論文・教科書が暗黙に仮定する「資産=受動的価格系列」をDM PFにそのまま適用。
        SM13-SM20の全てはこの根源的誤解から派生する。
        論文の手法をDM PFに適用する際は必ず「意思決定システムの出力である」ことを
        前提に手法を適応(adapt)せよ。そのまま適用(apply)できるケースはほぼない。

  # (f) 殿の指標哲学と設計アプローチ（2026-03-16 殿裁定）
  indicator_philosophy:
    core_principle: "平均は悪、極値が全て。全パラメータは本質的に不可知"
    design_approach: |
      体験→指標→道具 (Experience→Metrics→Tools) の順で設計せよ。
      道具→設計（辞書の手法をそのまま適用）は誤り。
      殿の哲学から問いを導き、問いに答える指標を設計し、最後に道具を選ぶ。
    preferred_metrics:
      - rank: 1
        name: "Max Run-up"
        reason: "最重要。「降りない」設計の恩恵を測る直接指標"
      - rank: 2
        name: "Tail Contribution Ratio"
        reason: "極値イベントでの貢献度。平均ではなく極値を見る"
      - rank: 3
        name: "Left-tail Jumps"
        reason: "下方極値への反応。暴落時にDNAが機能しているかの証拠"
      - rank: 4
        name: "New High Frequency"
        reason: "新高値の頻度。構造的な上昇トレンド維持の証拠"
    deprioritized: "Sharpe / Sortino / σ — 平均ベースの指標は殿の哲学に反する"
    five_questions: |
      診断指標は以下の5問に答える形で設計せよ:
      (1) このPFは「降りない」を維持しているか
      (2) 極値イベントにどう反応したか
      (3) 最近のリターンは構造的か偶発的か
      (4) 他の四神と同時に沈むか
      (5) いつ入れ替えるべきか
  # 金融ML知識辞書フィットネス評価（2026-03-16 殿と将軍の合同評価）
  # 辞書は道具箱として正しいが「辞書→積み上げ」は殿の哲学に反する
  dictionary_fitness:
    - id: M03
      name: "Rank Persistence"
      fit: "◎"
      reason: "分布非依存。順位の持続性を見るだけ。受動的資産前提なし。最適合"
    - id: M10
      name: "DSR (Deflated Sharpe Ratio)"
      fit: "○→◎"
      reason: "Sharpe前提だがCAGR/NHRに差し替えれば使える。多重検定補正の考え方自体は有効"
    - id: M05
      name: "HMM (Hidden Markov Model)"
      fit: "△→○"
      reason: "PFに適用すると意味がない(SM21)。市場のレジーム判定に使うなら有効"
    - id: M09
      name: "PSR (Probabilistic Sharpe Ratio)"
      fit: "△"
      reason: "Sharpe哲学と正面衝突。殿の「平均は悪、極値が全て」に反する"
    - id: M08
      name: "Meta-Labeling"
      fit: "×"
      reason: "再訓練サイクルがない。GSで一度決めたら固定。ラベル→再学習ループ前提の手法は使えない"

