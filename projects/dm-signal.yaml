# =============================================================================
# (PI) 本番不変量 (Production Invariants)
# =============================================================================
# 受動的知識層: 全エージェントに自動ロード。GS・偵察・impl設計の前提事実。

production_invariants:
  last_updated: "2026-03-22"
  entries:
    - id: PI-001
      fact: "本番シグナル計算は日次解像度。10D/15D/20D/1M は全て異なるlookback期間として計算される"
      implication: "GS月次解像度では10D≠15D≠20D≠1Mの区別が消える。月次解像度のdedupは本番パリティを破壊する"
    - id: PI-002
      fact: "SQLiteミラー(backend/static/data/dm_signal.db)は不完全。本番PostgreSQLとデータ乖離"
      implication: "DB調査・パリティ検証は本番PostgreSQL必須"
    - id: PI-003
      fact: "standard PFのconfig JSONにはpipeline_configが必須。NoneだとrecalculateでCashフォールバック"
      implication: "DB登録時に既存PFから同一ファミリーのpipeline_configをコピーすること"
    - id: PI-004
      fact: "GSはnumpy配列操作のみで本番pydanticスキーマを通さない"
      implication: "GS→本番DB登録cmdでは登録前に本番pydanticスキーマでバリデーション必須"
    - id: PI-005
      fact: "新規PF登録後のrecalculateはfull(portfolio_id指定なし)一発が鉄則"
      implication: "部分recalculate連続実行は依存順序の罠でエラー連鎖する"
    - id: PI-006
      fact: "手順書/ランブックの記載はrecalculateコードパスとの照合なしには信頼できない"
      implication: "手順書作成cmdのACに「実際のコードパスとの照合検証」を含めること"
    - id: PI-007
      fact: "GS結果と本番計算結果は構造的に乖離しうる(月次vs日次解像度、pydanticバリデーション差異等)"
      implication: "本番DB登録前にパリティ検証cmd完了必須。パリティ未検証の本番登録は禁止"
    - id: PI-008
      fact: "monthly_returnsテーブルにはmonthly_return(Close)とmonthly_return_open(Open)の2列が存在"
      implication: "パリティ検証ではmonthly_return_open列を使用すること。Close列で比較すると偽の不一致が発生"
    - id: PI-009
      fact: "GSは本番と同一の結果を出さなければならない。全期間holding_signal完全一致(必須)+monthly_return 1e-6以内"
      implication: "holding_signalが1月でも不一致ならそのGS結果は汚染データ。チャンピオン選出は無効"
    - id: PI-010
      fact: "本番はprice_by_symbolに非市場ティッカー(^VIX/DTB3)を含めない"
      implication: "いかなるコードパスであれ非市場ティッカー(^VIX/DTB3等)をstock trading day gridに載せるな。native日付系列で個別処理必須。stock grid載せ→lookback参照日ズレ→momentum値乖離→abs/rf判定反転"
    - id: PI-011
      fact: "シン忍法v2(21体)のterminal_blockは全てEqualWeight。selection_pipelineが絞り込み→均等保有"
      implication: "パリティ検証でselection_blocks有無で検証方法を分岐させるな"

