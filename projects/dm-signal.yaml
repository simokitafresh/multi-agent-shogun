      - "パリティ検証の両辺は必ず同一データソースを使う"
      - "現在のSSOTは本番PostgreSQL(DATABASE_URL)"
      - "GS側=experiments.db(本番PostgreSQLからsyncしたローカルコピー)、本番側=本番PostgreSQL(DATABASE_URL)で計算し、結果を突合する"
      - "GS側と本番側で異なるデータソースを使った比較は無効"
      - "CSVは古いデータのためパリティ検証に使うと結果は無効。CSVと本番DBの比較はパリティ検証として認めない"
