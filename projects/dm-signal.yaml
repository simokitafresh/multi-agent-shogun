# =============================================================================
# DM-Signal プロジェクト核心知識（索引）
# =============================================================================
# 用途: /clear後の忍者が自動読み込みし、プロジェクト核心知識を即座に取得するためのファイル
# 正規ソース: /mnt/c/Python_app/DM-signal/docs/rule/trade-rule.md (Level 0 SSOT)
# 詳細コンテキスト: context/dm-signal.md (索引) → 分割3ファイル (L2)
# 詳細分割先: projects/dm-signal/ 配下
# 更新日: 2026-03-23

project:
  id: dm-signal
  name: "DM-Signal"
  path: "/mnt/c/Python_app/DM-signal"
  description: "動的モメンタムシグナルシステム。トレンドフォロー自動適応。FoF=乗り換え戦略。"

# =============================================================================
# (a-0) Engineering Preferences (gstack知見適用 — cmd_876 / cmd_927)
# =============================================================================

engineering_preferences:
  - "prefer trade-rule.md / RULE01-11一致 over ローカル解釈。特にRULE05/06/08/11を先に照合せよ"
  - "prefer 実API diffによる全数値フィールド完全一致検証 over 数学的に同じはずという推測"
  - "prefer 本番selection blockでの正規判定 over 事前選別・近道ロジック。選抜条件を前段で勝手に削るな"
  - "prefer FoF展開 + holding_signal + signal_date規則 over 『前月末』『当月シグナル』の短絡理解"
  - "prefer PostgreSQL直読/直書き + UPSERT + 本番コードパス over SQLite書き込み・DELETE+INSERT分離・ローカル専用経路"
  - "prefer explicit/minimal diff over clever abstraction。ただしSSOT整合性とSKIP=FAILの検証義務は削るな"

# =============================================================================
# (a) Trade Rule 要約 (RULE01-11)
# =============================================================================
# 正規ソース: docs/rule/trade-rule.md — 11の絶対ルール。例外なく適用される。

trade_rules:
  source: "docs/rule/trade-rule.md"
  last_updated: "2026-01-28"

  rules:
    - id: RULE01
      summary: "signal(生シグナル)とholding_signal(保有シグナル)は別物"
    - id: RULE02
      summary: "holding_signalはリバランス月の月初のみ更新される"
    - id: RULE03
      summary: "リバランス月のholding_signalは前月末のsignalを採用する(当月初ではない)"
    - id: RULE04
      summary: "シグナル変更(銘柄変更)とリバランス(比率調整)は独立概念"
    - id: RULE05
      summary: "リターン計算: Return = Σ wᵢ × (P_end / P_start - 1)。wᵢは月初目標ウェイト（ドリフト後ではない）。非リバランス月でも月初にリセット（暗黙的月次リバランス=ユーザー公平性設計）。Trade期間リターンはbuy-and-holdではなく月次複利合成: R_trade = Π(1+R_月) - 1"
    - id: RULE06
      summary: "月初にウェイトを目標値にリセット。月中は価格変動でドリフト（日次リバランスではない）。非リバランス月でも月初にリセットする（暗黙的月次リバランス）"
    - id: RULE07
      summary: "FoFはティッカー×ウェイトに展開可能。展開後は標準PFと同じ計算ロジック"
    - id: RULE08
      summary: "FoF展開は当月初営業日(position_start_date)のholding_signalを参照する。この値は直近リバランス時のsignal_dateで確定したsignalの反映結果。「前月末」表現はリバランスタイミングにより不正確"
    - id: RULE09
      summary: "Open-to-OpenとClose-to-Closeは独立した計算系列。混在禁止"
    - id: RULE10
      summary: "シグナル判定は常にClose。リターン計算のみOpen/Close選択可"
    - id: RULE11
      summary: "同一年月・同一PFのReturnはどのページでも完全一致"

  critical_notes:
    - "RULE09: 同一計算内でOpen価格とClose価格を混ぜてはならない"
    - "RULE10: モメンタム計算(シグナル判定)にOpenを使うことはない"
    - "誤解14(重要): デフォルトはOpen-to-Open(Close-to-Closeではない)。実運用T+1始値執行に近い"

  calculation_integrity:
    ruling_date: "2026-03-11"
    source: "殿直接指示"
    rule: "signals/returns/metricsなど全数値フィールドが全PF×全期間で許容誤差ゼロの完全一致であること。これがBE変更の最低基準"
    enforcement: "BE変更implのACに必ず「実API diff検証」を含めよ"

  ssot_hierarchy:
    - level: "Level 0 (データ)"
      name: "Price table"
      role: "全ての原点。株価データのSSoT。営業日=Priceレコードが存在する日"
    - level: "Level 0 (ルール)"
      name: "trade-rule.md"
      role: "理論上の理想形(真に正しいルール定義)"
    - level: "Level 1a"
      name: "calculate_monthly_return()"
      role: "月次リターンのSSOT関数"
      file: "backend/app/services/return_calculator.py"
    - level: "Level 1b"
      name: "calculate_trade_period_return()"
      role: "Trade期間リターンのSSOT関数（月次複利合成方式）"
      file: "backend/app/services/return_calculator.py"
    - level: "Level 2"
      name: "MonthlyReturn table"
      role: "Level 1aの事前計算キャッシュ。recalculate_fast.pyで生成"
    - level: "Level 3"
      name: "UI表示層"
      role: "Level 1/2を使用する派生実装"

  common_misconceptions:
    - "誤解1: signalが変わったら即座に保有も変わる → holding_signalはリバランス月初のみ更新"
    - "誤解5: 累積インデックスの比がリターン → 正しくはΣ wi × (P_end/P_start - 1)"
    - "誤解6: 日次複利積がリターン → 毎日リバランスを暗黙に仮定しており正しくない。ただし月次リバランスは意図的設計（ユーザー公平性）"
    - "誤解7: FoFは当月シグナルを使う → 当月初営業日のholding_signal（直近リバランス時のsignal反映結果）を参照"
    - "誤解11: OpenとCloseを混ぜて計算できる → 混在禁止"
    - "誤解12: シグナル判定にOpen価格を使用 → 常にClose"
    - "誤解14: デフォルトはClose-to-Close → Open-to-Openがデフォルト"

# =============================================================================
# (b) モメンタム計算の正しい手順 (殿の裁定 2026-02-15)
# =============================================================================

momentum_calculation:
  ruling_date: "2026-02-15"
  steps:
    - step: 1
      action: "構成tickerの共通データ期間を求める"
    - step: 2
      action: "lookback期間を考慮して計算開始日を決定"
    - step: 3
      action: "計算する"
  key_insight: |
    共通期間内ならNaN行は存在せずpivot/per-tickerの差異は消える。
    問題の根源はNaN行の扱いではなく、共通期間を先に確定していないこと。

# =============================================================================
# (c) 本番DB接続ルール（要約。詳細→ projects/dm-signal/database-detail.yaml）
# =============================================================================

database:
  production:
    type: "PostgreSQL"
    host: "singapore-postgres.render.com"
    connection: "backend/.envのDATABASE_URLを使用"
  rules:
    - "書き込みは必ずPostgreSQL経由"
    - "dm_signal.db(SQLite)は本番ではない。書き込み禁止"
    - "UPSERT維持が正解。DELETE+INSERT分離はデータ消失リスク(L038/L040)"
    - "本番データ読み取りもDATABASE_URL(PostgreSQL直接接続)を使え"
    - "本番コードパス統一原則: 数学的等価でも本番と同一コードパスを使え(cmd_196殿裁定/L076)"
  detail: "→ projects/dm-signal/database-detail.yaml (テーブルスキーマ・排他制御・SQLite・よくある間違い)"

# =============================================================================
# (d) BBパイプライン（要約。詳細→ projects/dm-signal/pipeline-blocks.yaml）
# =============================================================================

pipeline:
  source: "backend/app/services/pipeline/"
  engine: "backend/app/services/pipeline/engine.py"
  standard_flow: "MomentumFilter → AbsoluteMomentumFilter → SafeHavenSwitch → EqualWeight"
  selection_blocks: 11  # MomentumFilter, AbsoluteMomentumFilter, RelativeMomentumFilter, MomentumAccelerationFilter, ReversalFilter, SafeHavenSwitch, ComponentPrice, MultiViewMomentumFilter, SingleViewMomentumFilter, TrendReversalFilter, MonthlyReturnMomentumFilter
  terminal_blocks: 3  # EqualWeight, CashTerminal, KalmanMeta
  detail: "→ projects/dm-signal/pipeline-blocks.yaml (ブロックカタログ・標準パターン・config構造)"

tiebreak_rule:
  principle: "GS側のtop_n選出は本番のselection blockと完全一致させる"
  cutoff_score_blocks: ["MomentumFilter", "SingleViewMomentumFilter", "MomentumAccelerationFilter", "MultiViewMomentumFilter", "MonthlyReturnMomentumFilter"]
  strict_slice_blocks: ["TrendReversalFilter", "ReversalFilter"]
  note: "変わり身・逆風は本番がstrict slice。GS側もstrict sliceで一致"

