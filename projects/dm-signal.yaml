# =============================================================================
# (g) recalculate_fast.py 計算パス (Phase構成)
# =============================================================================
# ファイル: backend/app/jobs/recalculate_fast.py
# 殿の制約: 全PF×全日を計算(差分計算・PF数削減・日数間引き禁止)
# OPT-E適用後: signal_calc 0.53s(3,786倍高速化), 全体389s(6.2倍短縮)

recalculate_phases:
  overview: |
    recalculate_history_fast()は6フェーズで全PFのシグナル+パフォーマンスを再計算する。
    L2(個別PF)→L3(FoF)の2レイヤー構成。

  phases:
    - id: "Phase0"
      name: "クリーンアップ"
      line: "L694"
      description: "_cleanup_before_recalculate()。DELETEは独立COMMIT(L038/L039注意)"

    - id: "Phase1"
      name: "データロード"
      line: "L702"
      description: "全銘柄の価格データをDBから一括ロード"
      key_function: "_load_all_prices()"

    - id: "Phase1.5"
      name: "有効開始日決定"
      line: "L740"
      description: "各PFの計算開始日を決定"

    - id: "Phase2"
      name: "前処理+MomentumCache初期化"
      line: "L827"
      description: "pivot+全期間モメンタム事前計算。PriceCacheの構築"
      notes: "Phase2.5は存在しない。OPT-6(最適化6)はPhase2内の前処理で実施される"

    - id: "Phase3"
      name: "PipelineモメンタムCache事前計算"
      line: "L903"
      description: "全BBブロック×全ティッカーの事前計算(OPT-A)"

    - id: "Phase3.5"
      name: "Pipeline block事前解決(OPT-A)"
      line: "L1166"
      description: "各PFのpipeline_configからブロック設定を事前解決"

    - id: "Phase3.7"
      name: "OPT-E: Vectorizedシグナル事前計算"
      line: "L1178"
      description: |
        全pipeline PFの全日付シグナルを1パスで事前計算し、dictに格納。
        Phase4ではO(1) dict lookupのみ。signal_calc 1724s→0.53sの主因。
        データ構造: vectorized_pipeline_signals: Dict[str, Dict[date, str]] (L1185)
      key_function: "_precompute_pipeline_signals()"
      commits: ["dc35b83", "f452c23", "151345c", "91c04a4"]
      bugs_fixed:
        - "bisectフォールバック消滅(L045): dict厳密一致→旧パスのbisect直近日参照を復元"
        - "ReversalFilter方向逆転(L045): top_n降順→bottom_n昇順に修正"
        - "日次フォールバック追加(L045/91c04a4): miss時→execute_pipeline_with_blocks (L1718-1738)"
      bisect_impl: "_dict_lookup_with_bisect (L509-523)"

    - id: "Phase4"
      name: "L2日次ループ(シグナル+パフォーマンス計算)"
      line: "L1508"
      description: |
        全日付×全PFをループし、シグナル計算+パフォーマンス計算+DB書込。
        OPT-E後: シグナルはPhase3.7のdict lookupで取得(O(1))。
        パイプライン未設定PFはlegacy(determine_signal_fast)で計算。
      bottleneck: "trade_perf(58.7s)が新ボトルネック。signal_calcは0.53sで脱落"

    - id: "Phase4.5"
      name: "月次リターン計算"
      line: "L1909"
      description: "月次リターンの集計・書込"

    - id: "Phase5_FoF"
      name: "L3 FoF再計算"
      line: "L1921"
      description: "FoF(Fund of Funds)レイヤー。L2シグナルを集約してFoFシグナル+パフォーマンスを計算"
      timing: "~89s(OPT-E対象外)"

    - id: "Phase5_precompute"
      name: "プリコンピュートテーブル"
      line: "L1958"
      description: "パフォーマンスデータの事前計算テーブル生成"

  performance_history:
    - run: "初回ベースライン"
      total: "11,818s (3h17m)"
    - run: "OPT-A/D/F適用"
      total: "2,397s (40m)"
      signal_calc: "2,007s"
    - run: "OPT-E適用(090d)"
      total: "389s (6m30s)"
      signal_calc: "0.53s"
      note: "112件signal消失バグあり→151345cで修正"
