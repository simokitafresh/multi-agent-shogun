# =============================================================================
# (k) ポートフォリオ命名規則 (殿裁定 2026-02-20)
# =============================================================================

naming_convention:
  ruling_date: "2026-02-20"
  source: "docs/rule/portfolio-naming-convention.md"

  L1_shijin_fof:
    format: "{モード}-{四神名}"
    examples: ["激攻-青龍", "鉄壁-朱雀", "常勝-白虎"]

  L2_ninpou_fof:
    format: "{忍法名}-{モード}"
    examples: ["加速-激攻", "四つ目-鉄壁", "抜き身-常勝"]
    ninpou_names: [追い風, 抜き身, 変わり身, 加速, 四つ目]
    note: "分身(bunshin)は本番不在(2026-03-11確認)。四つ目(MultiViewMomentum)が存在"
    excluded: "monban(門番)=ext_pricesのCSV化に追加設計必要"
    merged: "nukimi_c → nukimiに統合(L054)"
    max_count: 15  # 5忍法 × 3モード

  modes:
    gekkou: {name: "激攻", metric: "CAGR", description: "リターン最大化"}
    teppeki: {name: "鉄壁", metric: "MaxDD", description: "ドローダウン最小化"}
    joushou: {name: "常勝", metric: "NewHigh", description: "新高値頻度最大化"}

