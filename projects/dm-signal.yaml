naming_convention:
  ruling_date: "2026-02-20"
  source: "docs/rule/portfolio-naming-convention.md"

  L1_shijin_fof:
    format: "{モード}-{四神名}"
    examples: ["激攻-青龍", "鉄壁-朱雀", "常勝-白虎"]

  L2_ninpou_fof:
    format: "{忍法名}-{モード}"
    examples: ["加速-激攻", "四つ目-鉄壁", "抜き身-常勝"]
    ninpou_names: [追い風, 抜き身, 変わり身, 加速, 四つ目]
    note: "分身(bunshin)は本番不在(2026-03-11確認)。四つ目(MultiViewMomentum)が存在"
    excluded: "monban(門番)=ext_pricesのCSV化に追加設計必要"
    merged: "nukimi_c → nukimiに統合(L054)"
    max_count: 15  # 5忍法 × 3モード

  # =========================================================================
  # シン四神 命名規則 (殿裁定 2026-03-16)
  # =========================================================================
  shin_shijin:
    ruling_date: "2026-03-16"
    source: "殿直接指示"
    rule: |
      現行四神は本番プロモーション済みのため変更不可。
      CPCV+脱相関アンサンブルで構成する新版には「シン」prefixを必ず付与。
      混乱防止のためシンprefixの徹底は絶対。
    L1_format: "{モード}-シン{四神名}"
    L1_examples: ["激攻-シン青龍", "鉄壁-シン朱雀", "常勝-シン白虎", "常勝-シン玄武"]
    L2_format: "シン{忍法名}-{モード}"
    L2_examples: ["シン追い風-激攻", "シン抜き身-常勝"]
    design: |
      各ファミリー ~43Kパラメータ → CPCVスクリーニング(PBO閾値)
      → 生存者からペアワイズ相関で脱相関K体を貪欲選出
      → K体均等保有 = 強化版ファミリー(シン四神)
      → シン四神の上に忍法(シン忍法)が乗る構造

  modes:
    gekkou: {name: "激攻", metric: "CAGR", description: "リターン最大化"}
    teppeki: {name: "鉄壁", metric: "MaxDD", description: "ドローダウン最小化"}
    joushou: {name: "常勝", metric: "NewHigh", description: "新高値頻度最大化"}

  config_aggregation:
    rule: "3モードで同一configの忍法はモード省略（忍法名のみ）"
    partial: "2モード同一+1異なる → 同一側を無印、異なる側にモード付与"

  deprecated_suffixes: ["-Dd", "-Nh", "-C", "-So", "-Sh"]

  # =========================================================================
