    - "会計士の読み順: 内容→簡易説明→勘定科目候補→補足メモ→証票→使用カード"
    - "MoneyForward起源でない行（note売上手数料等）は列1-10をMF互換形式で手動/自動記入"

drive_integrity_checklist:
  description: "確定申告関連cmdで忍者が事前/事後に参照するDrive整合性チェックリスト"
  created: "2026-03-14"
  created_by: "cmd_940"
  items:
    - id: CHK1
      name: "CSV↔Spreadsheet データ一致"
      description: "Drive上の個人事業_{年}.csvとSpreadsheet「個人事業_{年}」の共有列(col0-9, 証票フォルダ, 証票PDF)が完全一致すること"
      check_method: "共有列の行単位diff。差異0行が合格"
    - id: CHK2
      name: "ローカルCSV↔Drive CSV 一致"
      description: "ローカル(data/expense_master/master/個人事業_{年}.csv)とDrive CSVの内容が一致すること。ローカルCSVがマスター"
      check_method: "行数・ID列・日付フォーマット・保有金融機関表記・証票列の差異検出"
    - id: CHK3
      name: "経費マスター↔CSV 判定キー整合"
      description: "経費マスターSpreadsheetの全判定キーがCSVの「内容」列にマッチすること。逆に、CSVの全行が何れかの判定キーにマッチすること"
      check_method: "部分文字列マッチ。unmatched patterns + unmatched CSV rows を検出"
    - id: CHK4
      name: "証票PDF↔フォルダ列 突合（リンク切れなし）"
      description: "CSVの証票フォルダ・証票PDF列に記載されたファイルがDrive上に実在すること。逆に、Driveに存在するPDFがCSVに記載されていること"
      check_method: "CSV証票列の値 vs Drive subfolder内ファイル名リスト。欠損・余剰を検出"
    - id: CHK5
      name: "note売上CSV 最新1ファイルのみ"
      description: "note_売上CSVフォルダに月次CSVが同一内容で複数存在しないこと。追記形式のため最新1ファイルで十分"
      check_method: "ファイル数カウント + 内容ハッシュ比較。同一内容ファイルは冗長"
    - id: CHK6
      name: "証票PDF 命名規則準拠"
      description: "全PDFが命名規則({対象年月}_{発行元}_{種別}_{金額}_{元ファイル名}.pdf)に準拠すること"
      check_method: "正規表現マッチ。違反PDFのリストと違反パターンを検出"
    - id: CHK7
      name: "重複ファイルなし"
      description: "同一フォルダ内に同名ファイルや同一内容ファイル(_1.pdf等のコピー)が存在しないこと"
      check_method: "同名検出 + サイズ一致ペア検出。強い重複候補をリスト化"

# =============================================================================
# 確定申告 証票管理ルール（殿厳命 2026-03-14）
# =============================================================================
# 以下は確定申告関連の全cmdで忍者が必ず参照するルール。違反はFAIL差し戻し。

receipt_matching_rules:
  description: "証票PDF↔マスターCSV(MF)の突合ルール。3条件全てを満たすこと"
  created: "2026-03-14"
  rules:
    - id: MATCH1
      name: "日付一致"
      rule: "証票の日付とMFの日付が同一日であること"
      exceptions:
        - "PayPal経由クレカ決済: 金額が完全一致していれば日付ズレは許容（±1日〜数日）"
    - id: MATCH2
      name: "金額一致"
      rule: "証票の金額とMFの金額が一致すること"
      exceptions:
        - "ドル建て→日本円換算: 10%未満の乖離は為替差として許容"
        - "10%以上の乖離は不一致扱い（怪しい）"
    - id: MATCH3
      name: "1対1対応"
      rule: "MFに同一日・同一金額の行がN件あれば、証票もN枚必要"
      examples:
        - "MFに3/1 ¥1,000が2行 → 証票PDFも2枚必要（別々にカウント）"
        - "1枚の証票で2行をカバーしてはならない"
        - "余った行は「証票なし」と正直に記載"

receipt_validity:
  description: "証票として有効なPDFの判定基準"
  valid:
    - "Receipt（領収書）: 金額・日付・発行元が明記されたもの"
    - "Invoice（請求書）: 金額・日付・発行元が明記されたもの"
  invalid:
    - "email PDF: 金額が記載されていないメール通知（証票として無効）"
    - "email PDF: 同一取引でReceipt/Invoiceが存在する場合（冗長・削除対象）"
    - "金額未記載のPDF全般"

folder_status_naming:
  description: "Driveサブフォルダ名に証票状態を表示するプレフィックス"
  rules:
    - prefix: "[OK]_"
      meaning: "確認済み — 全行に証票あり＋MF日付金額突合済み"
    - prefix: "[NG]_"
      meaning: "要対応 — 一部証票なし or 突合に乖離あり"
    - prefix: "[--]_"
      meaning: "未解決 — 証票ゼロ or 入手ルート未確定"
  constraints:
    - "ASCII文字のみ。絵文字禁止（環境依存）"
    - "ソート順: [--] → [NG] → [OK] でASCII順に状態別に並ぶ"

spreadsheet_truth_rules:
  description: "Spreadsheet証票列の記載ルール。嘘なし・曖昧なし"
  rules:
    - "証票あり → 証票PDF列にファイル名を記載"
    - "証票なし → 「証票なし（具体的入手方法）」を記載"
    - "入手方法の例: 「Anthropic Billing > Invoicesからダウンロード可」"
    - "入手方法の例: 「Gmail検索: Render Invoice で取得可能性あり」"
    - "入手方法の例: 「発行元に再発行依頼が必要」"
  forbidden:
    - "「信頼性が低い」「おそらく」等の曖昧・主観的表現"
    - "根拠のない所見（ファイル名・件数・データ比較なき報告はFAIL）"

receipt_acquisition_principle:
  description: "証票取得の大原則（殿厳命 2026-03-14）"
  core: "正しいものが取得できているかが全て。汚染されたごまかしデータの存在が最悪"
  rules:
    - id: ACQ1
      name: "Gmail第一手段、不十分なら個別パイプライン構築"
      rule: |
        Gmailから100%証票として使えるものが取得できない発行元は、
        noteやMFのように個別の全自動取得パイプラインを構築する。
        Gmailのメール通知PDFで「とりあえず埋める」のは禁止。
    - id: ACQ2
      name: "正確性 > 網羅性"
      rule: |
        証票なしの行が残ることより、間違った証票が紐づくことの方が遥かに悪い。
        確信がなければ「証票なし」と正直に書け。ごまかすな。
    - id: ACQ3
      name: "汚染データ即時排除"
      rule: |
        金額不一致・日付不一致・email通知で代替した証票が発見された場合、
        即座に削除せよ。「あるだけマシ」という判断は禁止。
        ゼロの方が嘘より100倍マシ。

report_quality:
  description: "確定申告関連cmdの報告品質基準"
  rules:
    - "全ての所見に具体的根拠を付けること（ファイル名・件数・データ比較）"
    - "曖昧表現は禁止。事実のみ記載"
    - "根拠なき所見はFAIL差し戻し"

