  seed_data: "19発行元パターン（cmd_898で投入）"

master_csv:
  filename: "個人事業_{年}.csv"
  example: "個人事業_2025.csv"
  drive_location: "『2026確定申告 個人事業』フォルダ直下"
  drive_id: "16Bfc-6OOILZDHq58N6uxbzp_2TRHKTrV"
  columns:
    - name: "計算対象"
      owner: "MoneyForward"
      description: "MF互換列"
    - name: "日付"
      owner: "MoneyForward"
      description: "MF互換列"
    - name: "内容"
      owner: "MoneyForward"
      description: "MF互換列"
    - name: "金額（円）"
      owner: "MoneyForward"
      description: "MF互換列"
    - name: "保有金融機関"
      owner: "MoneyForward"
      description: "MF互換列"
    - name: "大項目"
      owner: "MoneyForward"
      description: "MF互換列"
    - name: "中項目"
      owner: "MoneyForward"
      description: "MF互換列"
    - name: "メモ"
      owner: "MoneyForward"
      description: "MF互換列"
    - name: "振替"
      owner: "MoneyForward"
      description: "MF互換列"
    - name: "ID"
      owner: "MoneyForward"
      description: "MF互換列"
    - name: "簡易説明"
      owner: "自動推定"
      description: "発行元+種別から生成。例: note売上手数料(6月分), Anthropic API利用料"
    - name: "候補勘定科目"
      owner: "自動推定"
      description: "会計士の最終判断材料。例: 支払手数料, 通信費, 研究開発費"
    - name: "補足メモ"
      owner: "殿（手入力）"
      description: "殿の補足・指示・会計士への伝達事項"
    - name: "証票フォルダ"
      owner: "自動"
      description: "Drive上のサブフォルダ名。例: note_売上手数料, Anthropic"
    - name: "証票PDF"
      owner: "自動"
      description: "リネーム後のPDFファイル名"
  design_principles:
    - "列1-10はMF出力そのまま。列11-15は右に追加（MF互換を壊さない）"
    - "会計士の読み順: 内容→簡易説明→勘定科目候補→補足メモ→証票"
    - "MoneyForward起源でない行（note売上手数料等）は列1-10をMF互換形式で手動/自動記入"

drive_integrity_checklist:
  description: "確定申告関連cmdで忍者が事前/事後に参照するDrive整合性チェックリスト"
  created: "2026-03-14"
  created_by: "cmd_940"
  items:
    - id: CHK1
      name: "CSV↔Spreadsheet データ一致"
      description: "Drive上の個人事業_{年}.csvとSpreadsheet「個人事業_{年}」の共有列(col0-9, 証票フォルダ, 証票PDF)が完全一致すること"
      check_method: "共有列の行単位diff。差異0行が合格"
    - id: CHK2
      name: "ローカルCSV↔Drive CSV 一致"
      description: "ローカル(data/expense_master/master/個人事業_{年}.csv)とDrive CSVの内容が一致すること。ローカルCSVがマスター"
      check_method: "行数・ID列・日付フォーマット・保有金融機関表記・証票列の差異検出"
    - id: CHK3
      name: "経費マスター↔CSV 判定キー整合"
      description: "経費マスターSpreadsheetの全判定キーがCSVの「内容」列にマッチすること。逆に、CSVの全行が何れかの判定キーにマッチすること"
      check_method: "部分文字列マッチ。unmatched patterns + unmatched CSV rows を検出"
    - id: CHK4
      name: "証票PDF↔フォルダ列 突合（リンク切れなし）"
      description: "CSVの証票フォルダ・証票PDF列に記載されたファイルがDrive上に実在すること。逆に、Driveに存在するPDFがCSVに記載されていること"
      check_method: "CSV証票列の値 vs Drive subfolder内ファイル名リスト。欠損・余剰を検出"
    - id: CHK5
      name: "note売上CSV 最新1ファイルのみ"
      description: "note_売上CSVフォルダに月次CSVが同一内容で複数存在しないこと。追記形式のため最新1ファイルで十分"
      check_method: "ファイル数カウント + 内容ハッシュ比較。同一内容ファイルは冗長"
    - id: CHK6
      name: "証票PDF 命名規則準拠"
      description: "全PDFが命名規則({対象年月}_{発行元}_{種別}_{金額}_{元ファイル名}.pdf)に準拠すること"
      check_method: "正規表現マッチ。違反PDFのリストと違反パターンを検出"
    - id: CHK7
      name: "重複ファイルなし"
      description: "同一フォルダ内に同名ファイルや同一内容ファイル(_1.pdf等のコピー)が存在しないこと"
      check_method: "同名検出 + サイズ一致ペア検出。強い重複候補をリスト化"
