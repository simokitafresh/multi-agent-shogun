# =============================================================================
# Auto-Ops Project Knowledge
# =============================================================================
# CDP + Google Workspace CLI によるデスクトップ・ブラウザ自動化基盤

project:
  id: auto-ops
  name: "Auto-Ops"
  repo: "https://github.com/simokitafresh/auto-ops"
  path: "/mnt/c/Python_app/auto-ops"
  language: python
  created: "2026-03-08"
  description: "CDP + Google Workspace CLI によるデスクトップ・ブラウザ自動化基盤"

engineering_preferences:
  - "prefer 標準ライブラリ・既存CLI helpers over 新規外部依存。依存追加は最後の手段"
  - "prefer fail-close over warn-and-continue。証票抽出・rename/upload・オーケストレーションの確信度が低ければ止めよ"
  - "prefer preflight-first（process確認→必要ならlaunch→接続確認→本処理）over 楽観実行"
  - "prefer Chrome/Edge 9222規約 + fresh tab / isolated session over 長寿命CDP接続の使い回し"
  - "prefer PowerShell仲介 + B64など再現性ある quoting over 巧妙だが壊れやすいワンライナー"
  - "prefer MF互換列維持（1-10列不可侵）over きれいな再設計。既存CSV/Spreadsheet消費者を壊すな"

core_rules:
  - "CDP: Chrome優先、Edge fallback。CDPポートは 9222 に統一（cmd_885）"
  - "CDP計測CLI本体: workflows/perf_measure.py"
  - "CDP transport: cdp/cdp_helper.py"
  - "preflight-first順序: プロセス確認 → 未起動時 launch_browser() → preflight_cdp_check() → 計測"
  - "browser launch args: --remote-debugging-port=9222 --remote-debugging-address=0.0.0.0"
  - "CDP計測出力: results/perf_<timestamp>.json + .md + results/screenshots/"
  - "PowerShell仲介パターン（subprocess.run → powershell.exe）"
  - "B64エンコードで多重クォート回避"
  - "外部ライブラリ依存最小（標準ライブラリ優先）"
  - "gws: npm i -g @googleworkspace/cli"

expense_pdf_naming:
  format: "{対象年月}_{発行元}_{種別}_{金額}_{元ファイル名}.pdf"
  fields:
    - name: "対象年月"
      description: "経費が発生した年月(YYYY-MM)"
      example: "2025-06"
    - name: "発行元"
      description: "サービス名(小文字)"
      example: "note, google, aws"
    - name: "種別"
      description: "手数料種別"
      example: "PF手数料, 振込手数料, Workspace"
    - name: "金額"
      description: "税込金額(円)"
      example: "173709円"
    - name: "元ファイル名"
      description: "ダウンロード時の元名(検索用に保持)"
      example: "取引ID xxx _ note（ノート）"
  rules:
    - "元ファイル名は消さない。prefix追加のみ。取得時の名前は検索に使う"
    - "対象年月は『内容』の月（領収日ではない）。振込手数料等で内容月がない場合は領収日の年月"
    - "ソート: ファイル名先頭がYYYY-MMなのでエクスプローラーで自然にソートされる"
    - "確定申告フォルダ: デスクトップ/{年}確定申告_{対象期間}/"
    - "範囲外の前後月(例: 2024-12, 2026-01)は許容。時系列の文脈把握に有用"

